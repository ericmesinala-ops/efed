#fsw-body * { box-sizing: border-box; }

}
.sidebar-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;

    padding: 0 16px;
    margin-bottom: 6px;

}
.sidebar-btn {

#filterSection { padding: 16px; border-top: 1px solid var(--border-primary); margin-top: 16px; }
.filter-title { font-family: 'Barlow Condensed', sans-serif; font-size: 10px; font-weight: 700; color: var(--text-muted); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px; }
.filter-item { display: flex; align-items: center; gap: 8px; padding: 5px 0; }

.filter-label { font-size: 12px; color: var(--text-tertiary); cursor: pointer; }
.show-filter-btn { width: 100%; padding: 8px; background: #b0b4bc; color: #111; border: none; font-size: 11px; font-weight: 700; cursor: pointer; border-radius: 4px; margin-top: 10px; text-transform: uppercase; letter-spacing: 0.5px; transition: background 0.2s; }
.show-filter-btn:hover { background: #c4c8d0; }

/* Main area */
#fsw-main {

    display: flex;
    overflow: hidden;
    min-height: 0;

}
#mainArea:has(#roster-table-wrap) {
    padding: 0;

}
#roster-table-wrap {
    min-width: 1400px;
}
#showTabsContainer { display: flex; gap: 4px; margin-bottom: 15px; border-bottom: 2px solid var(--border-primary); padding-bottom: 10px; overflow-x: auto; }

/* Right panel */
#detailsPanel {
    width: 220px;
    background: var(--bg-secondary);
    border-left: 1px solid var(--border-primary);
    padding: 20px 16px;

    height: 100%;

/* Sections */
.section-container { margin-bottom: 16px; background: var(--bg-secondary); border: 1px solid var(--border-primary); border-radius: 8px; position: relative; overflow: hidden; transition: box-shadow 0.2s, border-color 0.2s; }
.section-container::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--border-primary); transition: background 0.2s; z-index: 1; }
.section-container:hover::before { background: var(--accent-blue); }
.section-container.active-section { border-color: rgba(200,168,75,0.4); box-shadow: 0 0 0 1px rgba(200,168,75,0.15), 0 4px 20px rgba(200,168,75,0.12), 0 0 12px rgba(200,168,75,0.08); }
.section-container.active-section::before { background: var(--accent-blue); }
.section-container.collapsed > div { display: none; }

/* Lines — no inner card, just rows inside the outer card */
.line-container { margin-bottom: 0; display: flex; gap: 8px; align-items: center; padding: 9px 14px 9px 18px; background: transparent; border: none; border-bottom: 1px solid rgba(255,255,255,.04); border-radius: 0; overflow: hidden; transition: background 0.15s; }
.line-container:last-child { border-bottom: none; }
.line-container:hover { background: rgba(255,255,255,.03); }
.line-container.match-line { background: var(--match-bg); }
.line-container.match-line:hover { background: rgba(200,168,75,0.09); }
.item-box { flex: 1; min-height: 40px; display: flex; align-items: center; gap: 8px; padding: 4px 0; min-width: 0; }
.match-item-box { flex-direction: row; align-items: center; gap: 8px; padding: 0; flex-wrap: nowrap; }
.match-row1 { display: contents; }
.match-row2 { display: none; }
.match-details-btn { padding: 4px 12px; font-size: 11px; font-weight: 700; cursor: pointer; border-radius: 4px; border: 1px solid var(--accent-blue); background: transparent; color: var(--accent-blue); white-space: nowrap; flex-shrink: 0; transition: all 0.2s; }
.match-details-btn:hover { background: var(--accent-blue); color: #000; }
.click-for-details-hint { font-size: 10px; color: var(--text-muted); font-style: italic; cursor: pointer; flex-shrink: 0; padding: 2px 6px; border-radius: 3px; transition: color .15s; user-select: none; }
.item-content { display: flex; align-items: center; gap: 8px; width: 100%; min-width: 0; flex-wrap: nowrap; }
.checkbox { width: 15px; height: 15px; cursor: pointer; flex-shrink: 0; accent-color: var(--accent-blue); }
.checkbox[disabled] { cursor: not-allowed !important; }
.item-label { font-size: 12px; font-weight: 600; color: var(--text-muted); flex-shrink: 0; text-transform: uppercase; letter-spacing: 0.5px; font-family: 'Barlow Condensed', sans-serif; }
.item-dropdown { padding: 4px 8px; border: 1px solid var(--border-input); font-size: 12px; background: var(--bg-input); color: var(--text-primary); cursor: pointer; max-width: 130px; border-radius: 4px; transition: border-color 0.2s; }
.item-dropdown:focus { outline: none; border-color: var(--accent-blue); }
#fsw-body select { color: var(--text-primary); background: var(--bg-input); }
#fsw-body select option { color: var(--text-primary); background: var(--bg-secondary); }
.item-text-input { flex: 1; min-width: 0; padding: 4px 8px; border: 1px solid var(--border-input); font-size: 12px; background: var(--bg-input); color: var(--text-primary); border-radius: 4px; transition: border-color 0.2s; }
.item-text-input:focus { outline: none; border-color: var(--accent-blue); }
.delete-section-btn { background: transparent; color: var(--text-muted); border: 1px solid var(--border-primary); width: 26px; height: 26px; font-size: 16px; cursor: pointer; border-radius: 4px; flex-shrink: 0; transition: all 0.2s; }
.delete-section-btn:hover { background: var(--accent-red); border-color: var(--accent-red); color: white; }
.delete-line-btn { background: transparent; color: var(--text-muted); border: 1px solid transparent; width: 22px; height: 22px; font-size: 16px; cursor: pointer; border-radius: 4px; flex-shrink: 0; transition: all 0.2s; }
.delete-line-btn:hover { background: var(--accent-red); color: white; }

/* Wrestler slots */
.wrestler-slot { padding: 5px 8px; background: var(--bg-primary); border: 1px dashed var(--border-input); border-radius: 4px; font-size: 11px; cursor: pointer; transition: all 0.2s; width: 80px; min-height: 34px; text-align: center; color: var(--text-tertiary); display: flex; align-items: center; justify-content: center; word-wrap: break-word; line-height: 1.2; flex-shrink: 0; }
.wrestler-slot:hover { border-color: var(--accent-blue); color: var(--accent-blue); background: rgba(200,168,75,0.05); }

.wrestler-slot.filled:hover { border-color: var(--accent-blue); background: rgba(200,168,75,0.05); }

.wrestler-slot.match-wrestler:hover { background: var(--accent-blue-hover); }
.wrestler-list-btn { width: 100%; padding: 8px 12px; background: transparent; border: 1px solid var(--border-primary); text-align: left; font-size: 13px; cursor: pointer; transition: all 0.15s; color: var(--text-secondary); margin-bottom: 4px; border-radius: 4px; display: block; }
.wrestler-list-btn.is-champion { border-color: var(--gold); color: var(--gold); background: rgba(200,168,75,0.07); box-shadow: 0 0 8px rgba(200,168,75,0.25), inset 0 0 8px rgba(200,168,75,0.05); font-weight: 600; }

.roster-row { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: var(--bg-secondary); border: 1px solid var(--border-primary); margin-bottom: 6px; border-radius: 6px; overflow: hidden; transition: border-color 0.15s; }

/* ── SUPABASE SAVE/LOAD (separate table: fsw_management_data) ── */
/*
  SQL to run in Supabase:
  create table if not exists fsw_management_data (
    id bigserial primary key,
    username text not null,
    shows jsonb,
    roster jsonb,
    roster_mgmt jsonb,
    storylines jsonb,
    promos_created jsonb,
    title_belts jsonb,
    updated_at timestamptz default now()
  );
  create unique index if not exists fsw_mgmt_username_idx on fsw_management_data(username);
  alter table fsw_management_data disable row level security;

  -- If table already exists, add missing column:
  alter table fsw_management_data add column if not exists roster_mgmt jsonb;
*/
async function saveShow() {
  const session = getSession();
  if (!session) return;
  const btn = document.getElementById('mgmt-save-btn');
  const origText = btn ? btn.textContent : 'Save';
  if (btn) { btn.textContent = 'Saving…'; btn.style.background = ''; }
  try {
    const payload = {
      username: session.username,
      shows: showsData,
      roster: rosterData,
      roster_mgmt: rosterMgmt,
      storylines: storylineData,
      promos_created: createdPromos,
      title_belts: titleBeltsData,
      updated_at: new Date().toISOString()
    };
    let resp;
    if (_mgmtDbId) {
      resp = await fetch(SUPABASE_URL+'/rest/v1/fsw_management_data?id=eq.'+_mgmtDbId, { method:'PATCH', headers:SB_HEADERS, body:JSON.stringify(payload) });
    } else {
      resp = await fetch(SUPABASE_URL+'/rest/v1/fsw_management_data', { method:'POST', headers:SB_HEADERS, body:JSON.stringify(payload) });
    }
    if (!resp.ok) {
      const errText = await resp.text();
      // If roster_mgmt column missing, try without it
      if (errText.includes('roster_mgmt') || errText.includes('column')) {
        delete payload.roster_mgmt;
        const resp2 = await fetch(
          _mgmtDbId
            ? SUPABASE_URL+'/rest/v1/fsw_management_data?id=eq.'+_mgmtDbId
            : SUPABASE_URL+'/rest/v1/fsw_management_data',
          { method: _mgmtDbId ? 'PATCH' : 'POST', headers:SB_HEADERS, body:JSON.stringify(payload) }
        );
        if (!resp2.ok) {
          const e2 = await resp2.text();
          throw new Error(resp2.status + ': ' + e2);
        }
        resp = resp2;
        showToast('Saved (roster_mgmt column missing — add it in Supabase)');
      } else {
        throw new Error(resp.status + ': ' + errText);
      }
    } else {
      showToast('Saved!');
    }
    // grab new ID if POST
    if (!_mgmtDbId) {
      try { const arr = await resp.clone().json(); if (arr && arr[0] && arr[0].id) _mgmtDbId = arr[0].id; } catch(e) {}
    }
    if (btn) { btn.textContent = '✓ Saved'; btn.style.background = '#2a7a3a'; setTimeout(() => { btn.textContent = origText; btn.style.background = ''; }, 1800); }
  } catch(e) {
    if (btn) { btn.textContent = origText; btn.style.background = ''; }
    showToast('Save failed: ' + e.message);
    console.error('Save error:', e);
  }
}

      _mgmtDbId = d.id;
      showsData = d.shows || [{ id:Date.now(), name:'Show 1', title:'', subtitle:'', sections:[] }];
      rosterData = d.roster || [];
      rosterMgmt = d.roster_mgmt || {};

      createdPromos = d.promos_created || [];

      {id:15,name:'Kyle Vance',tier:'Tier 2',alignment:'Face'},{id:16,name:'Jaelyn Garcia',tier:'Tier 2',alignment:'Heel'},

// ── MANUAL IMPORT FROM PLANNER (callable any time) ──
async function importFromPlanner() {
  const session = getSession();
  if (!session) return;
  if (!confirm('This will replace the current roster with data from Planner. Continue?')) return;
  try {
    const pf = (val, fb) => { if (!val) return fb; if (typeof val === 'string') { try { return JSON.parse(val); } catch(e) { return fb; } } return val; };
    const plannerRows = await sbGet('show_planner', 'username=eq.'+encodeURIComponent(session.username)+'&order=updated_at.desc&limit=1');
    if (!plannerRows || !plannerRows.length || plannerRows.error) { showToast('No planner data found'); return; }
    const pd = plannerRows[0];
    const pr = pf(pd.roster, []);
    const pm = pf(pd.roster_mgmt, {});
    if (!pr.length) { showToast('Planner roster is empty'); return; }
    rosterData = pr;
    rosterMgmt = pm;
    if (currentView === 'roster') renderRoster();
    showToast('Imported ' + pr.length + ' wrestlers — click Save!');
  } catch(e) { showToast('Import failed: ' + e.message); console.error(e); }
}

/* ── VIEW SWITCHING ── */
function switchView(view, event) {
  currentView = view;
  document.querySelectorAll('#fsw-sidebar .sidebar-btn').forEach(b => b.classList.remove('active'));
  if (event && event.target) event.target.classList.add('active');
  const filterSection = document.getElementById('filterSection');
  const showTabsContainer = document.getElementById('showTabsContainer');
  const fab = document.getElementById('fab-container');
  if (fab) fab.style.display = (view === 'show') ? 'flex' : 'none';
  if (view === 'show') { filterSection.style.display = 'block'; showTabsContainer.style.display = 'flex'; renderShow(); }
  else if (view === 'checklist') { filterSection.style.display = 'none'; showTabsContainer.style.display = 'flex'; renderChecklist(); }
  else if (view === 'roster') { filterSection.style.display = 'none'; showTabsContainer.style.display = 'none'; renderRoster(); }
  else if (view === 'titlebelts') { filterSection.style.display = 'none'; showTabsContainer.style.display = 'none'; renderTitleBelts(); }
  else if (view === 'storyline') { filterSection.style.display = 'none'; showTabsContainer.style.display = 'none'; renderStoryline(); }
  else if (view === 'promos') { filterSection.style.display = 'none'; showTabsContainer.style.display = 'none'; renderPromos(); }
}

function addMatchFab() {
  if (currentView !== 'show') { showToast('Switch to Shows view first'); return; }
  const showData = showsData[currentShowIndex];
  const section = { id:Date.now(), name:`Match`, notes:'', lines:[
    { id:Date.now()+'-match', type:'Match', checked:false, dropdown:'Normal', matchType:'Singles', matchPosition:'Regular', details:{} },
    { id:Date.now()+'-mw', type:'MatchWrestlers', checked:false, wrestlers:[null,null,null,null,null,null], details:{} }
  ], collapsed:false };
  const closerIndex = showData.sections.findIndex(s => s.isCloser);
  if (closerIndex !== -1) showData.sections.splice(closerIndex, 0, section); else showData.sections.push(section);
  renderShow(); updateProgress();
  showToast('Match added!');
  setTimeout(() => scrollToLastCard(), 80);
}

function addSection() {
  addMatchFab();
}

function scrollToLastCard() {
  const container = document.getElementById('sectionsContainer');
  if (!container) return;
  // find the last section before closer
  const cards = container.querySelectorAll('.section-container');
  if (!cards.length) return;
  // find second-to-last (last before closer)
  let target = cards[cards.length - 1];
  // walk backwards to skip the closer flat row
  for (let i = cards.length - 1; i >= 0; i--) {
    target = cards[i];
    break;
  }
  if (target) {
    target.scrollIntoView({ behavior: 'smooth', block: 'center' });
    target.classList.add('active-section');
    setTimeout(() => target.classList.remove('active-section'), 2500);
  }
}

/* ── PROGRESS ── */
function updateProgress() {
  const showData = showsData[currentShowIndex];
  if (!showData || !showData.sections) return;
  let total = 0, earned = 0;
  showData.sections.forEach(section => section.lines.forEach(line => {
    if (line.type === 'MatchWrestlers' || line.type === 'ParticipantSlots') return;
    let w = 1;
    if (line.type === 'Match') w = 5;
    else if (line.type === 'Promo') w = 4;
    else if (line.type === 'Cutscene') w = 2;
    total += w;
    if (line.checked) earned += w;
  }));
  const pct = total ? Math.round((earned/total)*100) : 0;
  const lbl = document.getElementById('progressPercentage');
  const bar = document.getElementById('progressBar');
  if (lbl) lbl.textContent = `${pct}% completed`;
  if (bar) { bar.style.width = pct+'%'; bar.textContent = pct+'%'; }
}

/* ── FILTERS ── */
function handleFilterChange(filterType) {
  if (filterType === 'All') {
    if (document.getElementById('filter-all').checked) {
      activeFilters = ['All'];
      ['match','promo','cutscene','commercial','notes'].forEach(f => { const el = document.getElementById('filter-'+f); if (el) el.checked = false; });
    } else { activeFilters = []; }
  } else {
    document.getElementById('filter-all').checked = false;
    const checkbox = document.getElementById(`filter-${filterType.toLowerCase()}`);
    if (checkbox && checkbox.checked) { activeFilters = activeFilters.filter(f => f !== 'All'); if (!activeFilters.includes(filterType)) activeFilters.push(filterType); }
    else { activeFilters = activeFilters.filter(f => f !== filterType); }
    if (!activeFilters.length) { activeFilters = ['All']; document.getElementById('filter-all').checked = true; }
  }
}
function applyFilters() { renderShow(); }
function shouldShowLine(line) {
  if (activeFilters.includes('All')) return true;
  return activeFilters.includes(line.type);
}

/* ── SHOW TABS ── */

  const tabsContainer = document.getElementById('showTabsContainer');

    const nameSpan = document.createElement('span'); nameSpan.id = `show-tab-name-${index}`; nameSpan.textContent = show.title || show.name || `Show ${index+1}`;
    nameSpan.title = 'Click to rename';

    nameSpan.onclick = e => {
      if (index !== currentShowIndex) return; // only edit active tab

      nameSpan.style.background = 'rgba(0,0,0,0.25)';
      nameSpan.style.borderRadius = '3px';
      nameSpan.style.padding = '1px 4px';

      range.selectNodeContents(nameSpan); sel.removeAllRanges(); sel.addRange(range);
    };
    nameSpan.onblur = e => {
      nameSpan.contentEditable = 'false';
      nameSpan.style.background = '';
      nameSpan.style.padding = '';
      const newName = (nameSpan.textContent || '').trim() || `Show ${index+1}`;

      showsData[index].name = newName;
    };
    nameSpan.onkeydown = e => { if (e.key === 'Enter') { e.preventDefault(); nameSpan.blur(); } if (e.key === 'Escape') { nameSpan.textContent = show.title||show.name||`Show ${index+1}`; nameSpan.blur(); } };
    const delBtn = document.createElement('button'); delBtn.textContent = '×'; delBtn.style.cssText = 'background:transparent;border:none;color:inherit;font-size:16px;cursor:pointer;padding:0 4px;';

    tab.onclick = () => { currentShowIndex = index; renderShowTabs(); renderShow(); };

  });

/* ── MOVE / DELETE ── */
function getPairedTail(lines, index) {
  const line=lines[index], next=lines[index+1]; if(!next) return null;
  if(line.type==='Match'&&next.type==='MatchWrestlers') return next;
  if(['Promo','Interview','Cutscene','Video Package','Post-Show'].includes(line.type)&&next.type==='ParticipantSlots') return next;
  return null;
}
function unitSize(lines, index) { return getPairedTail(lines,index)?2:1; }
function moveLineUp(sectionIndex, lineIndex) {
  const lines=showsData[currentShowIndex].sections[sectionIndex].lines;
  const line=lines[lineIndex];
  if(line.type==='MatchWrestlers'||line.type==='ParticipantSlots') return;
  const mySize=unitSize(lines,lineIndex);
  if(lineIndex>0){
    const aboveLine=lines[lineIndex-1];
    let aboveHeadIdx=(aboveLine.type==='MatchWrestlers'||aboveLine.type==='ParticipantSlots')?lineIndex-2:lineIndex-1;
    if(aboveHeadIdx<0) return;
    const unit=lines.splice(lineIndex,mySize); lines.splice(aboveHeadIdx,0,...unit); renderShow();
  } else if(sectionIndex>0){
    const unit=lines.splice(lineIndex,mySize); showsData[currentShowIndex].sections[sectionIndex-1].lines.push(...unit); renderShow();
  }
}
function moveLineDown(sectionIndex, lineIndex) {
  const showData=showsData[currentShowIndex]; const lines=showData.sections[sectionIndex].lines;
  const line=lines[lineIndex];
  if(line.type==='MatchWrestlers'||line.type==='ParticipantSlots') return;
  const mySize=unitSize(lines,lineIndex); const lastIdx=lineIndex+mySize-1;
  if(lastIdx<lines.length-1){
    const belowSize=unitSize(lines,lastIdx+1); const unit=lines.splice(lineIndex,mySize); lines.splice(lineIndex+belowSize,0,...unit); renderShow();
  } else if(sectionIndex<showData.sections.length-1){
    const unit=lines.splice(lineIndex,mySize); showData.sections[sectionIndex+1].lines.unshift(...unit); renderShow();
  }
}
function deleteLine(sectionIndex, lineIndex) {
  const showData=showsData[currentShowIndex]; const line=showData.sections[sectionIndex].lines[lineIndex];
  showData.sections[sectionIndex].lines.splice(lineIndex,1);
  if(line.type==='Match'){const nx=showData.sections[sectionIndex].lines[lineIndex];if(nx&&nx.type==='MatchWrestlers')showData.sections[sectionIndex].lines.splice(lineIndex,1);}
  if(['Promo','Interview','Cutscene','Post-Show','Video Package'].includes(line.type)){const nx=showData.sections[sectionIndex].lines[lineIndex];if(nx&&nx.type==='ParticipantSlots')showData.sections[sectionIndex].lines.splice(lineIndex,1);}
  renderShow(); updateProgress();
}

/* ── SECTION MENUS ── */
function showSectionMenu(sectionIndex) {
  const showData=showsData[currentShowIndex]; const panel=document.getElementById('detailsPanel'); clearPanel();
  const title=document.createElement('div'); title.className='details-title'; title.textContent='Section Menu'; panel.appendChild(title);
  const closeBtn=document.createElement('button'); closeBtn.textContent='✕ Close'; closeBtn.style.cssText="display:block;width:100%;margin-bottom:14px;padding:8px 12px;font-size:12px;font-weight:700;cursor:pointer;border-radius:4px;border:1px solid var(--border-input);background:transparent;color:var(--text-tertiary);text-transform:uppercase;"; closeBtn.onclick=()=>clearPanel(); panel.appendChild(closeBtn);
  const menu=document.createElement('div'); menu.className='add-item-menu';
  const section=showData.sections[sectionIndex]; const isSection1=sectionIndex===0; const isCloser=section.isCloser; const isCollapsed=section.collapsed;
  const options=[];
  if(isCollapsed){
    options.push({label:'Maximize',action:()=>toggleSectionCollapse(sectionIndex)});
    if(!isSection1&&!isCloser) options.push({label:'Remove',action:()=>deleteSection(sectionIndex)});
  } else {
    if(isCloser) options.push({label:'Add Item',action:()=>showCloserMenu(sectionIndex),keepPanelOpen:true});
    else options.push({label:'Add Item',action:()=>showAddItemMenu(sectionIndex),keepPanelOpen:true});
    if(!isSection1&&!isCloser){options.push({label:'Move Up',action:()=>moveSectionUp(sectionIndex)});options.push({label:'Move Down',action:()=>moveSectionDown(sectionIndex)});}
    options.push({label:'Minimize',action:()=>toggleSectionCollapse(sectionIndex)});
    if(section.hasNotes) options.push({label:'Remove Notes',action:()=>deleteNotes(sectionIndex)});
    if(!isSection1&&!isCloser) options.push({label:'Remove',action:()=>deleteSection(sectionIndex)});
  }
  options.forEach(opt=>{ const btn=document.createElement('button'); btn.className='add-item-menu-btn'; btn.textContent=opt.label; btn.onclick=()=>{ opt.action(); if(!opt.keepPanelOpen) clearPanel(); }; menu.appendChild(btn); });
  panel.appendChild(menu);
}
function toggleSectionCollapse(si) { showsData[currentShowIndex].sections[si].collapsed=!showsData[currentShowIndex].sections[si].collapsed; renderShow(); }
function moveSectionUp(si) { const d=showsData[currentShowIndex]; if(si<=1) return; const s=d.sections.splice(si,1)[0]; d.sections.splice(si-1,0,s); renderShow(); }
function moveSectionDown(si) { const d=showsData[currentShowIndex]; const ci=d.sections.findIndex(s=>s.isCloser); if(si>=ci-1) return; const s=d.sections.splice(si,1)[0]; d.sections.splice(si+1,0,s); renderShow(); }
function deleteSection(si) {
  const showData=showsData[currentShowIndex]; const section=showData.sections[si];
  if(confirm(`Delete "${section.name||'Section'}" and all its items?`)){ showData.sections.splice(si,1); clearPanel(); renderShow(); updateProgress(); }
}
function deleteNotes(si) { showsData[currentShowIndex].sections[si].hasNotes=false; showsData[currentShowIndex].sections[si].notes=''; renderShow(); }
function addNotesToSection(si) { showsData[currentShowIndex].sections[si].hasNotes=true; renderShow(); clearPanel(); }

function showAddItemMenu(sectionIndex) {
  const showData=showsData[currentShowIndex]; const panel=document.getElementById('detailsPanel'); clearPanel();
  const title=document.createElement('div'); title.className='details-title'; title.textContent='Add Item'; panel.appendChild(title);

  if(isSec1){items=['Promo','Cutscene','Interview','Video Package','Opening','Notes'];if(!hasSig)items=['Opener',...items];}
  else{items=['Match','Promo','Cutscene','Interview','Commercial','Video Package','Notes'];}

function showCloserMenu(sectionIndex) {
  const showData=showsData[currentShowIndex]; const panel=document.getElementById('detailsPanel'); clearPanel();

      renderShow(); updateProgress(); clearPanel();

function addItemToSection(sectionIndex, type) {
  const showData=showsData[currentShowIndex];
  if(type==='Opener') type='Signature'; // Opener is the display name for Signature
  if(type==='Match'){
    showData.sections[sectionIndex].lines.push({id:Date.now(),type:'Match',checked:false,text:'',dropdown:'Normal',matchType:'Singles',matchPosition:'Regular',details:{}});
    showData.sections[sectionIndex].lines.push({id:Date.now()+1,type:'MatchWrestlers',checked:false,wrestlers:[null,null,null,null,null,null],details:{}});
    renderShow(); updateProgress(); clearPanel(); return;
  }
  const item={id:Date.now(),type,checked:false,text:'',dropdown:getDropdownOptions(type)[0]||'',details:type==='Commercial'?{lines:[]}:{}};
  if(['Promo','Interview','Cutscene','Post-Show','Video Package'].includes(type)) item.participantCount=1;
  showData.sections[sectionIndex].lines.push(item);

  renderShow(); updateProgress(); clearPanel();
}

function renderGroupedWrestlerList(panel, sortedRoster, sortBy, onSelect, extraRowBuilder, _usedNames) {
  const makeHeader=text=>{const h=document.createElement('div');h.style.cssText='font-size:10px;font-weight:800;letter-spacing:1.2px;text-transform:uppercase;color:var(--accent-blue);padding:10px 4px 4px;margin-top:6px;border-bottom:1px solid var(--accent-blue);margin-bottom:6px;';h.textContent=text;return h;};
  let getGroup,groupOrder;
  if(sortBy==='Tier'){getGroup=w=>w.tier||'Tier 3';groupOrder=['Tier 1','Tier 2','Tier 3'];}
  else if(sortBy==='Type'){getGroup=w=>w.alignment||'Face';groupOrder=['Face','Heel','Tweener'];}
  else{sortedRoster.forEach(w=>renderWrestlerRow(panel,w,onSelect,extraRowBuilder,_usedNames));return;}
  const groups={};groupOrder.forEach(g=>groups[g]=[]);
  sortedRoster.forEach(w=>{const g=getGroup(w);if(groups[g])groups[g].push(w);else groups[g]=[w];});
  let first=true;
  groupOrder.forEach(gn=>{const members=groups[gn];if(!members||!members.length)return;const h=makeHeader(gn);if(!first)h.style.marginTop='14px';first=false;panel.appendChild(h);members.forEach(w=>renderWrestlerRow(panel,w,onSelect,extraRowBuilder,_usedNames));});
}
function renderWrestlerRow(panel, wrestler, onSelect, extraRowBuilder, _usedNames) {
  const isChamp = !!wrestler.championship;
  const isUsed = _usedNames && _usedNames.has(wrestler.name);
  const c=document.createElement('div');
  c.className='wrestler-list-btn' + (isChamp?' is-champion':'') + (isUsed?' is-used':'');
  if(extraRowBuilder) extraRowBuilder(wrestler,c);
  const nd=document.createElement('div'); nd.style.cssText='flex:1;font-size:13px;font-weight:500;';
  let nameText = wrestler.name;
  if(isChamp) nameText += ' 🏆';
  nd.textContent=nameText;
  c.onclick=()=>onSelect(wrestler); c.appendChild(nd); panel.appendChild(c);
}

/* ── ROSTER MGMT DATA ── */
var rosterMgmt = {};
var rosterSort = null; // 'asc' | 'desc' | null
var _rosterDragSrcIdx = null;

function getRosterMgmt(id) {
  if (!rosterMgmt[id]) rosterMgmt[id] = { downloaded:false, tags:'', rating:'', contact:'', twitter_x:false, instagram:false, nickname:'', weight:'', height:'', hometown:'', created:false, entrance_link:'', notes:'' };
  return rosterMgmt[id];
}
function setRosterMgmt(id, field, val) {
  getRosterMgmt(id)[field] = val;
}

function sortRoster(dir) {
  rosterSort = dir;
  rosterData.sort(function(a,b) {
    var na=(a.name||'').toLowerCase(), nb=(b.name||'').toLowerCase();
    return dir==='asc' ? (na<nb?-1:na>nb?1:0) : (na>nb?-1:na<nb?1:0);
  });
  const asc=document.getElementById('r-sort-asc'), desc=document.getElementById('r-sort-desc');
  if(asc) asc.style.opacity = dir==='asc'?'1':'.35';
  if(desc) desc.style.opacity = dir==='desc'?'1':'.35';
  renderRosterBody();
}

function quickAddRoster() {
  const inp = document.getElementById('roster-quick-inp');
  const name = (inp.value||'').trim();
  if (!name) return;
  const newEntry = { id: Date.now(), name, tier:'Tier 3', alignment:'Face' };
  rosterData.unshift(newEntry); // prepend — appears first
  inp.value = '';
  renderRosterBody();
}

function renderRosterBody() {
  const list = document.getElementById('roster-list-body');
  if (!list) return;
  list.innerHTML = '';
  rosterData.forEach(function(r, idx) { list.appendChild(buildRosterRow(r, idx)); });
}

  });
  handle.addEventListener('dragend', function() {
    row.classList.remove('dragging-src'); _rosterDragSrcIdx = null;
    document.querySelectorAll('.rr').forEach(function(r){ r.classList.remove('drag-over-top','drag-over-bot'); });
  });
  row.addEventListener('dragover', function(e) {
    if (_rosterDragSrcIdx===null || _rosterDragSrcIdx===idx) return;
    e.preventDefault();
    const rect=row.getBoundingClientRect(), mid=rect.top+rect.height/2;
    row.classList.remove('drag-over-top','drag-over-bot');
    row.classList.add(e.clientY<mid?'drag-over-top':'drag-over-bot');
  });
  row.addEventListener('dragleave', function() { row.classList.remove('drag-over-top','drag-over-bot'); });
  row.addEventListener('drop', function(e) {
    e.preventDefault(); row.classList.remove('drag-over-top','drag-over-bot');
    if (_rosterDragSrcIdx===null || _rosterDragSrcIdx===idx) return;
    const rect=row.getBoundingClientRect(), mid=rect.top+rect.height/2;
    const insertBefore=e.clientY<mid;
    const moved=rosterData.splice(_rosterDragSrcIdx,1)[0];
    const targetIdx=idx>_rosterDragSrcIdx?idx-1:idx;
    rosterData.splice(insertBefore?targetIdx:targetIdx+1,0,moved);
    _rosterDragSrcIdx=null;
    renderRosterBody();
  });

  return row;
}

    const items=[];

      if(line.type==='Match'){
        mIdx++;
        const mwl=section.lines[li+1];

        matchRows+=`<tr class="${line.checked?'done':''}"><td class="slot-cell"><span class="slot-label">${_esc(section.name)}</span>${line.checked?'<span class="done-badge">✓ Done</span>':''}</td><td class="names-cell">${_esc(names)}</td><td class="meta-cell">${type?`<span class="tag">${_esc(type)}</span>`:''}${champ?`<br><span class="champ">${_esc(champ)}</span>`:''}</td></tr>`;
      }
    });
  });
  const showName=showData.title||showData.name||'FSW Show'; const today=new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});
  return `<!DOCTYPE html><html><head><meta charset="UTF-8"><link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet"><style>*{margin:0;padding:0;box-sizing:border-box;}body{background:#fff;color:#111;font-family:"DM Sans",sans-serif;padding:40px 48px;}header{border-bottom:3px solid #c0000e;padding-bottom:18px;margin-bottom:28px;}.org{font-size:.65rem;letter-spacing:3px;text-transform:uppercase;color:#888;margin-bottom:4px;}h1{font-family:"Bebas Neue",sans-serif;font-size:2.4rem;letter-spacing:4px;color:#111;line-height:1;}h1 span{color:#c0000e;}.episode{font-size:.8rem;color:#666;margin-top:4px;}table{width:100%;border-collapse:collapse;}thead th{font-size:.6rem;letter-spacing:2px;text-transform:uppercase;color:#999;font-weight:700;padding:8px 12px;text-align:left;border-bottom:2px solid #e8e8e8;}tbody tr{border-bottom:1px solid #f0f0f0;}tbody tr.done{opacity:.55;}td{padding:13px 12px;vertical-align:top;}.slot-cell{width:140px;}.slot-label{font-family:"Bebas Neue",sans-serif;font-size:1rem;letter-spacing:2px;color:#111;display:block;}.done-badge{display:inline-block;margin-top:4px;font-size:.6rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;background:#e6f4ea;color:#2e7d32;padding:2px 7px;border-radius:10px;}.names-cell{font-size:.9rem;font-weight:600;color:#111;padding-right:20px;}.meta-cell{font-size:.8rem;color:#555;}.tag{display:inline-block;background:#f0f0f4;color:#555;padding:2px 8px;border-radius:10px;font-size:.7rem;font-weight:600;}.champ{display:inline-block;margin-top:5px;color:#a07830;font-weight:600;font-size:.8rem;}footer{margin-top:32px;padding-top:14px;border-top:1px solid #e8e8e8;display:flex;justify-content:space-between;align-items:center;}.footer-note{font-size:.65rem;color:#bbb;}</style></head><body><header><div class="org">EFED Streaming Hub — Show Management</div><h1><span>FSW</span> ${_esc(showName)}</h1></header><table><thead><tr><th>Section</th><th>Match-up</th><th>Type / Championship</th></tr></thead><tbody>${matchRows}</tbody></table><footer><span class="footer-note">Generated by EFED Streaming Hub · efed-stream.vercel.app</span><span class="footer-note">${today}</span></footer></body></html>`;
}
function openPdfPreview() {
  const html=buildPdfHtml(); const modal=document.getElementById('fsw-pdf-modal'); const iframe=document.getElementById('fsw-pdf-iframe');
  modal.style.display='flex'; iframe.srcdoc=html;

function downloadPdf() {
  const html=buildPdfHtml(); const blob=new Blob([html],{type:'text/html'}); const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); const cur=showsData[currentShowIndex]; a.href=url; a.download=(cur.title||'show').replace(/[^a-zA-Z0-9_\-]/g,'_')+'_mgmt.html'; a.click(); URL.revokeObjectURL(url);

/* ── SECTION DRAG & DROP ── */
let _dragState = null;
function startSectionDrag(e, sectionIndex, sectionDiv) {
  e.preventDefault(); e.stopPropagation();
  const isTouch = e.type === 'touchstart';
  const startX = isTouch ? e.touches[0].clientX : e.clientX;
  const startY = isTouch ? e.touches[0].clientY : e.clientY;
  const showData = showsData[currentShowIndex];
  const sectionName = showData.sections[sectionIndex].name || `Section ${sectionIndex + 1}`;
  const ghost = document.createElement('div'); ghost.className = 'drag-ghost';
  ghost.textContent = '☰  ' + sectionName;
  ghost.style.left = startX + 12 + 'px'; ghost.style.top = startY - 16 + 'px';
  document.body.appendChild(ghost);
  sectionDiv.classList.add('drag-dragging');
  _dragState = { fromIndex: sectionIndex, ghost, currentOver: null };
  function getPos(ev) { return ev.touches ? { x: ev.touches[0].clientX, y: ev.touches[0].clientY } : { x: ev.clientX, y: ev.clientY }; }
  function onMove(ev) {
    if (!_dragState) return;
    const pos = getPos(ev);
    ghost.style.left = pos.x + 12 + 'px'; ghost.style.top = pos.y - 16 + 'px';
    let overIndex = null;
    document.querySelectorAll('#sectionsContainer .section-container').forEach(el => {
      el.classList.remove('drag-over');
      const r = el.getBoundingClientRect();
      if (pos.y >= r.top && pos.y <= r.bottom && pos.x >= r.left && pos.x <= r.right) { overIndex = parseInt(el.dataset.sectionIndex); el.classList.add('drag-over'); }
    });
    _dragState.currentOver = overIndex;
  }
  function onEnd() {
    if (!_dragState) return;
    const { fromIndex, currentOver, ghost } = _dragState; _dragState = null;
    ghost.remove();
    document.querySelectorAll('#sectionsContainer .section-container').forEach(el => el.classList.remove('drag-dragging','drag-over'));
    if (currentOver !== null && currentOver !== fromIndex) {
      const d = showsData[currentShowIndex]; const sections = d.sections;
      const closerIndex = sections.findIndex(s => s.isCloser);
      if (sections[fromIndex].isSignature || sections[fromIndex].isCloser) return;
      let to = currentOver;
      if (sections[to] && (sections[to].isSignature)) to = 1;
      if (closerIndex !== -1 && to >= closerIndex) to = closerIndex - 1;
      if (to === fromIndex || to < 1) return;
      const [moved] = sections.splice(fromIndex, 1); sections.splice(to, 0, moved);
      renderShow(); showToast('Section moved');
    }
    document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onEnd);
    document.removeEventListener('touchmove', onMove); document.removeEventListener('touchend', onEnd);
  }
  document.addEventListener('mousemove', onMove); document.addEventListener('mouseup', onEnd);
  document.addEventListener('touchmove', onMove, { passive: false }); document.addEventListener('touchend', onEnd);
}

/* ── FAB: SEGMENT MODAL ── */

const SEG_ITEMS = [
  { label: 'Match',         type: 'Match' },
  { label: 'Opener',        type: 'Opener' },
  { label: 'Promo',         type: 'Promo' },
  { label: 'Interview',     type: 'Interview' },
  { label: 'Cutscene',      type: 'Cutscene' },
  { label: 'Video Package', type: 'Video Package' },
  { label: 'Commercial',    type: 'Commercial' },
  { label: 'Closer',        type: 'Closer' },
  { label: 'Notes',         type: 'Notes' },
];

function openSegModal() {
  if (currentView !== 'show') { showToast('Switch to Shows view first'); return; }
  _renderFlatSegModal();
  document.getElementById('seg-modal-backdrop').classList.add('open');
}
function closeSegModalForce() {
  document.getElementById('seg-modal-backdrop').classList.remove('open');
}
function closeSegModal(e) {
  if (e.target === document.getElementById('seg-modal-backdrop')) closeSegModalForce();
}

function _renderFlatSegModal() {
  document.getElementById('seg-modal-title').textContent = 'Add Section';
  document.getElementById('seg-modal-back').classList.remove('visible');
  const body = document.getElementById('seg-modal-body');
  body.innerHTML = '';
  SEG_ITEMS.forEach((item, idx) => {
    const btn = document.createElement('button');
    btn.className = 'seg-menu-btn';
    btn.textContent = item.label;
    btn.onclick = () => { _doAddSegment(item.type); closeSegModalForce(); };
    body.appendChild(btn);
    if (idx === 0) {
      const div = document.createElement('div');
      div.style.cssText = 'height:1px;background:rgba(255,255,255,.08);margin:6px 0;';
      body.appendChild(div);
    }
  });
}

function _doAddSegment(type) {
  if (currentView !== 'show') { showToast('Switch to Shows view first'); return; }
  if (type === 'Match') { addMatchFab(); return; }
  const showData = showsData[currentShowIndex];
  const closerIndex = showData.sections.findIndex(s => s.isCloser);

  if (type === 'Notes') {
    const newSection = { id: Date.now(), name: 'Notes', notes: '', hasNotes: true, lines: [], collapsed: false };
    if (closerIndex !== -1) showData.sections.splice(closerIndex, 0, newSection);
    else showData.sections.push(newSection);
    renderShow(); updateProgress(); showToast('Notes added!');
    setTimeout(() => scrollToLastCard(), 80);
    return;
  }
  if (type === 'Opener') {
    const newSection = { id: Date.now(), name: 'Opener', notes: '', hasNotes: false, lines: [
      { id: Date.now()+1, type: 'Signature', checked: false, text: '', dropdown: '', details: {} }
    ], collapsed: false, isSignature: true };
    showData.sections.unshift(newSection);
    renderShow(); updateProgress(); showToast('Opener added!');
    return;
  }
  if (type === 'Closer') {
    const newSection = { id: Date.now(), name: 'Closer', notes: '', hasNotes: false, lines: [
      { id: Date.now()+1, type: 'Closer', checked: false, text: '', dropdown: '', details: {} }
    ], collapsed: false, isCloser: true };
    showData.sections.push(newSection);
    renderShow(); updateProgress(); showToast('Closer added!');
    return;
  }

  const dropdown = getDropdownOptions(type)[0] || '';
  const item = { id: Date.now(), type, checked: false, text: '', dropdown, details: {} };
  if (['Promo','Interview','Cutscene','Video Package'].includes(type)) item.participantCount = 1;
  const lines = [item];
  if (['Promo','Interview','Cutscene','Video Package'].includes(type)) {
    lines.push({ id: Date.now()+1, type: 'ParticipantSlots', checked: false, participants: [null,null,null,null], details: {} });
  }
  const newSection = { id: Date.now()+2, name: type, notes: '', hasNotes: false, lines, collapsed: false };
  if (closerIndex !== -1) showData.sections.splice(closerIndex, 0, newSection);
  else showData.sections.push(newSection);
  renderShow(); updateProgress();
  showToast(type + ' added!');
  setTimeout(() => scrollToLastCard(), 80);
}

/* hide FABs when not on show view — merged into switchView above */

(function(){
  const SX=15,SY=27,SW=90,SH=52,PX=1;
  const darkG=['#000','#111','#222','#333','#444','#555','#666','#777','#888','#999','#aaa','#bbb','#ccc','#ddd','#eee','#fff'];
  const dayG=['#333','#444','#555','#666','#777','#888','#999','#aaa','#bbb','#ccc','#ddd','#eee','#fff'];
  const NS='http://www.w3.org/2000/svg';
  function renderFrame(el,greys){
    const frag=document.createDocumentFragment();
    for(let y=SY;y<SY+SH;y+=PX){let x=SX;while(x<SX+SW){let w=Math.floor(Math.random()*4)+1;if(x+w>SX+SW)w=SX+SW-x;const r=document.createElementNS(NS,'rect');r.setAttribute('x',x);r.setAttribute('y',y);r.setAttribute('width',w);r.setAttribute('height',PX);r.setAttribute('fill',greys[Math.floor(Math.random()*greys.length)]);frag.appendChild(r);x+=w;}}
    while(el.firstChild)el.removeChild(el.firstChild); el.appendChild(frag);
  }
  function start(){const d=document.getElementById('tv-static-dark');const l=document.getElementById('tv-static-day');if(!d&&!l)return;function tick(){if(d)renderFrame(d,darkG);if(l)renderFrame(l,dayG);}tick();setInterval(tick,42);}
  if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',start);else start();
})();

  initNav();
  await loadShow();
  renderShow();
  updateProgress();
  document.addEventListener('keydown', e => { if(e.key==='Escape') closePdfPreview(); });
});
