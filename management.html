function generateAnnouncementScriptsInline(outCol) {
  const s = _annScriptState;
  const champ = s.championship==='Custom' ? s.championshipCustom : (s.championship==='None'?null:s.championship);
  const spec = s.specialty==='Custom' ? s.specialtyCustom : (s.specialty==='None'?null:s.specialty);
  const isTag = s.matchType==='Tag Team';

  function getW(name) { return rosterData.find(w=>w.name===name) || null; }
  function getMgmt(name) { const w=getW(name); if(!w)return null; return getRosterMgmt(w.id); }

  // ── SCRIPT 1: Match Intro ──
  const introOpeners = ['The following contest','This match','This next match','The following match','Up next'];
  const stipPhrases = spec ? [
    `is a ${spec} match`,
    `is scheduled as a ${spec} match`,
    `will be contested under ${spec} rules`
  ] : [];
  const schedPhrases = ['is scheduled for one fall', 'is scheduled for one fall to a finish'];
  let intro = introOpeners[Math.floor(Math.random()*introOpeners.length)];
  intro += '…';
  if (stipPhrases.length) intro += ' ' + stipPhrases[Math.floor(Math.random()*stipPhrases.length)];
  else { intro += ' ' + schedPhrases[Math.floor(Math.random()*schedPhrases.length)]; }
  if (s.customRules==='Yes' && s.customRulesText) intro += ` — ${s.customRulesText}`;
  if (champ) {
    const champPhrases = [
      `…and it is for the ${champ}!`,
      `…and the ${champ} is on the line!`,
      `…for the ${champ}!`
    ];
    intro += ' ' + champPhrases[Math.floor(Math.random()*champPhrases.length)];
  } else {
    intro += '!';
  }

  // ── SCRIPT 2: Wrestler Introductions (in-ring style) ──
  function buildIntro(compKey, isFirst) {
    const comp = s[compKey];
    if (!comp.wrestler) return '';
    const wData = getW(comp.wrestler);
    const wMgmt = getMgmt(comp.wrestler);
    const managers = [comp.manager1, comp.manager2, comp.manager3].filter(Boolean);
    const isChamp = champ && wData && wData.championship && wData.championship === champ;

    if (isTag) {
      const member1 = comp.wrestler;
      const member2 = comp.manager1;
      const m1mgmt = getMgmt(member1);
      const m2mgmt = getMgmt(member2);
      const w1 = m1mgmt&&m1mgmt.weight ? parseInt(m1mgmt.weight)||0 : 0;
      const w2 = m2mgmt&&m2mgmt.weight ? parseInt(m2mgmt.weight)||0 : 0;
      const combined = (w1&&w2) ? `with a combined weight of ${w1+w2} pounds, ` : '';
      const faction1 = m1mgmt&&m1mgmt.faction ? m1mgmt.faction : null;
      const f1 = faction1 ? `representing ${faction1}, ` : '';
      let line = isFirst
        ? `Introducing first, ${combined}${f1}${member1||'???'}${member2?' and '+member2:''}!`
        : `And their opponents, ${combined}${f1}${member1||'???'}${member2?' and '+member2:''}!`;
      return line;
    }

    // Singles — in-ring style intro
    const weight = wMgmt&&wMgmt.weight ? wMgmt.weight : null;
    const hometown = wMgmt&&wMgmt.hometown ? wMgmt.hometown : null;
    const nickname = wMgmt&&wMgmt.nickname ? '"'+wMgmt.nickname+'"' : null;
    const faction = wMgmt&&wMgmt.faction ? wMgmt.faction : null;

    let line;
    if (isFirst) {
      // Challenger always introduced first in championship matches
      line = 'Introducing first, the challenger';
    } else {
      if (isChamp) {
        line = 'And introducing, the champion';
      } else {
        line = 'And his opponent';
      }
    }

    if (managers.length) {
      line += `, accompanied by ${managers.join(' and ')}`;
    }

    const parts = [];
    if (hometown) parts.push(`from ${hometown}`);
    if (weight) parts.push(`weighing in at ${weight} pounds`);
    if (faction) parts.push(`representing ${faction}`);

    if (parts.length) line += ', ' + parts.join(', ');
    if (nickname) line += `, ${nickname}`;
    line += `, ${comp.wrestler}!!`;
    return line;
  }

  let introScript = buildIntro('comp1', true);
  if (s.comp2.wrestler) introScript += '\n\n' + buildIntro('comp2', false);

  // ── SCRIPT 3: Winner Announcement ──
  let winnerScript = '';
  if (s.winner) {
    const wData = getW(s.winner);
    const wasChallenger = champ && wData && (!wData.championship || wData.championship !== champ);
    const andStill = (champ && wData && wData.championship === champ) ? 'AND STILL ' : '';
    const andNew = (champ && wasChallenger) ? 'AND NEW ' : '';
    const champStatus = andStill || andNew;
    const winPhrases = [
      `Here is your winner`,
      `The winner of this match`,
      `Your winner`
    ];
    const phrase = winPhrases[Math.floor(Math.random()*winPhrases.length)];
    if (champ) {
      winnerScript = `${phrase}… ${champStatus}FSW ${champ}… ${s.winner}!!!`;
    } else {
      winnerScript = `${phrase}… ${s.winner}!!!`;
    }
  }

  // ── Render output into right column ──
  let outSection = outCol.querySelector('#ann-output-section');
  if (!outSection) return;
  outSection.innerHTML = '';
  outSection.style.cssText = 'display:flex;flex-direction:column;gap:14px;';

  const sepLbl = document.createElement('div');
  sepLbl.style.cssText = "font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--text-muted);margin-bottom:4px;padding-bottom:10px;border-bottom:1px solid rgba(255,255,255,.07);";
  sepLbl.textContent = 'Generated Scripts';
  outSection.appendChild(sepLbl);

  function buildOutputCard(label, text, color, scriptIndex) {
    const card = document.createElement('div');
    card.style.cssText = `padding:14px 16px;background:rgba(255,255,255,.03);border:1px solid ${color||'rgba(255,255,255,.1)'};border-left:3px solid ${color||'rgba(255,255,255,.3)'};border-radius:8px;display:flex;flex-direction:column;gap:10px;`;
    const lbl = document.createElement('div');
    lbl.style.cssText = "font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text-muted);";
    lbl.textContent = label;
    const ta = document.createElement('textarea');
    ta.readOnly = true;
    ta.value = text;
    ta.style.cssText = 'width:100%;background:transparent;border:none;outline:none;color:#e8e8e8;font-family:"DM Sans",sans-serif;font-size:.82rem;line-height:1.6;resize:none;min-height:60px;';
    ta.rows = Math.max(2, text.split('\n').length + 1);
    const btns = document.createElement('div');
    btns.style.cssText = 'display:flex;gap:8px;align-items:center;';

    // Clipboard button with tooltip
    const copyBtn = document.createElement('button');
    copyBtn.style.cssText = 'padding:7px 18px;background:rgba(200,168,75,.15);border:1px solid rgba(200,168,75,.3);color:#c8a84b;border-radius:5px;font-size:.78rem;font-weight:700;cursor:pointer;transition:all .15s;position:relative;';
    copyBtn.innerHTML = '📋 Copy';

    const clipTip = document.createElement('div');
    clipTip.style.cssText = 'position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:rgba(20,20,28,.97);border:1px solid rgba(200,168,75,.35);border-radius:6px;padding:5px 10px;font-size:.72rem;color:#c8a84b;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .15s;font-family:"DM Sans",sans-serif;font-weight:500;z-index:50;';
    clipTip.textContent = 'Review your match details in the last column';
    copyBtn.appendChild(clipTip);
    let clipTimer = null;
    copyBtn.onmouseenter = ()=>{
      copyBtn.style.background='rgba(200,168,75,.25)';
      clipTip.style.opacity='1';
      clearTimeout(clipTimer);
      clipTimer = setTimeout(()=>{ clipTip.style.opacity='0'; }, 3000);
    };
    copyBtn.onmouseleave = ()=>{
      copyBtn.style.background='rgba(200,168,75,.15)';
      clipTip.style.opacity='0';
      clearTimeout(clipTimer);
    };
    copyBtn.onclick=()=>{
      navigator.clipboard.writeText(ta.value).then(()=>{
        copyBtn.innerHTML='✓ Copied!'; copyBtn.style.background='rgba(76,175,100,.2)'; copyBtn.style.borderColor='rgba(76,175,100,.4)'; copyBtn.style.color='#4caf64';
        setTimeout(()=>{ copyBtn.innerHTML='📋 Copy'; copyBtn.style.background='rgba(200,168,75,.15)'; copyBtn.style.borderColor='rgba(200,168,75,.3)'; copyBtn.style.color='#c8a84b'; },2000);
      }).catch(()=>{});
    };

    // Regenerate only this script
    const regenBtn = document.createElement('button');
    regenBtn.innerHTML = '↺ Regenerate';
    regenBtn.style.cssText = 'padding:7px 14px;background:transparent;border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.5);border-radius:5px;font-size:.78rem;font-weight:700;cursor:pointer;transition:all .15s;';
    regenBtn.onmouseenter=()=>{ regenBtn.style.borderColor='rgba(255,255,255,.4)'; regenBtn.style.color='#fff'; };
    regenBtn.onmouseleave=()=>{ regenBtn.style.borderColor='rgba(255,255,255,.15)'; regenBtn.style.color='rgba(255,255,255,.5)'; };
    regenBtn.onclick=()=>{
      // Only regenerate this specific script
      const newText = regenerateSingleScript(scriptIndex);
      if (newText) { ta.value = newText; ta.rows = Math.max(2, newText.split('\n').length + 1); }
    };

    btns.appendChild(copyBtn); btns.appendChild(regenBtn);
    card.appendChild(lbl); card.appendChild(ta); card.appendChild(btns);
    return card;
  }

  outSection.appendChild(buildOutputCard('Script 1 — Match Introduction', intro, 'rgba(100,140,220,.4)', 1));
  if (introScript) outSection.appendChild(buildOutputCard('Script 2 — Competitor Introductions', introScript, 'rgba(200,168,75,.35)', 2));
  if (winnerScript) outSection.appendChild(buildOutputCard('Script 3 — Winner Announcement', winnerScript, 'rgba(76,175,100,.4)', 3));

  // Auto-scroll to output: always scroll the mainArea so user sees results
  setTimeout(() => {
    const mainArea = document.getElementById('mainArea');
    const outCol = document.getElementById('ann-output-col');
    if (!outCol || !mainArea) return;
    const formWrap = document.getElementById('ann-form-wrap');
    // On narrow screens (stacked), outCol will be below leftCol — scroll mainArea to it
    const isStacked = formWrap && outCol.getBoundingClientRect().top > (formWrap.getBoundingClientRect().top + 100);
    if (isStacked) {
      outCol.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
  }, 60);
}

        const combined=(w1&&w2)?`with a combined weight of ${w1+w2} pounds, `:'';

      }

      let line = isFirst?'Introducing first, the challenger':(isChamp?'And introducing, the champion':'And his opponent');
      if (managers.length) line+=`, accompanied by ${managers.join(' and ')}`;
      const parts=[]; if(hometown)parts.push(`from ${hometown}`); if(weight)parts.push(`weighing in at ${weight} pounds`); if(faction)parts.push(`representing ${faction}`);
      if(parts.length)line+=', '+parts.join(', '); if(nickname)line+=`, ${nickname}`;
      line+=`, ${comp.wrestler}!!`;
      return line;
    }
    let txt = buildIntro('comp1',true);
    if(s.comp2.wrestler) txt+='\n\n'+buildIntro('comp2',false);
    return txt;
  }
  if (scriptIndex === 3 && s.winner) {
    const wData = getW(s.winner);
    const wasChallenger = champ && wData && (!wData.championship || wData.championship !== champ);
    const andStill = (champ && wData && wData.championship === champ) ? 'AND STILL ' : '';
    const andNew = (champ && wasChallenger) ? 'AND NEW ' : '';
    const champStatus = andStill || andNew;
    const winPhrases = ['Here is your winner','The winner of this match','Your winner'];
    const phrase = winPhrases[Math.floor(Math.random()*winPhrases.length)];
    return champ ? `${phrase}… ${champStatus}FSW ${champ}… ${s.winner}!!!` : `${phrase}… ${s.winner}!!!`;
  }
  return null;
}

/* ── SECTION DRAG & DROP ── */
let _dragState = null;
function startSectionDrag(e, sectionIndex, sectionDiv) {
  e.preventDefault(); e.stopPropagation();
  const isTouch = e.type === 'touchstart';
  const clientX = isTouch ? e.touches[0].clientX : e.clientX;
  const clientY = isTouch ? e.touches[0].clientY : e.clientY;

  // Find the real card wrapper to clone
  const wrapEl = document.querySelector(`#sectionsContainer .card-wrapper[data-section-index="${sectionIndex}"]`) || sectionDiv;

  // Build a visual clone of the entire card (tab + body)
  const ghost = document.createElement('div');
  ghost.className = 'drag-ghost-card';
  const rect = wrapEl.getBoundingClientRect();
  ghost.style.width = rect.width + 'px';
  // Clone inner HTML so it looks identical
  ghost.innerHTML = wrapEl.innerHTML;
  // Position: offset so cursor is where the drag handle is
  const offsetX = clientX - rect.left;
  const offsetY = clientY - rect.top;
  ghost.style.left = (clientX - offsetX) + 'px';
  ghost.style.top  = (clientY - offsetY) + 'px';
  document.body.appendChild(ghost);

  // Fade the source card
  if (wrapEl) wrapEl.classList.add('drag-dragging');

  _dragState = { fromIndex: sectionIndex, ghost, currentOver: null, offsetX, offsetY };

  function getPos(ev) { return ev.touches ? { x: ev.touches[0].clientX, y: ev.touches[0].clientY } : { x: ev.clientX, y: ev.clientY }; }

  function clearInsertLine() {
    const old = document.getElementById('drag-insert-line');
    if (old) old.remove();
  }

  function showInsertLine(beforeEl) {
    clearInsertLine();
    const line = document.createElement('div');
    line.className = 'drag-insert-line';
    line.id = 'drag-insert-line';
    if (beforeEl) {
      beforeEl.parentNode.insertBefore(line, beforeEl);
    } else {
      // append at end of container
      const container = document.getElementById('sectionsContainer');
      if (container) container.appendChild(line);
    }
  }

  function onMove(ev) {
    if (!_dragState) return;
    if (ev.cancelable) ev.preventDefault();
    const pos = getPos(ev);
    ghost.style.left = (pos.x - _dragState.offsetX) + 'px';
    ghost.style.top  = (pos.y - _dragState.offsetY) + 'px';

    const container = document.getElementById('sectionsContainer');
    const wrappers = Array.from(container.querySelectorAll('.card-wrapper'));
    let insertBefore = null;
    let foundOver = false;

    for (const el of wrappers) {
      const r = el.getBoundingClientRect();
      const mid = r.top + r.height / 2;
      if (pos.y < mid) {
        insertBefore = el;
        foundOver = true;
        break;
      }
    }

    // Determine target index
    if (insertBefore) {
      _dragState.currentOver = parseInt(insertBefore.dataset.sectionIndex);
      _dragState.insertBefore = insertBefore;
    } else {
      _dragState.currentOver = wrappers.length > 0 ? parseInt(wrappers[wrappers.length - 1].dataset.sectionIndex) + 1 : 0;
      _dragState.insertBefore = null;
    }

    showInsertLine(_dragState.insertBefore);
  }

  function onEnd() {
    if (!_dragState) return;
    const { fromIndex, currentOver, insertBefore } = _dragState;
    _dragState = null;
    ghost.remove();
    clearInsertLine();
    document.querySelectorAll('#sectionsContainer .card-wrapper').forEach(el => el.classList.remove('drag-dragging'));
    if (currentOver !== null && currentOver !== fromIndex) {
      const d = showsData[currentShowIndex]; const sections = d.sections;
      let to = currentOver;
      if (to > fromIndex) to--; // account for removal shift
      if (to === fromIndex) { renderShow(); return; }
      const [moved] = sections.splice(fromIndex, 1); sections.splice(to, 0, moved);
      renderShow(); showToast('Section moved');
    }
    document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onEnd);
    document.removeEventListener('touchmove', onMove); document.removeEventListener('touchend', onEnd);
  }

  document.addEventListener('mousemove', onMove); document.addEventListener('mouseup', onEnd);
  document.addEventListener('touchmove', onMove, { passive: false }); document.addEventListener('touchend', onEnd);
}

  inp.addEventListener('keydown', e => { if (e.key === 'Enter') addBtn.click(); if (e.key === 'Escape') bd.remove(); });
  row.appendChild(cancelBtn); row.appendChild(addBtn);
  modal.appendChild(row); bd.appendChild(modal); document.body.appendChild(bd);
  setTimeout(() => inp.focus(), 50);
}

/* ── SEGMENT LABEL MODAL ── */
function showSegmentLabelModal(sectionIndex) {
  const existing = document.getElementById('seglabel-modal-bd');
  if (existing) existing.remove();
  const bd = document.createElement('div');
  bd.id = 'seglabel-modal-bd';
  bd.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:700;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(3px);';
  bd.onclick = e => { if (e.target === bd) bd.remove(); };
  const modal = document.createElement('div');
  modal.style.cssText = 'background:#111114;border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:20px 22px 18px;width:320px;box-shadow:0 24px 64px rgba(0,0,0,.8);';
  const h = document.createElement('div');
  h.style.cssText = 'font-family:"Barlow Condensed",sans-serif;font-size:1rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#e8e8e8;margin-bottom:6px;';
  h.textContent = 'What kind of segment is this?';
  modal.appendChild(h);
  const inp = document.createElement('input');
  inp.type = 'text'; inp.maxLength = 60; inp.placeholder = 'e.g. Backstage Attack';
  inp.style.cssText = 'width:100%;padding:9px 12px;background:#1a1a22;border:1px solid rgba(255,255,255,.15);border-radius:6px;color:#e8e8e8;font-family:"DM Sans",sans-serif;font-size:.88rem;outline:none;margin:10px 0 14px;transition:border-color .2s;';
  inp.onfocus = () => inp.style.borderColor = 'rgba(200,168,75,.6)';
  inp.onblur  = () => inp.style.borderColor = 'rgba(255,255,255,.15)';
  modal.appendChild(inp);
  const row = document.createElement('div'); row.style.cssText = 'display:flex;gap:8px;';
  const cancelBtn = document.createElement('button');
  cancelBtn.textContent = 'Cancel';
  cancelBtn.style.cssText = 'flex:1;padding:8px 12px;font-size:12px;font-weight:700;cursor:pointer;border-radius:6px;border:1px solid rgba(255,255,255,.15);background:transparent;color:rgba(255,255,255,.5);font-family:"DM Sans",sans-serif;';
  cancelBtn.onclick = () => bd.remove();
  const addBtn = document.createElement('button');
  addBtn.textContent = 'Set';
  addBtn.style.cssText = 'flex:1;padding:8px 12px;font-size:12px;font-weight:700;cursor:pointer;border-radius:6px;border:none;background:#b0b4bc;color:#111;font-family:"DM Sans",sans-serif;';
  addBtn.onclick = () => {
    const val = inp.value.trim();
    if (!val) return;
    showsData[currentShowIndex].sections[sectionIndex].specialtyLabel = val;
    bd.remove();
    renderShow();
  };
  inp.addEventListener('keydown', e => { if (e.key === 'Enter') addBtn.click(); if (e.key === 'Escape') bd.remove(); });
  row.appendChild(cancelBtn); row.appendChild(addBtn);
  modal.appendChild(row); bd.appendChild(modal); document.body.appendChild(bd);
  setTimeout(() => inp.focus(), 50);
}

/* ── FAB: SEGMENT MODAL ── */

const SEG_ITEMS = [
  { label: 'Opener',        type: 'Opener' },
  { label: 'Promo',         type: 'Promo' },
  { label: 'Interview',     type: 'Interview' },
  { label: 'Cutscene',      type: 'Cutscene' },
  { label: 'Video Package', type: 'Video Package' },
  { label: 'Commercial',    type: 'Commercial' },
  { label: 'Closer',        type: 'Closer' },
];

function openSegModal() {
  if (currentView !== 'show') { showToast('Switch to Shows view first'); return; }
  _renderFlatSegModal();
  document.getElementById('seg-modal-backdrop').classList.add('open');
}
function closeSegModalForce() {
  document.getElementById('seg-modal-backdrop').classList.remove('open');
}
function closeSegModal(e) {
  if (e.target === document.getElementById('seg-modal-backdrop')) closeSegModalForce();
}

function _renderFlatSegModal() {
  document.getElementById('seg-modal-title').textContent = 'Add Section';
  document.getElementById('seg-modal-back').classList.remove('visible');
  const body = document.getElementById('seg-modal-body');
  body.innerHTML = '';

  // MATCH option
  const matchBtn = document.createElement('button');
  matchBtn.className = 'seg-menu-btn seg-menu-btn--card';
  matchBtn.innerHTML = `
    <div class="seg-card-icon seg-card-icon--match">🤼</div>
    <div class="seg-card-text">
      <div class="seg-card-label">MATCH</div>
      <div class="seg-card-flavor">Add a singles, tag, or championship bout to the card</div>
    </div>`;
  matchBtn.onclick = () => { _doAddSegment('Match'); closeSegModalForce(); };
  body.appendChild(matchBtn);

  // SEGMENT option
  const segBtn = document.createElement('button');
  segBtn.className = 'seg-menu-btn seg-menu-btn--card';
  segBtn.innerHTML = `
    <div class="seg-card-icon seg-card-icon--seg">🎬</div>
    <div class="seg-card-text">
      <div class="seg-card-label">SEGMENT</div>
      <div class="seg-card-flavor">Add a promo, interview, cutscene, or other show segment</div>
    </div>`;
  segBtn.onclick = () => { _doAddSegment('Promo'); closeSegModalForce(); };
  body.appendChild(segBtn);
}

function _doAddSegment(type) {
  if (currentView !== 'show') { showToast('Switch to Shows view first'); return; }
  if (type === 'Match') { addMatchFab(); return; }
  const showData = showsData[currentShowIndex];
  const closerIndex = showData.sections.findIndex(s => s.isCloser);

  if (type === 'Notes') {
    const newSection = { id: Date.now(), name: 'Notes', notes: '', hasNotes: true, lines: [], collapsed: false };
    if (closerIndex !== -1) showData.sections.splice(closerIndex, 0, newSection);
    else showData.sections.push(newSection);
    renderShow(); updateProgress(); showToast('Notes added!');
    setTimeout(() => scrollToLastCard(), 80);
    return;
  }
  if (type === 'Opener') {
    const newSection = { id: Date.now(), name: 'Opener', notes: '', hasNotes: false, lines: [
      { id: Date.now()+1, type: 'Signature', checked: false, text: '', dropdown: '', details: {} }
    ], collapsed: false, isSignature: true };
    showData.sections.unshift(newSection);
    renderShow(); updateProgress(); showToast('Opener added!');
    return;
  }
  if (type === 'Closer') {
    const newSection = { id: Date.now(), name: 'Closer', notes: '', hasNotes: false, lines: [
      { id: Date.now()+1, type: 'Closer', checked: false, text: '', dropdown: '', details: {} }
    ], collapsed: false, isCloser: true };
    showData.sections.push(newSection);
    renderShow(); updateProgress(); showToast('Closer added!');
    return;
  }

  const segTypes = ['Promo','Interview','Cutscene','Video Package','Post-Show','Commercial','Notes','Opener','Closer'];
  const segCount = showData.sections.filter(s => s.lines && s.lines.some(l => !['Match','MatchWrestlers','ParticipantSlots'].includes(l.type)) && !s.isCloser && !s.isSignature).length;
  const segNum = segCount + 1;
  const tabLabel = segNum === 1 ? 'SEGMENT' : 'SEGMENT ' + segNum;
  const dropdown = '';
  const item = { id: Date.now(), type, checked: false, text: '', dropdown, details: {} };
  if (['Promo','Interview','Cutscene','Video Package'].includes(type)) item.participantCount = 0;
  const lines = [item];
  if (['Promo','Interview','Cutscene','Video Package'].includes(type)) {
    lines.push({ id: Date.now()+1, type: 'ParticipantSlots', checked: false, participants: [null,null,null,null], details: {} });
  }
  const newSection = { id: Date.now()+2, name: type, tabName: tabLabel, notes: '', hasNotes: false, lines, collapsed: false };
  if (closerIndex !== -1) showData.sections.splice(closerIndex, 0, newSection);
  else showData.sections.push(newSection);
  renderShow(); updateProgress();
  showToast('Segment ' + segNum + ' added!');
  setTimeout(() => scrollToNewCard(), 80);
}

/* hide FABs when not on show view — merged into switchView above */

(function(){
  const SX=15,SY=27,SW=90,SH=52,PX=1;
  const darkG=['#000','#111','#222','#333','#444','#555','#666','#777','#888','#999','#aaa','#bbb','#ccc','#ddd','#eee','#fff'];
  const dayG=['#333','#444','#555','#666','#777','#888','#999','#aaa','#bbb','#ccc','#ddd','#eee','#fff'];
  const NS='http://www.w3.org/2000/svg';
  function renderFrame(el,greys){
    const frag=document.createDocumentFragment();
    for(let y=SY;y<SY+SH;y+=PX){let x=SX;while(x<SX+SW){let w=Math.floor(Math.random()*4)+1;if(x+w>SX+SW)w=SX+SW-x;const r=document.createElementNS(NS,'rect');r.setAttribute('x',x);r.setAttribute('y',y);r.setAttribute('width',w);r.setAttribute('height',PX);r.setAttribute('fill',greys[Math.floor(Math.random()*greys.length)]);frag.appendChild(r);x+=w;}}
    while(el.firstChild)el.removeChild(el.firstChild); el.appendChild(frag);
  }
  function start(){const d=document.getElementById('tv-static-dark');const l=document.getElementById('tv-static-day');if(!d&&!l)return;function tick(){if(d)renderFrame(d,darkG);if(l)renderFrame(l,dayG);}tick();setInterval(tick,42);}
  if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',start);else start();
})();

  // Load persisted custom job items
  try { window._customJobItems = JSON.parse(localStorage.getItem('efed_custom_job_items') || '[]'); } catch(e) { window._customJobItems = []; }
  try { window._customOpenerItems = JSON.parse(localStorage.getItem('efed_custom_opener_items') || '[]'); } catch(e) { window._customOpenerItems = []; }
  initNav();
  await loadShow();
  renderShow();
  updateProgress();
  document.addEventListener('keydown', e => { if(e.key==='Escape') closePdfPreview(); });
});
