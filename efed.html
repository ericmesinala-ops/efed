<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #07070a; --surface: #111114; --surface2: #1a1a1f;
  --accent: #c0000e; --gold: #c8a84b; --text: #e8e8e8;
  --muted: #8a8a9a; --border: rgba(255,255,255,.07);
}
body { background: #000; color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }

/* ── FLOATING CARD ── */
.page-card {
  max-width: 500px; margin: 0 auto;
  background: var(--bg);
  box-shadow: 0 0 0 1px rgba(255,255,255,.05), 0 32px 80px rgba(0,0,0,.9), 0 8px 32px rgba(0,0,0,.6);
  min-height: 100vh;
  position: relative;
}

/* ── NAV (identical to index.html) ── */
nav {
  position: sticky; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px;
  background: rgba(7,7,10,.97);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid rgba(255,255,255,.04);
}
nav.scrolled { background: rgba(7,7,10,.99); }
.logo { display: flex; flex-direction: column; line-height: 1; text-decoration: none; }
.logo-eyebrow { display: none; }
.logo-main { font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; letter-spacing: 3px; color: #fff; white-space: nowrap; }
.logo-main em { color: var(--gold); font-style: normal; }
.nav-right { display: flex; align-items: center; gap: 16px; }
.nav-invite-btn {
  display: none; align-items: center; gap: 6px;
  background: linear-gradient(135deg, #ff6a00, #e05000);
  border: none; color: #fff; font-family: 'DM Sans', sans-serif;
  font-size: .62rem; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase;
  padding: 7px 16px; border-radius: 40px; cursor: pointer;
  box-shadow: 0 2px 16px rgba(255,106,0,.45), inset 0 1px 0 rgba(255,255,255,.2);
  transition: box-shadow .2s, transform .15s; white-space: nowrap;
}
.nav-invite-btn.visible { display: flex; }
.nav-invite-btn:hover { box-shadow: 0 4px 24px rgba(255,106,0,.65); transform: translateY(-1px); }
.nav-search-wrap { display: flex; align-items: center; position: relative; }
.nav-search-btn { background: none; border: none; cursor: pointer; color: rgba(255,255,255,.55); padding: 6px; display: flex; align-items: center; justify-content: center; transition: color .2s; }
.nav-search-btn:hover { color: #fff; }
.nav-search-input {
  position: fixed; left: 0; right: 0; top: 56px;
  width: 100% !important; border-radius: 0;
  border: none; border-bottom: 1px solid rgba(255,255,255,.1);
  background: rgba(7,7,10,.97) !important; backdrop-filter: blur(20px);
  color: #fff; font-family: 'DM Sans', sans-serif; font-size: .88rem;
  padding: 0 !important; height: 0; overflow: hidden; outline: none;
  transition: height .25s ease, padding .25s ease; z-index: 200;
}
.nav-search-input::placeholder { color: rgba(255,255,255,.3); }
.nav-search-wrap.open .nav-search-input { height: 50px !important; padding: 0 24px !important; }
.nav-auth-btn {
  display: flex; align-items: center; gap: 7px; background: rgba(255,255,255,.08);
  border: 1px solid rgba(255,255,255,.18); color: rgba(255,255,255,.9);
  font-family: 'DM Sans', sans-serif; font-size: .62rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
  padding: 6px 14px; border-radius: 40px; cursor: pointer; white-space: nowrap;
}
.nav-auth-btn:hover { background: rgba(255,255,255,.14); color: #fff; }
.nav-auth-btn.hidden { display: none; }
.nav-icon-btn { background: none; border: none; cursor: pointer; color: rgba(255,255,255,.6); padding: 6px; display: flex; align-items: center; justify-content: center; border-radius: 50%; transition: color .2s, background .2s; width: 36px; height: 36px; }
.nav-icon-btn:hover { color: #fff; background: rgba(255,255,255,.08); }
.nav-avatar-initials { width: 32px; height: 32px; border-radius: 50%; border: 2px solid rgba(200,168,75,.4); background: rgba(200,168,75,.12); color: var(--gold); font-size: .62rem; font-weight: 700; letter-spacing: 1px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; min-width: 32px; }
.nav-icon-btn .nav-avatar-initials { width: 28px; height: 28px; min-width: 28px; font-size: .55rem; }
.nav-user-wrap { position: relative; }
.user-dropdown { position: absolute; top: calc(100% + 10px); right: 0; background: rgba(13,13,16,.98); border: 1px solid rgba(255,255,255,.1); border-radius: 10px; min-width: 200px; padding: 6px 0; opacity: 0; pointer-events: none; transform: translateY(-6px); transition: opacity .2s, transform .2s; box-shadow: 0 20px 48px rgba(0,0,0,.7); z-index: 400; }
.user-dropdown.open { opacity: 1; pointer-events: all; transform: translateY(0); }
.dropdown-header { padding: 12px 16px 8px; border-bottom: 1px solid rgba(255,255,255,.06); margin-bottom: 4px; }
.dropdown-name { font-size: .85rem; font-weight: 600; color: #fff; margin-bottom: 2px; display: flex; align-items: center; gap: 5px; }
.dropdown-email { font-size: .7rem; color: var(--muted); }
.dropdown-item { display: flex; align-items: center; gap: 10px; padding: 9px 16px; font-size: .78rem; color: rgba(255,255,255,.55); cursor: pointer; transition: background .15s, color .15s; background: none; border: none; width: 100%; text-align: left; font-family: 'DM Sans', sans-serif; }
.dropdown-item:hover { background: rgba(255,255,255,.05); color: rgba(255,255,255,.85); }
.dropdown-item.danger { color: rgba(255,80,80,.6); }
.dropdown-item.danger:hover { background: rgba(192,0,14,.08); color: #ff6b6b; }
.bnav-notif-dot { display: none; position: absolute; width: 7px; height: 7px; border-radius: 50%; background: var(--accent); border: 1.5px solid var(--bg); }
.bnav-notif-dot.visible { display: block; }

/* ── PAGE CONTENT ── */
.page-wrap { max-width: 680px; margin: 0 auto; padding: 0 20px; }

/* ── BANNER ── */
.efed-banner {
  height: 240px; position: relative; overflow: hidden;
  display: flex; align-items: flex-end;
  background: linear-gradient(135deg, #1a0005 0%, #0d0d12 50%, #07070a 100%);
  margin-top: 0;
}
.efed-banner-noise { position: absolute; inset: 0; opacity: .04; background-image: repeating-linear-gradient(45deg, #fff 0, #fff 1px, transparent 0, transparent 50%); background-size: 20px 20px; }
.efed-banner-glow { position: absolute; inset: 0; background: radial-gradient(ellipse 80% 100% at 30% 60%, rgba(192,0,14,.25) 0%, transparent 70%); }
.efed-banner-inner { padding: 0 28px 24px; position: relative; z-index: 2; display: flex; align-items: flex-end; gap: 18px; width: 100%; }
.efed-logo-box { width: 80px; height: 80px; border-radius: 14px; background: rgba(192,0,14,.12); border: 2px solid rgba(192,0,14,.35); display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; letter-spacing: 2px; color: var(--accent); }
.efed-name { font-family: 'Bebas Neue', sans-serif; font-size: 1.7rem; letter-spacing: 3px; color: #fff; line-height: 1; margin-bottom: 5px; }
.efed-meta { font-size: .6rem; color: rgba(255,255,255,.35); letter-spacing: 2px; text-transform: uppercase; display: flex; align-items: center; gap: 8px; }
.efed-meta span { display: flex; align-items: center; gap: 4px; }

/* ── STATS BAR ── */
.stats-bar { display: flex; background: #0c0c0f; border-bottom: 1px solid var(--border); }
.stat-pill { flex: 1; padding: 14px 0; text-align: center; border-right: 1px solid rgba(255,255,255,.05); }
.stat-pill:last-child { border-right: none; }
.stat-num { font-family: 'Bebas Neue', sans-serif; font-size: 1.3rem; letter-spacing: 1px; color: #fff; line-height: 1; }
.stat-lbl { font-size: .5rem; color: #5a5a6a; letter-spacing: 2px; text-transform: uppercase; margin-top: 3px; }

/* ── OWNER ROW ── */
.owner-row { display: flex; align-items: center; gap: 12px; padding: 14px 20px; border-bottom: 1px solid var(--border); }
.owner-av { width: 38px; height: 38px; border-radius: 50%; background: rgba(200,168,75,.1); border: 2px solid rgba(200,168,75,.3); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: .9rem; color: var(--gold); flex-shrink: 0; font-family: 'Bebas Neue', sans-serif; }
.owner-lbl { font-size: .55rem; color: #5a5a6a; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 2px; }
.owner-name { font-size: .85rem; font-weight: 600; color: #fff; }
.owner-badge { margin-left: auto; font-size: .5rem; letter-spacing: 1px; color: var(--gold); background: rgba(200,168,75,.08); border: 1px solid rgba(200,168,75,.2); padding: 4px 10px; border-radius: 20px; text-transform: uppercase; }

/* ── LINKS ROW ── */
.links-row { display: flex; gap: 8px; padding: 14px 20px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
.link-chip { display: flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: 20px; border: 1px solid rgba(255,255,255,.1); background: rgba(255,255,255,.04); font-size: .65rem; color: rgba(255,255,255,.55); letter-spacing: 1px; text-transform: uppercase; cursor: pointer; text-decoration: none; transition: background .2s, border-color .2s; }
.link-chip:hover { background: rgba(255,255,255,.08); border-color: rgba(255,255,255,.2); color: #fff; }
.link-chip.yt { border-color: rgba(192,0,14,.3); color: #ff6b6b; }
.link-chip.yt:hover { background: rgba(192,0,14,.1); }
.link-chip.web { border-color: rgba(200,168,75,.25); color: var(--gold); }
.link-chip.web:hover { background: rgba(200,168,75,.08); }

/* ── SECTIONS ── */
.section { padding: 22px 20px; border-bottom: 1px solid var(--border); }
.section:last-child { border-bottom: none; }
.sec-title { font-size: .58rem; letter-spacing: 3px; text-transform: uppercase; color: var(--gold); font-weight: 700; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
.sec-title::after { content: ''; flex: 1; height: 1px; background: rgba(200,168,75,.12); }

/* ── UPCOMING ── */
.upcoming-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px; display: flex; gap: 14px; align-items: center; }
.upcoming-thumb { width: 88px; height: 50px; border-radius: 6px; background: var(--surface2); flex-shrink: 0; overflow: hidden; }
.upcoming-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
.upcoming-title { font-size: .82rem; font-weight: 600; color: #fff; margin-bottom: 3px; line-height: 1.3; }
.upcoming-date { font-size: .62rem; color: var(--muted); }
.upcoming-badge { margin-left: auto; font-size: .5rem; letter-spacing: 1.5px; text-transform: uppercase; padding: 4px 10px; border-radius: 4px; background: rgba(200,168,75,.1); color: var(--gold); border: 1px solid rgba(200,168,75,.2); flex-shrink: 0; }
.no-upcoming { font-size: .78rem; color: var(--muted); text-align: center; padding: 16px 0; }

/* ── VIDEOS GRID ── */
.videos-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.vid-card { cursor: pointer; }
.vid-thumb { width: 100%; aspect-ratio: 16/9; border-radius: 8px; background: var(--surface2); overflow: hidden; position: relative; margin-bottom: 8px; transition: transform .2s; }
.vid-card:hover .vid-thumb { transform: scale(1.02); }
.vid-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
.vid-overlay { position: absolute; inset: 0; background: rgba(0,0,0,.35); display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity .2s; }
.vid-card:hover .vid-overlay { opacity: 1; }
.play-dot { width: 30px; height: 30px; border-radius: 50%; background: rgba(192,0,14,.9); display: flex; align-items: center; justify-content: center; }
.vid-title { font-size: .74rem; font-weight: 600; color: var(--text); line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.vid-date { font-size: .6rem; color: var(--muted); margin-top: 2px; }
.no-videos { font-size: .78rem; color: var(--muted); text-align: center; padding: 24px 0; grid-column: span 2; }

/* ── ROSTER ── */
.roster-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
@media (min-width: 480px) { .roster-grid { grid-template-columns: repeat(4, 1fr); } }
.roster-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 10px; text-align: center; transition: border-color .2s; }
.roster-card:hover { border-color: rgba(255,255,255,.15); }
.roster-av { width: 44px; height: 44px; border-radius: 50%; background: rgba(192,0,14,.12); border: 2px solid rgba(192,0,14,.22); display: flex; align-items: center; justify-content: center; font-family: 'Bebas Neue', sans-serif; font-weight: 700; font-size: 1.1rem; color: var(--accent); margin: 0 auto 8px; }
.roster-av.owner-av-card { background: rgba(200,168,75,.1); border-color: rgba(200,168,75,.3); color: var(--gold); }
.roster-name { font-size: .7rem; font-weight: 600; color: var(--text); line-height: 1.2; }
.roster-role { font-size: .55rem; color: #5a5a6a; letter-spacing: 1px; margin-top: 3px; }
.roster-owner-tag { font-size: .5rem; color: var(--gold); letter-spacing: 1px; text-transform: uppercase; margin-top: 4px; }
.no-roster { font-size: .78rem; color: var(--muted); text-align: center; padding: 24px 0; }

/* ── LOADING ── */
.loading { text-align: center; padding: 40px 0; color: var(--muted); font-size: .78rem; }

/* ── MOBILE ── */
@media (max-width: 600px) {
  .nav-right { gap: 8px; }
  .efed-banner { height: 190px; }
  .efed-name { font-size: 1.2rem; }
  .efed-logo-box { width: 60px; height: 60px; font-size: 1.1rem; }
}
</style>
</head>

  <a class="link-chip yt" id="link-yt" href="https://www.youtube.com/@FirstStrikeWrestling" target="_blank" rel="noopener">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M23 7s-.3-2-1.2-2.8c-1.1-1.2-2.4-1.2-3-1.3C16.2 2.8 12 2.8 12 2.8s-4.2 0-6.8.2c-.6.1-1.9.1-3 1.3C1.3 5 1 7 1 7S.7 9.1.7 11.3v2c0 2.1.3 4.2.3 4.2s.3 2 1.2 2.8c1.1 1.2 2.6 1.1 3.3 1.2C7.4 21.6 12 21.7 12 21.7s4.2 0 6.8-.3c.6-.1 1.9-.1 3-1.3.9-.8 1.2-2.8 1.2-2.8s.3-2.1.3-4.2v-2C23.3 9.1 23 7 23 7zM9.7 15.5V8.4l8.1 3.6-8.1 3.5z"/></svg>
    YouTube
  </a>
  <a class="link-chip web" id="link-web" href="#" target="_blank" rel="noopener" style="display:none;">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
    Website
  </a>
  <a class="link-chip" id="link-x" href="#" target="_blank" rel="noopener" style="display:none;">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.737-8.835L1.254 2.25H8.08l4.257 5.629 5.907-5.629Zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
    X / Twitter
  </a>
</div>

<!-- ── UPCOMING SHOW ── -->
<div class="section" id="section-upcoming">
  <div class="sec-title">Upcoming Show</div>
  <div id="upcoming-content"><div class="loading">Loading…</div></div>
</div>

<!-- ── VIDEOS ── -->
<div class="section" id="section-videos" style="padding-bottom:8px;">
  <div class="sec-title">Episodes</div>
  <div style="position:relative;">
    <div id="videos-row" style="display:flex;gap:10px;overflow-x:auto;overflow-y:visible;padding:4px 8px 20px;scroll-behavior:smooth;scrollbar-width:none;-ms-overflow-style:none;" onscroll="this.setAttribute('data-scroll',this.scrollLeft)">
      <div class="loading">Loading…</div>
    </div>
  </div>
</div>

<!-- ── ROSTER ── -->
<div class="section" id="section-roster">
  <div class="sec-title">Roster</div>
  <div class="roster-grid" id="roster-grid"><div class="loading" style="grid-column:span 3;">Loading…</div></div>
</div>

<script>
// ── HARDCODED FSW DATA (same source as index.html) ──
const FSW_EFED_NAME = 'First Strike Wrestling';
const FSW_VIDEOS = [
  { url: "https://youtu.be/SGQqbCUJvME", show: 'FSW 52: Maximum \u2014 \u201cChoices\u201d', date: "Feb 12, 2026", thumb: "https://i.imgur.com/vUWtsKv.png" },
];
const FSW_UPCOMING = [];
const FSW_OWNER = ADMIN_USERNAME;
const FSW_YT_URL = 'https://www.youtube.com/@FirstStrikeWrestling';
const FSW_WEBSITE = '';
const FSW_X = '';

function extractId(url) {
  if (!url) return '';
  const m = url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?(?:.*&)?v=|embed\/|shorts\/))([A-Za-z0-9_-]{11})/);
  return m ? m[1] : '';
}

function toggleDropdown(force) {
  const dd = document.getElementById('user-dropdown');
  if (force === true) { dd.classList.remove('open'); return; }
  dd.classList.toggle('open');
}
document.addEventListener('click', e => {
  const wrap = document.getElementById('nav-user-wrap');
  if (wrap && !wrap.contains(e.target)) document.getElementById('user-dropdown').classList.remove('open');
});

function handleSignOut() {
  localStorage.removeItem('efed_session');
  window.location.replace('auth.html');
}

// Nav scroll effect
window.addEventListener('scroll', () => {
  document.getElementById('nav').classList.toggle('scrolled', window.scrollY > 20);
}, { passive: true });

// Search toggle
document.getElementById('nav-search-btn').addEventListener('click', () => {
  const wrap = document.getElementById('nav-search-wrap');
  wrap.classList.toggle('open');
  if (wrap.classList.contains('open')) document.getElementById('nav-search-input').focus();
});
document.getElementById('nav-search-input').addEventListener('keydown', e => {
  if (e.key === 'Escape') { document.getElementById('nav-search-wrap').classList.remove('open'); }
  if (e.key === 'Enter') {
    const q = e.target.value.trim();
    if (q) window.location.href = 'index.html?q=' + encodeURIComponent(q);
  }
});

async function initNav() {
  const session = getSession();
  if (!session) return;
  const signInBtn = document.getElementById('nav-sign-in-btn');
  const userBtn = document.getElementById('nav-user-btn');
  if (signInBtn) signInBtn.classList.add('hidden');
  if (userBtn) userBtn.style.display = 'flex';
  const initial = (session.displayName || session.username || '?')[0].toUpperCase();
  document.getElementById('nav-initials').textContent = initial;
  const ddName = document.getElementById('dd-name');
  const ddEmail = document.getElementById('dd-email');
  if (ddName) ddName.textContent = session.displayName || session.username;
  if (ddEmail) ddEmail.textContent = '@' + session.username;
  if (session.username.toLowerCase() === ADMIN_USERNAME) {
    const adminBtn = document.getElementById('admin-panel-btn');
    if (adminBtn) adminBtn.style.display = 'flex';
  }
  // Members count
  try {
    const r = await fetch(SUPABASE_URL+'/rest/v1/users?select=username', { headers: { ...SB_HEADERS, 'Prefer': 'count=exact', 'Range': '0-0' } });
    const count = parseInt(r.headers.get('Content-Range')?.split('/')[1] || '0', 10);
    const el = document.getElementById('total-users-label');
    if (el) el.textContent = count + ' member' + (count === 1 ? '' : 's');
    const counter = document.getElementById('online-counter');
    if (counter) counter.style.display = 'flex';
  } catch(e) {}
  // Unread notifs
  try {
    const notifs = await sbGet('notifications', `username=eq.${encodeURIComponent(session.username)}&read=eq.false`);
    if (notifs.length) document.getElementById('bnav-notif-dot').classList.add('visible');
  } catch(e) {}
}

async function loadPage() {
  // Owner
  try {
    const users = await sbGet('users', `username=eq.${encodeURIComponent(FSW_OWNER)}&select=username,display_name,promo_name,x_handle,yt_channel`);
    const owner = users[0];
    if (owner) {
      const name = owner.display_name || owner.username;
      document.getElementById('owner-name').textContent = name;
      document.getElementById('owner-av').textContent = name[0].toUpperCase();
      if (owner.username.toLowerCase() === ADMIN_USERNAME) {
        document.getElementById('owner-badge').style.display = '';
      }
    }
  } catch(e) {}

  // Links
  if (FSW_WEBSITE) { const w = document.getElementById('link-web'); w.href = FSW_WEBSITE; w.style.display = 'flex'; }
  if (FSW_X) { const x = document.getElementById('link-x'); x.href = 'https://x.com/' + FSW_X.replace('@',''); x.style.display = 'flex'; }

  // Upcoming
  const upEl = document.getElementById('upcoming-content');
  if (FSW_UPCOMING.length) {
    const u = FSW_UPCOMING[0];
    const id = extractId(u.url);
    const thumb = u.thumb || (id ? `https://i.ytimg.com/vi/${id}/mqdefault.jpg` : '');
    upEl.innerHTML = `
      <div class="upcoming-card">
        <div class="upcoming-thumb">${thumb ? `<img src="${thumb}" alt="">` : ''}</div>
        <div style="flex:1;">
          <div class="upcoming-title">${_esc(u.show)}</div>
          <div class="upcoming-date">${_esc(u.date)}</div>
        </div>
        <div class="upcoming-badge">Upcoming</div>
      </div>`;
  } else {
    // Try DB upcoming
    try {
      const rows = await sbGet('submissions', `efed=eq.${encodeURIComponent(FSW_EFED_NAME)}&status=eq.upcoming&order=date_ms.asc&limit=1`);
      if (rows.length) {
        const u = rows[0];
        const id = extractId(u.url);
        const thumb = id ? `https://i.ytimg.com/vi/${id}/mqdefault.jpg` : '';
        upEl.innerHTML = `
          <div class="upcoming-card">
            <div class="upcoming-thumb">${thumb ? `<img src="${thumb}" alt="">` : ''}</div>
            <div style="flex:1;">
              <div class="upcoming-title">${_esc(u.show_name)}</div>
              <div class="upcoming-date">${_esc(u.date || '')}</div>
            </div>
            <div class="upcoming-badge">Upcoming</div>
          </div>`;
      } else {
        upEl.innerHTML = `<div class="no-upcoming">No upcoming shows scheduled.</div>`;
      }
    } catch(e) {
      upEl.innerHTML = `<div class="no-upcoming">No upcoming shows scheduled.</div>`;
    }
  }

  // Videos — hardcoded + DB approved
  // videos rendered into #videos-row
  let allVideos = [...FSW_VIDEOS];
  try {
    const dbRows = await sbGet('submissions', `efed=eq.${encodeURIComponent(FSW_EFED_NAME)}&status=eq.approved&order=date_ms.desc`);
    const existingUrls = new Set(allVideos.map(v => v.url));
    dbRows.forEach(r => {
      if (!existingUrls.has(r.url)) {
        allVideos.push({ url: r.url, show: r.show_name || '', date: r.date || '', thumb: r.thumb_url || null, dateMs: r.date_ms || r.submitted_at || 0 });
      }
    });
  } catch(e) {}

  document.getElementById('stat-episodes').textContent = allVideos.length;

  const row = document.getElementById('videos-row');
  if (!allVideos.length) {
    row.innerHTML = `<div style="font-size:.78rem;color:var(--muted);padding:16px 0;">No episodes yet.</div>`;
  } else {
    allVideos.sort((a,b) => (b.dateMs||0) - (a.dateMs||0));
    row.innerHTML = allVideos.map(v => {
      const id = extractId(v.url);
      const thumb = v.thumb || (id ? `https://i.ytimg.com/vi/${id}/mqdefault.jpg` : '');
      return `
        <div style="flex-shrink:0;width:160px;cursor:pointer;" onclick="window.location.href='index.html'">
          <div style="width:160px;height:90px;border-radius:6px;overflow:hidden;background:var(--surface2);position:relative;margin-bottom:7px;transition:transform .2s;">
            ${thumb ? `<img src="${thumb}" alt="" style="width:100%;height:100%;object-fit:cover;display:block;" onerror="this.style.display='none'">` : ''}
            <div style="position:absolute;inset:0;background:rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s;" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=0">
              <div style="width:26px;height:26px;border-radius:50%;background:rgba(192,0,14,.9);display:flex;align-items:center;justify-content:center;">
                <svg width="9" height="9" viewBox="0 0 24 24" fill="white" style="margin-left:2px"><polygon points="5 3 19 12 5 21 5 3"/></svg>
              </div>
            </div>
          </div>
          <div style="font-size:.72rem;font-weight:600;color:#fff;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;">${_esc(v.show)}</div>
          <div style="font-size:.58rem;color:var(--muted);margin-top:2px;">${_esc(v.date)}</div>
        </div>`;
    }).join('');
  }

  // Roster — owner always first, then DB roster table (once built), then placeholder
  const rosterGrid = document.getElementById('roster-grid');
  const session = getSession();
  const ownerName = document.getElementById('owner-name').textContent;

  let rosterRows = [];
  try {
    // Future: pull from roster table. For now pull users who have claimed videos from this eFed
    const claimers = await sbGet('submissions', `efed=eq.${encodeURIComponent(FSW_EFED_NAME)}&status=eq.approved&claimed_by=not.is.null&select=claimed_by`);
    const claimerUsernames = [...new Set(claimers.map(r => r.claimed_by).filter(Boolean))];
    if (claimerUsernames.length) {
      const users = await sbGet('users', `username=in.(${claimerUsernames.map(u => encodeURIComponent(u)).join(',')})&select=username,display_name`);
      rosterRows = users;
    }
  } catch(e) {}

  document.getElementById('stat-roster').textContent = rosterRows.length + 1; // +1 for owner

  let rosterHtml = `
    <div class="roster-card">
      <div class="roster-av owner-av-card">${ownerName[0] || 'D'}</div>
      <div class="roster-name">${_esc(ownerName)}</div>
      <div class="roster-owner-tag">Owner</div>
    </div>`;

  rosterRows.filter(u => u.username !== FSW_OWNER).forEach(u => {
    const name = u.display_name || u.username;
    rosterHtml += `
      <div class="roster-card">
        <div class="roster-av">${name[0].toUpperCase()}</div>
        <div class="roster-name">${_esc(name)}</div>
        <div class="roster-role">Talent</div>
      </div>`;
  });

  rosterGrid.innerHTML = rosterHtml;

  // Supporters count
  try {
    const r = await fetch(SUPABASE_URL+'/rest/v1/supports?efed=eq.'+encodeURIComponent(FSW_EFED_NAME), { headers: { ...SB_HEADERS, 'Prefer': 'count=exact', 'Range': '0-0' } });
    const count = parseInt(r.headers.get('Content-Range')?.split('/')[1] || '0', 10);
    document.getElementById('stat-supporters').textContent = count;
  } catch(e) { document.getElementById('stat-supporters').textContent = '0'; }
}

initNav();
loadPage();
</script>
</div><!-- /page-card -->
</body>
</html>
