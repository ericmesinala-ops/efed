<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #07070a; --surface: #111114; --surface2: #1a1a1f;
  --accent: #c0000e; --gold: #c8a84b; --text: #e8e8e8;
  --muted: #8a8a9a; --border: rgba(255,255,255,.07);
}
body { background: #000; color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }

.page-card {
  max-width: 960px; margin: 0 auto;
  background: var(--bg);
  box-shadow: 0 0 0 1px rgba(255,255,255,.05), 0 32px 80px rgba(0,0,0,.9), 0 8px 32px rgba(0,0,0,.6);
  min-height: 100vh; position: relative;
}

/* ── NAV ── */
nav {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px;
  background: rgba(7,7,10,.97); backdrop-filter: blur(16px);
  border-bottom: 1px solid rgba(255,255,255,.04);
}
.logo { display: flex; flex-direction: column; line-height: 1; text-decoration: none; }
.logo-main { font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; letter-spacing: 3px; color: #fff; white-space: nowrap; }
.logo-main em { color: var(--gold); font-style: normal; }
.nav-right { display: flex; align-items: center; gap: 12px; }
.nav-search-wrap { display: flex; align-items: center; }
.nav-search-btn { background: none; border: none; cursor: pointer; color: rgba(255,255,255,.55); padding: 6px; display: flex; align-items: center; transition: color .2s; }
.nav-search-btn:hover { color: #fff; }
.nav-search-input {
  position: fixed; left: 0; right: 0; top: 56px; width: 100% !important;
  border-radius: 0; border: none; border-bottom: 1px solid rgba(255,255,255,.1);
  background: rgba(7,7,10,.97) !important; color: #fff;
  font-family: 'DM Sans', sans-serif; font-size: .88rem;
  padding: 0 !important; height: 0; overflow: hidden; outline: none;
  transition: height .25s ease, padding .25s ease; z-index: 200;
}
.nav-search-input::placeholder { color: rgba(255,255,255,.3); }
.nav-search-wrap.open .nav-search-input { height: 50px !important; padding: 0 24px !important; }
.nav-auth-btn.hidden { display: none; }
.nav-icon-btn { background: none; border: none; cursor: pointer; color: rgba(255,255,255,.6); padding: 6px; display: flex; align-items: center; justify-content: center; border-radius: 50%; transition: color .2s, background .2s; width: 36px; height: 36px; }
.nav-icon-btn:hover { color: #fff; background: rgba(255,255,255,.08); }
.nav-avatar-initials { width: 32px; height: 32px; border-radius: 50%; border: 2px solid rgba(200,168,75,.4); background: rgba(200,168,75,.12); color: var(--gold); font-size: .62rem; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; overflow: hidden; }
.nav-icon-btn .nav-avatar-initials { width: 28px; height: 28px; font-size: .55rem; }
.nav-user-wrap { position: relative; }
.user-dropdown { position: absolute; top: calc(100% + 10px); right: 0; background: rgba(13,13,16,.98); border: 1px solid rgba(255,255,255,.1); border-radius: 10px; min-width: 200px; padding: 6px 0; opacity: 0; pointer-events: none; transform: translateY(-6px); transition: opacity .2s, transform .2s; box-shadow: 0 20px 48px rgba(0,0,0,.7); z-index: 400; }
.user-dropdown.open { opacity: 1; pointer-events: all; transform: translateY(0); }
.dropdown-header { padding: 12px 16px 8px; border-bottom: 1px solid rgba(255,255,255,.06); margin-bottom: 4px; }
.dropdown-name { font-size: .85rem; font-weight: 600; color: #fff; margin-bottom: 2px; }
.dropdown-email { font-size: .7rem; color: var(--muted); }
.dropdown-item { display: flex; align-items: center; gap: 10px; padding: 9px 16px; font-size: .78rem; color: rgba(255,255,255,.55); cursor: pointer; transition: background .15s, color .15s; background: none; border: none; width: 100%; text-align: left; font-family: 'DM Sans', sans-serif; }
.dropdown-item:hover { background: rgba(255,255,255,.05); color: rgba(255,255,255,.85); }
.dropdown-item.danger { color: rgba(255,80,80,.6); }
.dropdown-item.danger:hover { background: rgba(192,0,14,.08); color: #ff6b6b; }
.bnav-notif-dot { display: none; position: absolute; width: 7px; height: 7px; border-radius: 50%; background: var(--accent); border: 1.5px solid var(--bg); }
.bnav-notif-dot.visible { display: block; }

/* ── BANNER ── */
.profile-banner {
  height: 200px; position: relative; overflow: hidden;
  display: flex; align-items: flex-end;
  background: linear-gradient(135deg, #1a0005 0%, #0d0d12 50%, #07070a 100%);
}
.banner-noise { position: absolute; inset: 0; opacity: .04; background-image: repeating-linear-gradient(45deg,#fff 0,#fff 1px,transparent 0,transparent 50%); background-size: 20px 20px; }
.banner-glow { position: absolute; inset: 0; background: radial-gradient(ellipse 80% 100% at 20% 60%, rgba(192,0,14,.2) 0%, transparent 70%); }
.banner-inner { padding: 0 28px 24px; position: relative; z-index: 2; display: flex; align-items: flex-end; gap: 18px; width: 100%; }

/* ── AVATAR ── */
.profile-av-box {
  width: 80px; height: 80px; border-radius: 50%;
  background: rgba(192,0,14,.12); border: 3px solid rgba(192,0,14,.35);
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  font-family: 'Bebas Neue', sans-serif; font-size: 2rem; color: var(--accent);
  overflow: hidden; position: relative; cursor: pointer; transition: border-color .2s;
}
.profile-av-box:hover { border-color: rgba(255,255,255,.4); }
.profile-av-box img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; display: none; }
.av-hover-overlay {
  position: absolute; inset: 0; border-radius: 50%;
  background: rgba(0,0,0,.55); display: flex; align-items: center; justify-content: center;
  opacity: 0; transition: opacity .18s; pointer-events: none; z-index: 2;
}
.profile-av-box:hover .av-hover-overlay { opacity: 1; }

/* ── IDENTITY ── */
.profile-name { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; letter-spacing: 3px; color: #fff; line-height: 1; margin-bottom: 5px; }
.profile-handle { font-size: .62rem; color: rgba(255,255,255,.35); letter-spacing: 2px; text-transform: uppercase; }
.edit-pencil { background: none; border: none; padding: 6px; color: rgba(255,255,255,.2); cursor: pointer; border-radius: 6px; transition: color .2s; margin-left: auto; align-self: flex-end; margin-bottom: 2px; }
.edit-pencil:hover { color: rgba(255,255,255,.6); }

/* ── STATS ── */
.stats-bar { display: flex; background: #0c0c0f; border-bottom: 1px solid var(--border); }
.stat-pill { flex: 1; padding: 14px 0; text-align: center; border-right: 1px solid rgba(255,255,255,.05); }
.stat-pill:last-child { border-right: none; }
.stat-num { font-family: 'Bebas Neue', sans-serif; font-size: 1.3rem; letter-spacing: 1px; color: #fff; line-height: 1; }
.stat-lbl { font-size: .5rem; color: #5a5a6a; letter-spacing: 2px; text-transform: uppercase; margin-top: 3px; }

/* ── SECTIONS ── */
.section { padding: 22px 20px; border-bottom: 1px solid var(--border); }
.section:last-child { border-bottom: none; padding-bottom: 100px; }
.sec-title { font-size: .58rem; letter-spacing: 3px; text-transform: uppercase; color: var(--gold); font-weight: 700; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
.sec-title::after { content: ''; flex: 1; height: 1px; background: rgba(200,168,75,.12); }

/* ── EFED LIST ── */
.efed-item { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); cursor: pointer; transition: opacity .15s; }
.efed-item:last-child { border-bottom: none; }
.efed-item:hover { opacity: .8; }
.efed-av { width: 40px; height: 40px; border-radius: 8px; background: rgba(192,0,14,.12); border: 1px solid rgba(192,0,14,.25); display: flex; align-items: center; justify-content: center; font-family: 'Bebas Neue', sans-serif; font-size: .9rem; color: var(--accent); flex-shrink: 0; }
.efed-name-txt { font-size: .85rem; font-weight: 600; color: var(--text); }
.efed-role-txt { font-size: .6rem; color: var(--muted); margin-top: 2px; letter-spacing: 1px; text-transform: uppercase; }

/* ── VIDEO ROW ── */
.vid-row { display: flex; gap: 10px; overflow-x: auto; overflow-y: visible; padding: 4px 2px 16px; scroll-behavior: smooth; scrollbar-width: none; -ms-overflow-style: none; }
.vid-row::-webkit-scrollbar { display: none; }
.vid-card { flex-shrink: 0; width: 150px; cursor: pointer; }
.vid-thumb { width: 150px; height: 85px; border-radius: 6px; overflow: hidden; background: var(--surface2); position: relative; margin-bottom: 7px; transition: transform .2s; }
.vid-card:hover .vid-thumb { transform: scale(1.03); }
.vid-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
.vid-play-overlay { position: absolute; inset: 0; background: rgba(0,0,0,.3); display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity .2s; }
.vid-card:hover .vid-play-overlay { opacity: 1; }
.play-dot { width: 26px; height: 26px; border-radius: 50%; background: rgba(192,0,14,.9); display: flex; align-items: center; justify-content: center; }
.vid-title { font-size: .7rem; font-weight: 600; color: var(--text); line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.vid-date { font-size: .58rem; color: var(--muted); margin-top: 2px; }
.empty { font-size: .78rem; color: var(--muted); padding: 12px 0; }

@media (max-width: 600px) {
  .nav-right { gap: 8px; }
  .profile-banner { height: 170px; }
  .profile-name { font-size: 1.2rem; }
  .profile-av-box { width: 64px; height: 64px; font-size: 1.5rem; }
}
</style>
</head>

<script>
let _hasAvatar = false;
let _isOwnProfile = false;

function extractId(url) {
  if (!url) return '';
  const m = url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?(?:.*&)?v=|embed\/|shorts\/))([A-Za-z0-9_-]{11})/);
  return m ? m[1] : '';
}

function toggleDropdown(force) {
  const dd = document.getElementById('user-dropdown');
  if (force === true) { dd.classList.remove('open'); return; }
  dd.classList.toggle('open');
}
document.addEventListener('click', e => {
  const wrap = document.getElementById('nav-user-wrap');
  if (wrap && !wrap.contains(e.target)) document.getElementById('user-dropdown').classList.remove('open');
  const avBox = document.getElementById('profile-av-box');
  const avMenu = document.getElementById('av-ctx-menu');
  if (avMenu && avBox && !avBox.contains(e.target) && !avMenu.contains(e.target)) closeAvMenu();
});

function handleSignOut() {
  localStorage.removeItem('efed_session');
  window.location.replace('auth.html');
}

document.getElementById('nav-search-btn').addEventListener('click', () => {
  const wrap = document.getElementById('nav-search-wrap');
  wrap.classList.toggle('open');
  if (wrap.classList.contains('open')) document.getElementById('nav-search-input').focus();
});
document.getElementById('nav-search-input').addEventListener('keydown', e => {
  if (e.key === 'Escape') document.getElementById('nav-search-wrap').classList.remove('open');
  if (e.key === 'Enter') { const q = e.target.value.trim(); if (q) window.location.href = 'index.html?q=' + encodeURIComponent(q); }
});

async function initNav() {
  const session = getSession();
  if (!session) return;
  const userBtn = document.getElementById('nav-user-btn');
  if (userBtn) userBtn.style.display = 'flex';
  const initial = (session.displayName || session.username || '?')[0].toUpperCase();
  document.getElementById('nav-initials').textContent = initial;
  document.getElementById('dd-name').textContent = session.displayName || session.username;
  document.getElementById('dd-email').textContent = '@' + session.username;
  if (session.avatarUrl) {
    const img = document.getElementById('nav-avatar-img');
    if (img) { img.src = session.avatarUrl; img.style.display = 'block'; document.getElementById('nav-initials').style.display = 'none'; }
  }
  try {
    const r = await fetch(SUPABASE_URL+'/rest/v1/users?select=username', { headers: { ...SB_HEADERS, 'Prefer': 'count=exact', 'Range': '0-0' } });
    const count = parseInt(r.headers.get('Content-Range')?.split('/')[1] || '0', 10);
    document.getElementById('total-users-label').textContent = count + ' member' + (count===1?'':'s');
    document.getElementById('online-counter').style.display = 'flex';
  } catch(e) {}
  try {
    const notifs = await sbGet('notifications', `username=eq.${encodeURIComponent(session.username)}&read=eq.false`);
    if (notifs.length) document.getElementById('bnav-notif-dot').classList.add('visible');
  } catch(e) {}
}

// ── AVATAR ──
function setAvatar(src) {
  const img = document.getElementById('profile-av-img');
  img.src = src; img.style.display = 'block';
  document.getElementById('profile-av-initial').style.display = 'none';
  document.getElementById('av-icon-add').style.display = 'none';
  document.getElementById('av-icon-edit').style.display = 'block';
  _hasAvatar = true;
  const navImg = document.getElementById('nav-avatar-img');
  if (navImg) { navImg.src = src; navImg.style.display = 'block'; document.getElementById('nav-initials').style.display = 'none'; }
}

function clearAvatar() {
  const img = document.getElementById('profile-av-img');
  img.src = ''; img.style.display = 'none';
  document.getElementById('profile-av-initial').style.display = '';
  document.getElementById('av-icon-add').style.display = 'block';
  document.getElementById('av-icon-edit').style.display = 'none';
  _hasAvatar = false;
  const navImg = document.getElementById('nav-avatar-img');
  if (navImg) { navImg.src = ''; navImg.style.display = 'none'; document.getElementById('nav-initials').style.display = ''; }
}

function handleAvatarClick() {
  if (!_isOwnProfile) return;
  if (_hasAvatar) {
    const menu = document.getElementById('av-ctx-menu');
    const box = document.getElementById('profile-av-box');
    const rect = box.getBoundingClientRect();
    menu.style.left = rect.left + 'px';
    menu.style.top = (rect.bottom + 6) + 'px';
    menu.style.display = 'block';
  } else {
    document.getElementById('av-file-input').click();
  }
}
function closeAvMenu() { document.getElementById('av-ctx-menu').style.display = 'none'; }

async function handleAvatarFile(event) {
  const file = event.target.files[0];
  if (!file) return;
  closeAvMenu();
  const session = getSession();
  if (!session) return;
  const reader = new FileReader();
  reader.onload = async e => {
    const img = new Image();
    img.onload = async () => {
      const MAX = 200;
      const canvas = document.createElement('canvas');
      const scale = Math.min(MAX/img.width, MAX/img.height, 1);
      canvas.width = Math.round(img.width*scale);
      canvas.height = Math.round(img.height*scale);
      canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
      const dataUrl = canvas.toDataURL('image/jpeg', 0.82);
      setAvatar(dataUrl);
      session.avatarUrl = dataUrl;
      localStorage.setItem('efed_session', JSON.stringify(session));
      try {
        await fetch(SUPABASE_URL+'/rest/v1/users?username=eq.'+encodeURIComponent(session.username), {
          method: 'PATCH', headers: SB_HEADERS, body: JSON.stringify({ avatar_url: dataUrl })
        });
      } catch(err) { console.warn('Avatar save failed', err); }
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
  event.target.value = '';
}

async function removeAvatar() {
  closeAvMenu();
  const session = getSession();
  if (!session) return;
  clearAvatar();
  session.avatarUrl = null;
  localStorage.setItem('efed_session', JSON.stringify(session));
  try {
    await fetch(SUPABASE_URL+'/rest/v1/users?username=eq.'+encodeURIComponent(session.username), {
      method: 'PATCH', headers: SB_HEADERS, body: JSON.stringify({ avatar_url: null })
    });
  } catch(e) {}
}

// ── VIDEO CARD ──
function makeVidCard(url, showName, date, thumbUrl) {
  const id = extractId(url);
  const thumb = thumbUrl || (id ? `https://i.ytimg.com/vi/${id}/mqdefault.jpg` : '');
  return `<div class="vid-card" onclick="window.location.href='index.html'">
    <div class="vid-thumb">
      ${thumb ? `<img src="${thumb}" alt="" onerror="this.style.display='none'">` : ''}
      <div class="vid-play-overlay"><div class="play-dot"><svg width="9" height="9" viewBox="0 0 24 24" fill="white" style="margin-left:2px"><polygon points="5 3 19 12 5 21 5 3"/></svg></div></div>
    </div>
    <div class="vid-title">${_esc(showName || '')}</div>
    <div class="vid-date">${_esc(date || '')}</div>
  </div>`;
}

// ── MAIN ──
async function loadProfile() {
  const session = getSession();
  if (!session) return;
  const params = new URLSearchParams(window.location.search);
  const targetUser = params.get('u') || session.username;
  _isOwnProfile = targetUser.toLowerCase() === session.username.toLowerCase();

  if (!_isOwnProfile) {
    document.getElementById('profile-av-box').style.cursor = 'default';
    document.getElementById('av-hover-overlay').style.display = 'none';
    document.getElementById('stat-invites-pill').style.display = 'none';
  } else {
    document.getElementById('edit-pencil').style.display = 'flex';
  }

  // User data
  try {
    const users = await sbGet('users', `username=eq.${encodeURIComponent(targetUser)}&select=*`);
    if (!users.length) { document.getElementById('profile-name').textContent = 'User not found'; return; }
    const user = users[0];
    const name = user.display_name || user.username;
    document.title = name + ' — EFED Hub';
    document.getElementById('profile-name').textContent = name;
    document.getElementById('profile-handle').textContent = '@' + user.username;
    document.getElementById('profile-av-initial').textContent = name[0].toUpperCase();
    if (user.avatar_url) setAvatar(user.avatar_url);
  } catch(e) { document.getElementById('profile-name').textContent = 'Could not load'; return; }

  // Stats — parallel
  const [subs, ratings, invites] = await Promise.allSettled([
    sbGet('submissions', `submitted_by=eq.${encodeURIComponent(targetUser)}&status=eq.approved&order=date_ms.desc`),
    sbGet('ratings', `username=eq.${encodeURIComponent(targetUser)}&select=id`),
    _isOwnProfile ? sbGet('invites', `created_by=eq.${encodeURIComponent(targetUser)}&used=eq.false`) : Promise.resolve([])
  ]);

  const subsData  = subs.status === 'fulfilled'    ? subs.value    : [];
  const ratingsData = ratings.status === 'fulfilled' ? ratings.value : [];
  const invitesData = invites.status === 'fulfilled' ? invites.value : [];

  document.getElementById('stat-submitted').textContent = subsData.length;
  document.getElementById('stat-rated').textContent = ratingsData.length;
  if (_isOwnProfile) document.getElementById('stat-invites').textContent = invitesData.length;

  // Submitted videos row
  const subRow = document.getElementById('submitted-row');
  subRow.innerHTML = subsData.length
    ? subsData.map(s => makeVidCard(s.url, s.show_name, s.date, s.thumb_url)).join('')
    : '<div class="empty">No submissions yet.</div>';

  // eFeds
  const efedList = document.getElementById('efeds-list');
  try {
    const [rosterRows, supportRows] = await Promise.all([
      sbGet('roster', `username=eq.${encodeURIComponent(targetUser)}&order=joined_at.asc`).catch(()=>[]),
      sbGet('supports', `username=eq.${encodeURIComponent(targetUser)}&order=supported_at.desc`).catch(()=>[])
    ]);
    if (!rosterRows.length && !supportRows.length) {
      efedList.innerHTML = '<div class="empty">Not part of any eFed yet.</div>';
    } else {
      const rosterEfeds = new Set(rosterRows.map(r => r.efed));
      let html = rosterRows.map(r => `
        <div class="efed-item" onclick="window.location.href='efed.html'">
          <div class="efed-av">${(r.efed||'?')[0].toUpperCase()}</div>
          <div><div class="efed-name-txt">${_esc(r.efed)}</div><div class="efed-role-txt">Talent</div></div>
          <svg style="margin-left:auto;opacity:.25;flex-shrink:0;" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
        </div>`).join('');
      html += supportRows.filter(s => !rosterEfeds.has(s.efed)).map(s => `
        <div class="efed-item">
          <div class="efed-av" style="background:rgba(200,168,75,.1);border-color:rgba(200,168,75,.2);color:var(--gold);">${(s.efed||'?')[0].toUpperCase()}</div>
          <div><div class="efed-name-txt">${_esc(s.efed)}</div><div class="efed-role-txt">Fan</div></div>
        </div>`).join('');
      efedList.innerHTML = html;
    }
  } catch(e) { efedList.innerHTML = '<div class="empty">Could not load.</div>'; }

  // Bookmarks
  const bmRow = document.getElementById('bookmarks-row');
  try {
    const bookmarks = await sbGet('bookmarks', `username=eq.${encodeURIComponent(targetUser)}&order=saved_at.desc`);
    if (!bookmarks.length) { bmRow.innerHTML = '<div class="empty">No bookmarks yet.</div>'; return; }
    const urls = bookmarks.map(b => b.video_url).filter(Boolean);
    let subMap = {};
    if (urls.length) {
      try {
        const bmSubs = await sbGet('submissions', `url=in.(${urls.map(u => encodeURIComponent(u)).join(',')})&select=url,show_name,date,thumb_url`);
        bmSubs.forEach(s => { subMap[s.url] = s; });
      } catch(e) {}
    }
    bmRow.innerHTML = bookmarks.map(b => {
      const s = subMap[b.video_url] || {};
      return makeVidCard(b.video_url, s.show_name, s.date, s.thumb_url);
    }).join('');
  } catch(e) { bmRow.innerHTML = '<div class="empty">Could not load.</div>'; }
}

initNav();
loadProfile();
</script>
