  var r = _roster.find(function(x){return x.id===rosterId;});
  if (!r) return;
  var card = _cur().cards[_mobPickerCardIdx];
  if (card.names.find(function(n){return n.id===r.id;})) { mobClosePicker(); return; }
  if (card.names.length >= 6) { mobClosePicker(); return; }
  card.names.push({name:r.name, id:r.id});
  // Auto format
  var nc = card.names.length;
  if (nc===2) card.matchFormat='singles';
  else if (nc===3) card.matchFormat='triple';
  else if (nc===4) card.matchFormat='fatal4';
  renderCards(); renderRoster();
  mobRenderCards(); mobRenderRoster(); mobUpdateProgress(); plannerDirty();
  mobClosePicker();
}
function mobClosePicker() {
  document.getElementById('mob-picker-sheet').classList.add('hidden');
  _mobPickerCardIdx = null;
}

// ── SEGMENT TYPE SHEET ──
function mobOpenSegSheet(cardIdx) {
  _mobSegSheetIdx = cardIdx;
  var card = _cur().cards[cardIdx];
  var cur = card.segType || SEGMENT_TYPES[0];
  var list = document.getElementById('mob-seg-list');
  list.innerHTML = SEGMENT_TYPES.map(function(t) {
    return '<div class="mob-seg-opt'+(t===cur?' active':'')+'" onclick="mobPickSegType(\''+_esc(t)+'\')">'+_esc(t)+'</div>';
  }).join('');
  document.getElementById('mob-seg-sheet').classList.remove('hidden');
}
function mobPickSegType(val) {
  if (_mobSegSheetIdx === null) return;
  updateCardField(_mobSegSheetIdx, 'segType', val);
  renderCards(); mobRenderCards(); plannerDirty();
  mobCloseSegSheet();
}
function mobCloseSegSheet() {
  document.getElementById('mob-seg-sheet').classList.add('hidden');
  _mobSegSheetIdx = null;
}

// ── PROGRESS (mobile) ──
function mobUpdateProgress() {
  var cards = _cur().cards || [];
  var totalW = 0, doneW = 0;
  cards.forEach(function(c) {
    var w = c.type==='segment' ? 1 : 3;
    totalW += w;
    if (c.done) doneW += w;
  });
  var pct = totalW ? Math.round(doneW/totalW*100) : 0;
  var fill = document.getElementById('mob-prog-fill');
  var lbl = document.getElementById('mob-prog-label');
  if (fill) fill.style.width = pct+'%';
  if (lbl) lbl.textContent = pct+'%';
  // Also update desktop progress
  updateProgress();
}

// ── LONG-PRESS DRAG TO REORDER (mobile cards) ──
var _mobDragSrcIdx = null;
var _mobLongPressTimer = null;
var _mobDragEl = null;
var _mobDragGhost = null;
var _mobDragStartY = null;

function mobAttachCardDrag(el, idx) {
  var holdDuration = 600; // ms

  el.addEventListener('touchstart', function(e) {
    _mobLongPressTimer = setTimeout(function() {
      _mobDragSrcIdx = idx;
      _mobDragEl = el;
      el.classList.add('mob-lifting');
      // Create ghost
      _mobDragGhost = el.cloneNode(true);
      _mobDragGhost.style.cssText = 'position:fixed;pointer-events:none;z-index:999;width:'+el.offsetWidth+'px;opacity:.7;transition:none;';
      var r = el.getBoundingClientRect();
      _mobDragGhost.style.left = r.left+'px';
      _mobDragGhost.style.top = r.top+'px';
      document.body.appendChild(_mobDragGhost);
      _mobDragStartY = e.touches[0].clientY - r.top;
    }, holdDuration);
  }, {passive:true});

  el.addEventListener('touchmove', function(e) {
    if (_mobLongPressTimer) { clearTimeout(_mobLongPressTimer); _mobLongPressTimer = null; }
    if (_mobDragSrcIdx === null || !_mobDragGhost) return;
    e.preventDefault();
    var t = e.touches[0];
    _mobDragGhost.style.top = (t.clientY - _mobDragStartY)+'px';
    // Find target
    var allCards = document.querySelectorAll('#mob-cards-scroll > .mob-card, #mob-cards-scroll > .mob-seg-card');
    allCards.forEach(function(c){ c.classList.remove('mob-drag-over'); });
    var targetEl = document.elementFromPoint(t.clientX, t.clientY);
    var targetCard = targetEl ? targetEl.closest('.mob-card, .mob-seg-card') : null;
    if (targetCard && targetCard !== el) targetCard.classList.add('mob-drag-over');
  }, {passive:false});

  function endDrag(e) {
    if (_mobLongPressTimer) { clearTimeout(_mobLongPressTimer); _mobLongPressTimer = null; }
    if (_mobDragGhost) { _mobDragGhost.remove(); _mobDragGhost = null; }
    if (_mobDragSrcIdx === null) return;
    el.classList.remove('mob-lifting');
    // Find drop target
    var touch = e.changedTouches ? e.changedTouches[0] : null;
    var allCards = document.querySelectorAll('#mob-cards-scroll > .mob-card, #mob-cards-scroll > .mob-seg-card');
    allCards.forEach(function(c){ c.classList.remove('mob-drag-over'); });
    if (touch) {
      var targetEl = document.elementFromPoint(touch.clientX, touch.clientY);
      var targetCard = targetEl ? targetEl.closest('.mob-card, .mob-seg-card') : null;
      if (targetCard && targetCard !== el) {
        var toIdx = parseInt(targetCard.dataset.idx);
        if (!isNaN(toIdx) && toIdx !== _mobDragSrcIdx) {
          var cur = _cur();
          var moved = cur.cards.splice(_mobDragSrcIdx, 1)[0];
          cur.cards.splice(toIdx, 0, moved);
          renderCards(); plannerDirty();
          mobRenderCards();
        }
      }
    }
    _mobDragSrcIdx = null;
    _mobDragEl = null;
  }
  el.addEventListener('touchend', endDrag, {passive:true});
  el.addEventListener('touchcancel', endDrag, {passive:true});
}

// ── KEEP MOBILE IN SYNC when desktop renders ──
// Patch updateProgress to also update mobile bar
(function(){
  var origUP = updateProgress;
  updateProgress = function() {
    origUP.apply(this, arguments);
    if (isMobile()) mobUpdateProgress();
  };
})();

// ── OLD MOBILE ROSTER FUNCTIONS (no-op, kept for compat) ──
function mobToggleRoster() {}
function mobCloseRoster() {}

// ── PROGRESS (weighted: match/promo=3, segment=1) ──
function updateProgress() {
  var cards = _cur().cards || [];
  if (!cards.length) {
    document.getElementById('pln-prog-fill').style.width = '0%';
    document.getElementById('pln-progress-label').textContent = '0%';
    return;
  }
  var totalWeight = 0, doneWeight = 0;
  cards.forEach(function(c) {
    var w = (c.type === 'segment') ? 1 : 3;
    totalWeight += w;
    if (c.done) doneWeight += w;
  });
  var pct = totalWeight ? Math.round((doneWeight / totalWeight) * 100) : 0;
  document.getElementById('pln-prog-fill').style.width = pct + '%';
  document.getElementById('pln-progress-label').textContent = pct + '%';
}
</script>

<script>
(function(){
  var SX=15,SY=27,SW=90,SH=52,PX=1;
  var darkG=['#000','#111','#222','#333','#444','#555','#666','#777','#888','#999','#aaa','#bbb','#ccc','#ddd','#eee','#fff'];
  var dayG =['#333','#444','#555','#666','#777','#888','#999','#aaa','#bbb','#ccc','#ddd','#eee','#fff'];
  var NS='http://www.w3.org/2000/svg';
  function renderFrame(el,greys){
    var frag=document.createDocumentFragment();
    for(var y=SY;y<SY+SH;y+=PX){
      var x=SX;
      while(x<SX+SW){
        var w=Math.floor(Math.random()*4)+1;
        if(x+w>SX+SW) w=SX+SW-x;
        var r=document.createElementNS(NS,'rect');
        r.setAttribute('x',x); r.setAttribute('y',y);
        r.setAttribute('width',w); r.setAttribute('height',PX);
        r.setAttribute('fill',greys[Math.floor(Math.random()*greys.length)]);
        frag.appendChild(r); x+=w;
      }
    }
    while(el.firstChild) el.removeChild(el.firstChild);
    el.appendChild(frag);
  }
  function start(){
    var d=document.getElementById('tv-static-dark');
    var l=document.getElementById('tv-static-day');
    if(!d&&!l) return;
    function tick(){ if(d) renderFrame(d,darkG); if(l) renderFrame(l,dayG); }
    tick(); setInterval(tick,42);
  }
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',start);
  else start();
})();
</script>
