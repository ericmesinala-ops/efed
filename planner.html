html.day-mode #planner-name-inp{background:rgba(0,0,0,.05)!important;color:#111!important;border-color:rgba(0,0,0,.15)!important;}

body{background:#000;color:var(--text);font-family:'DM Sans',sans-serif;height:100vh;overflow:hidden;display:flex;flex-direction:column;}

/* NAV */
nav{position:relative;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:8px 56px;background:rgba(7,7,10,.97);backdrop-filter:blur(16px);border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0;}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
.nav-tv-svg{width:38px;height:32px;}
.nav-tv-svg--day{display:none;}
html.day-mode .nav-tv-svg:not(.nav-tv-svg--day){display:none;}
html.day-mode .nav-tv-svg--day{display:block;}
.logo-text-col{display:flex;flex-direction:column;}
.logo-eyebrow{font-size:.52rem;letter-spacing:3px;color:rgba(255,255,255,.5);font-weight:300;font-style:italic;text-transform:uppercase;}
.logo-main{font-family:'Bebas Neue',sans-serif;font-size:1.75rem;letter-spacing:4px;color:#fff;}
.logo-main em{color:var(--gold);font-style:normal;}
.nav-right{display:flex;align-items:center;gap:10px;}
.nav-icon-btn{background:none;border:none;cursor:pointer;color:rgba(255,255,255,.6);padding:4px;display:flex;align-items:center;justify-content:center;border-radius:50%;transition:color .2s,background .2s;}
.nav-icon-btn:hover{color:#fff;background:rgba(255,255,255,.08);}
.nav-avatar-initials{width:42px;height:42px;border-radius:50%;border:2px solid rgba(200,168,75,.4);background:rgba(200,168,75,.12);color:var(--gold);font-size:.75rem;font-weight:700;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.nav-tv-svg{width:52px;height:auto;display:block;flex-shrink:0;filter:drop-shadow(0 0 8px rgba(192,0,14,.4));transition:filter .2s;}
.nav-tv-svg--day{display:none;}
html.day-mode .nav-tv-svg:not(.nav-tv-svg--day){display:none;}
html.day-mode .nav-tv-svg--day{display:inline;}
.nav-user-wrap{position:relative;}
.user-dropdown{position:absolute;top:calc(100% + 8px);right:0;background:rgba(13,13,16,.98);border:1px solid rgba(255,255,255,.1);border-radius:10px;min-width:190px;padding:6px 0;opacity:0;pointer-events:none;transform:translateY(-6px);transition:opacity .2s,transform .2s;box-shadow:0 20px 48px rgba(0,0,0,.7);z-index:400;}
.user-dropdown.open{opacity:1;pointer-events:all;transform:translateY(0);}
.dropdown-header{padding:10px 14px 8px;border-bottom:1px solid rgba(255,255,255,.06);margin-bottom:4px;}
.dropdown-name{font-size:.9rem;font-weight:600;color:#fff;margin-bottom:2px;}
.dropdown-email{font-size:.65rem;color:var(--muted);}
.dropdown-item{display:flex;align-items:center;gap:10px;padding:9px 14px;font-size:.82rem;color:rgba(255,255,255,.65);cursor:pointer;transition:background .15s,color .15s;background:none;border:none;width:100%;text-align:left;font-family:'DM Sans',sans-serif;}
.dropdown-item:hover{background:rgba(255,255,255,.05);color:rgba(255,255,255,.9);}
.dropdown-item.danger{color:rgba(255,80,80,.6);}
.dropdown-item.danger:hover{background:rgba(192,0,14,.08);color:#ff6b6b;}

/* PLANNER LAYOUT */
#planner-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg);}

/* ── MAJOR TABS ── */
#major-tab-bar{display:flex;align-items:center;gap:0;border-bottom:2px solid rgba(255,255,255,.1);background:#0b0b10;flex-shrink:0;padding:0 0 0 20px;}
.major-tab{padding:12px 22px;font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:2px;color:rgba(255,255,255,.5);cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;margin-bottom:-2px;transition:color .18s,border-color .18s;white-space:nowrap;}
.major-tab:hover{color:rgba(255,255,255,.85);}
.major-tab.active{color:#fff;border-bottom-color:var(--accent);}
.major-tab.disabled{color:rgba(255,255,255,.22);cursor:default;}

/* ── SUB-TOOLBAR (full width, sits between major tabs and body) ── */
#workspace-booking-toolbar,#planner-toolbar{display:flex;align-items:center;gap:0;border-bottom:1px solid rgba(255,255,255,.1);flex-shrink:0;background:#111118;}

/* ── WORKSPACE PANELS ── */
#planner-workspace{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
#planner-tabs-row{display:flex;align-items:stretch;gap:0;overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none;border-right:1px solid rgba(255,255,255,.1);}
#planner-tabs-row::-webkit-scrollbar{display:none;}
.planner-tab{padding:10px 18px;border:none;border-right:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.02);color:rgba(255,255,255,.6);font-family:'DM Sans',sans-serif;font-size:.78rem;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .15s;border-bottom:2px solid transparent;}
.planner-tab:hover{background:rgba(255,255,255,.07);color:#fff;}
.planner-tab.active{background:rgba(255,255,255,.08);color:#fff;border-bottom-color:var(--gold);}
.planner-tab-add{padding:10px 14px;border:none;border-right:1px solid rgba(255,255,255,.08);background:none;color:rgba(255,255,255,.45);font-family:'DM Sans',sans-serif;font-size:.78rem;font-weight:600;cursor:pointer;transition:color .15s,background .15s;white-space:nowrap;}
.planner-tab-add:hover{color:#fff;background:rgba(255,255,255,.05);}
#planner-actions{display:flex;align-items:center;gap:10px;flex:1;padding:8px 16px;justify-content:flex-end;}
.pln-show-inp{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.16);border-radius:7px;padding:7px 12px;color:#eee;font-family:'DM Sans',sans-serif;font-size:.82rem;outline:none;}
.pln-show-inp:focus{border-color:rgba(200,168,75,.5);}
.pln-show-inp::placeholder{color:rgba(255,255,255,.3);}
#pln-progress-label{font-size:.7rem;color:rgba(255,255,255,.6);white-space:nowrap;font-family:'DM Sans',sans-serif;}
.pln-progress-bar{width:80px;height:4px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden;flex-shrink:0;}
.pln-progress-fill{height:100%;background:linear-gradient(90deg,#c0000e,#c8a84b);border-radius:2px;transition:width .4s;}
.pln-btn{padding:7px 16px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:.78rem;font-weight:700;cursor:pointer;border:none;transition:opacity .15s;}
.pln-btn-save{background:var(--accent);color:#fff;border:1px solid rgba(255,255,255,.1);}
.pln-btn-save:hover{opacity:.85;}
.pln-btn-pdf{background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.24);color:#fff;}
.pln-btn-pdf:hover{background:rgba(255,255,255,.22);}

/* BODY */
#planner-body{display:flex;flex:1;overflow:hidden;min-height:0;position:relative;}
#planner-workspace{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
#workspace-booking{display:flex;flex-direction:column;flex:1;overflow:hidden;background:#0f0f14;}
#workspace-management{display:none;flex:1;flex-direction:column;overflow:hidden;background:#0f0f14;}

/* RIGHT-SIDE COLUMN RESIZE HANDLES */
.col-resize-handle{
  position:absolute;top:0;bottom:0;width:8px;
  cursor:col-resize;z-index:20;
  transform:translateX(-50%);
  display:flex;align-items:center;justify-content:center;
}
.col-resize-handle::after{
  content:'';width:2px;height:60%;border-radius:2px;
  background:rgba(255,255,255,.15);transition:background .15s;
}
.col-resize-handle:hover::after,
.col-resize-handle.dragging::after{background:rgba(200,168,75,.8);}
.col-resize-handle:hover,
.col-resize-handle.dragging{background:rgba(200,168,75,.06);}

/* LEFT — ROSTER */
#planner-left{width:180px;flex-shrink:0;border-right:1px solid rgba(255,255,255,.1);display:flex;flex-direction:column;overflow:hidden;background:#0b0b10;}
#planner-left-header{padding:12px 10px 8px;border-bottom:1px solid rgba(255,255,255,.09);flex-shrink:0;}
#planner-left-title{font-size:.52rem;letter-spacing:2.5px;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:8px;}
#planner-add-row{display:flex;gap:5px;}
#planner-name-inp{flex:1;min-width:0;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:6px;padding:6px 8px;color:#eee;font-family:'DM Sans',sans-serif;font-size:.75rem;outline:none;}
#planner-name-inp:focus{border-color:rgba(200,168,75,.5);}
#planner-name-inp::placeholder{color:rgba(255,255,255,.3);}
#planner-add-btn{flex-shrink:0;width:28px;height:28px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);border-radius:6px;color:rgba(255,255,255,.75);cursor:pointer;font-size:.85rem;line-height:1;transition:background .15s;display:flex;align-items:center;justify-content:center;padding:0;}
#planner-add-btn:hover{background:rgba(255,255,255,.18);color:#fff;}
#planner-roster-list{flex:1;overflow-y:auto;padding:8px 8px;display:flex;flex-direction:column;gap:4px;}
.planner-pill{display:flex;align-items:center;justify-content:space-between;gap:4px;padding:6px 8px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);border-radius:16px;cursor:grab;font-size:.75rem;font-weight:600;color:#e8e8e8;font-family:'DM Sans',sans-serif;user-select:none;transition:opacity .2s,background .15s;}
.planner-pill:hover{background:rgba(255,255,255,.14);}
.planner-pill.used{opacity:.25;border-color:rgba(255,255,255,.05);background:rgba(255,255,255,.02);color:rgba(255,255,255,.4);}
.planner-pill-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0;user-select:text;-webkit-user-select:text;}
.planner-pill-x{background:none;border:none;color:rgba(255,255,255,.4);cursor:pointer;font-size:.65rem;padding:0;line-height:1;flex-shrink:0;width:14px;text-align:center;}
.planner-pill-x:hover{color:#c0000e;}

/* RIGHT — CARDS */
#planner-right{flex:1;overflow-y:auto;overflow-x:hidden;padding:0;}
#planner-columns{display:flex;gap:0;align-items:flex-start;flex-direction:column;}
.planner-col{flex:1;width:100%;display:flex;flex-direction:column;gap:0;}

/* CARD — mobile base */
.planner-card{background:#18181f;border:none;border-radius:8px;padding:14px;transition:border-color .2s;}
.planner-card.done{border-color:rgba(76,175,100,.3);background:#0f1a12;}
.planner-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px;}
.planner-card-left{display:flex;align-items:center;gap:7px;flex:1;min-width:0;}
.planner-drag-handle{cursor:grab;color:rgba(255,255,255,.4);flex-shrink:0;line-height:0;padding:2px 3px;border-radius:3px;transition:color .15s;}
.planner-drag-handle:hover{color:rgba(255,255,255,.85);}
.planner-card-title{background:none;border:none;color:#ffffff;font-family:'Bebas Neue',sans-serif;font-size:1.05rem;letter-spacing:2.5px;outline:none;min-width:0;flex:1;user-select:text;-webkit-user-select:text;cursor:text;}
.planner-card-title::placeholder{color:rgba(255,255,255,.3);}
.planner-card-right{display:flex;align-items:center;gap:7px;}
.planner-done-cb{width:15px;height:15px;accent-color:#4caf64;cursor:pointer;flex-shrink:0;}
.planner-del-btn{background:none;border:none;color:rgba(255,255,255,.4);cursor:pointer;font-size:.75rem;padding:2px 4px;line-height:1;transition:color .15s;}
.planner-del-btn:hover{color:#c0000e;}

/* DROP ZONE */
.planner-drop-zone{min-height:46px;border:1px dashed rgba(255,255,255,.2);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.68rem;color:rgba(255,255,255,.4);font-family:'DM Sans',sans-serif;margin-bottom:9px;transition:border-color .2s,background .2s;flex-wrap:wrap;gap:6px;padding:8px;}
.planner-drop-zone.has-names{border-style:solid;border-color:rgba(255,255,255,.15);justify-content:flex-start;}
.planner-drop-zone.drag-over{border-color:rgba(200,168,75,.6);background:rgba(200,168,75,.06);}
.planner-name-chip{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.22);border-radius:14px;font-size:.76rem;font-weight:700;color:#fff;font-family:'DM Sans',sans-serif;user-select:text;-webkit-user-select:text;cursor:grab;transition:background .15s;}
.planner-name-chip:hover{background:rgba(255,255,255,.2);}
.planner-name-chip.drag-src{opacity:.35;}
.planner-chip-x{background:none;border:none;color:rgba(255,255,255,.5);cursor:pointer;font-size:.65rem;padding:0 1px;line-height:1;}
.planner-chip-x:hover{color:#ff5555;}
.planner-vs-sep{display:inline-flex;align-items:center;padding:0 7px;font-size:.6rem;font-weight:800;letter-spacing:1.5px;color:rgba(255,255,255,.4);pointer-events:none;font-family:'DM Sans',sans-serif;flex-shrink:0;}
.planner-more-hint{font-size:.55rem;color:rgba(255,255,255,.3);font-style:italic;width:100%;text-align:center;margin-top:2px;pointer-events:none;}

/* FORMAT PILLS */
.planner-fmt-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px;}
.planner-fmt-btn{padding:3px 10px;border-radius:12px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.08);color:rgba(255,255,255,.7);font-size:.65rem;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;}
.planner-fmt-btn:hover{background:rgba(255,255,255,.14);color:#fff;}
.planner-fmt-btn.active{border-color:rgba(200,168,75,.6);background:rgba(200,168,75,.18);color:#e8c060;}

/* CARD INPUTS */
.planner-card-inputs{display:flex;gap:6px;}
.planner-card-inp{flex:1;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.14);border-radius:7px;padding:7px 9px;color:#ddd;font-family:'DM Sans',sans-serif;font-size:.76rem;outline:none;min-width:0;user-select:text;-webkit-user-select:text;}
.planner-card-inp:focus{border-color:rgba(200,168,75,.5);background:rgba(255,255,255,.09);}
.planner-card-inp::placeholder{color:rgba(255,255,255,.32);}

/* ── DESKTOP STRIP LAYOUT (701px+) ── */
@media(min-width:701px){
  #planner-right{background:#0f0f14;}
  #planner-columns{flex-direction:column;gap:0;}
  .planner-col{flex:none;width:100%;}

  /* Column header — fixed left 3, draggable right 3 */
  #planner-col-header{
    display:grid;
    grid-template-columns: 36px 412px 50fr 10fr 15fr 13fr;
    padding:8px 0 6px;
    border-bottom:1px solid rgba(255,255,255,.08);
    margin-bottom:2px;
    background:#0f0f14;
    position:sticky;top:0;z-index:10;
  }
  .pch{
    font-size:.55rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;
    color:rgba(255,255,255,.3);font-family:'DM Sans',sans-serif;
    padding:0 14px;display:flex;align-items:center;overflow:hidden;white-space:nowrap;
  }
  .pch:first-child{justify-content:center;padding:0;}
  .pch.gold{color:var(--gold);}

  /* Each card = one spreadsheet row — mirrors header grid */
  .planner-card{
    display:grid;
    grid-template-columns: 36px 412px 50fr 10fr 15fr 13fr;
    width:100%;min-height:48px;
    padding:0;border:none;border-radius:0;
    border-bottom:1px solid rgba(255,255,255,.04);
    background:transparent;
    align-items:center;
    transition:background .1s;
  }
  .planner-card:nth-child(odd){background:rgba(255,255,255,.02);}
  .planner-card:hover{background:rgba(200,168,75,.05) !important;}
  .planner-card.done{background:rgba(76,175,100,.04) !important;}
  .planner-card.done .planner-card-title{color:#5cb870;text-decoration:line-through;text-decoration-color:rgba(92,184,112,.4);}

  /* Segment mirrors card grid */
  .planner-segment{
    display:grid !important;
    grid-template-columns: 36px 412px 50fr 10fr 15fr 13fr !important;
    width:100%;min-height:48px !important;
    padding:0;border:none;border-radius:0;
    border-bottom:1px solid rgba(255,255,255,.04);
    background:transparent;align-items:stretch !important;
    transition:background .1s;opacity:.85;position:relative;overflow:visible;
  }
  .planner-segment:hover{background:rgba(255,255,255,.03) !important;opacity:1;}
  .planner-segment.done{opacity:.4;}
  .planner-segment:nth-child(odd){background:rgba(255,255,255,.01);}
  /* Show native select on desktop (base CSS hides it) */
  .seg-type-select{display:block !important;}

  /* Cell shared style */
  .planner-card > *{
    align-self:stretch;
    display:flex;
    align-items:center;
    border-right:1px solid rgba(255,255,255,.04);
    padding:0 12px;
    overflow:hidden;
    min-width:0;
  }
  .planner-card > *:last-child{border-right:none;}

  /* Col 1: drag + controls */
  .planner-card-header{
    grid-column:1;padding:0;justify-content:center;gap:0;
    flex-direction:column;gap:3px;border-right:1px solid rgba(255,255,255,.04);
    background:transparent;margin-bottom:0;
  }
  .planner-card-left{display:none;}
  .planner-card-right{flex-direction:column;gap:3px;align-items:center;justify-content:center;}
  .planner-drag-handle{padding:0;}
  .planner-done-cb{width:13px;height:13px;}
  .planner-del-btn{font-size:.6rem;padding:0;}

  /* Col 2: slot name */
  .planner-card-slot-col{grid-column:2;}
  .planner-card-title{
    font-family:'Bebas Neue',sans-serif;font-size:.8rem;letter-spacing:2.5px;
    color:#fff;background:none;border:none;outline:none;
    width:100%;cursor:text;user-select:text;-webkit-user-select:text;
  }
  .planner-card-title::placeholder{color:rgba(255,255,255,.18);}

  /* Col 3: names drop zone */
  .planner-drop-zone{
    grid-column:3;
    margin-bottom:0;border:none;border-radius:0;
    padding:0 10px;min-height:unset;align-self:stretch;
    flex-wrap:nowrap;justify-content:flex-start;gap:0;
    background:transparent;
    border-right:1px solid rgba(255,255,255,.04);
    align-items:center;
    overflow:hidden;
  }
  .planner-name-chip{
    flex-shrink:0;
    font-size:.72rem;
    padding:3px 8px;
  }
  .planner-vs-sep{
    flex-shrink:0;
    padding:0 5px;
    font-size:.58rem;
  }
  .planner-more-hint{display:none;}

  /* Col 4: match type */
  .planner-inp-matchtype{grid-column:4;}

  /* Col 5: championship */
  .planner-inp-champ{grid-column:5;}

  /* Col 6: format pills */
  .planner-fmt-row{
    grid-column:6;
    margin-bottom:0;padding:4px 8px;
    flex-wrap:wrap;align-content:center;gap:3px;
    align-self:stretch;border-right:none !important;
  }
  .planner-fmt-btn{padding:2px 7px;font-size:.56rem;}

  /* Unwrap the nesting containers */
  .planner-card-right-panel{display:contents;}
  .planner-card-inputs{display:contents;}

  /* Inputs look like plain text until focused */
  .planner-card-inp{
    width:100%;background:transparent;border:none;border-radius:0;
    padding:0;font-size:.75rem;color:#fff;outline:none;
    font-family:'DM Sans',sans-serif;min-width:0;
  }
  .planner-card-inp:focus{color:#fff;}
  .planner-card-inp::placeholder{color:rgba(255,255,255,.3);font-size:.7rem;}

  /* Segment cells on desktop */
  .seg-controls{grid-column:1;align-self:stretch;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:0 4px;border-right:1px solid rgba(255,255,255,.04);}
  .seg-slot-label{grid-column:2;padding:0 8px;border-right:1px solid rgba(255,255,255,.04);align-self:stretch;display:flex;flex-direction:column;align-items:flex-start;justify-content:center;gap:2px;overflow:visible;min-width:0;max-width:412px;position:relative;z-index:50;}
  .seg-slot-label span{font-family:'Bebas Neue',sans-serif;font-size:.65rem;letter-spacing:2px;color:rgba(255,255,255,.5);white-space:nowrap;}
  .seg-slot-label .seg-type-select{min-width:0;width:100%;font-size:.68rem;color:#fff;background:transparent;border:none;outline:none;}
  .seg-drop-zone{
    grid-column:3 !important;
    display:flex !important;align-items:center;flex-wrap:nowrap;gap:4px;overflow:hidden;
    padding:0 12px;align-self:stretch;
    border-left:none;border-top:none;border-bottom:none;
    border-right:1px solid rgba(255,255,255,.04);
    outline:1px dashed rgba(255,255,255,.15);
    outline-offset:-4px;
    background:transparent;font-size:.7rem;color:rgba(255,255,255,.35);font-style:italic;font-family:'DM Sans',sans-serif;
    min-height:unset !important;margin-bottom:0 !important;border-radius:0 !important;
    transition:background .2s,outline-color .2s;
  }
  .seg-drop-zone.has-names{outline-color:rgba(255,255,255,.08);font-style:normal;}
  .seg-drop-zone.drag-over{background:rgba(200,168,75,.06) !important;outline-color:rgba(200,168,75,.5);}
  .seg-body{display:none;}
  .seg-note-col{grid-column:4/span 3;padding:0 12px;align-self:stretch;display:flex;align-items:center;}
  .seg-del{position:absolute;right:4px;top:50%;transform:translateY(-50%);padding:0 6px;background:none;border:none;color:rgba(255,255,255,.2);cursor:pointer;font-size:.65rem;z-index:5;}
  .planner-segment{position:relative;}
}

/* ADD SLOT / SEGMENT BUTTONS */
#planner-add-row-btns{display:flex;gap:8px;padding:10px 16px 16px;}
#planner-add-slot{flex:none;padding:9px 18px;background:rgba(255,255,255,.05);border:1px dashed rgba(255,255,255,.2);border-radius:7px;color:rgba(255,255,255,.5);font-family:'DM Sans',sans-serif;font-size:.75rem;font-weight:600;cursor:pointer;transition:background .15s,color .15s;}
#planner-add-slot:hover{background:rgba(255,255,255,.09);color:rgba(255,255,255,.85);}
#planner-add-segment{flex:none;padding:9px 16px;background:transparent;border:1px dashed rgba(255,255,255,.1);border-radius:7px;color:rgba(255,255,255,.28);font-family:'DM Sans',sans-serif;font-size:.72rem;font-weight:500;cursor:pointer;transition:background .15s,color .15s;letter-spacing:.3px;}
#planner-add-segment:hover{background:rgba(255,255,255,.04);color:rgba(255,255,255,.55);}

/* SEGMENT STRIP */
.planner-segment{
  display:grid;
  grid-template-columns: 36px 1fr auto;
  width:100%;min-height:32px;
  padding:0;border:none;border-radius:0;
  border-bottom:1px solid rgba(255,255,255,.04);
  background:transparent;
  align-items:center;
  transition:background .1s;
  opacity:.7;
}
.planner-segment:hover{background:rgba(255,255,255,.03) !important;opacity:1;}
.planner-segment.done{opacity:.4;}
.planner-segment:nth-child(odd){background:rgba(255,255,255,.01);}

/* Segment col 1: handle + checkbox */
.seg-controls{
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
  padding:0 4px;border-right:1px solid rgba(255,255,255,.05);align-self:stretch;
}
.seg-drag-handle{cursor:grab;color:rgba(255,255,255,.2);padding:2px;border-radius:2px;line-height:0;transition:color .15s;}
.seg-drag-handle:hover{color:rgba(255,255,255,.6);}
.seg-done-cb{width:11px;height:11px;accent-color:#6fcf80;cursor:pointer;}

/* Segment col 2: type dropdown + optional label */
.seg-body{
  display:flex;align-items:center;gap:10px;
  padding:0 12px;align-self:stretch;
  border-right:1px solid rgba(255,255,255,.05);
}
.seg-type-select{display:none;}/* hidden — replaced by custom dropdown */

/* Custom segment type picker */
.seg-picker{
  position:relative;display:inline-flex;align-items:center;
  width:100%;cursor:pointer;
}
.seg-picker-val{
  font-family:'DM Sans',sans-serif;font-size:.65rem;font-weight:500;
  color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  max-width:190px;min-width:0;
  padding-right:12px;
}
.seg-picker::after{
  content:'▾';position:absolute;right:0;
  font-size:.6rem;color:rgba(255,255,255,.3);pointer-events:none;
}
.seg-picker-menu{
  position:absolute;top:calc(100% + 4px);left:0;
  background:#1a1a24;border:1px solid rgba(255,255,255,.12);
  border-radius:8px;z-index:500;
  min-width:200px;max-height:240px;overflow-y:auto;
  box-shadow:0 12px 32px rgba(0,0,0,.6);
  padding:4px 0;
  scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.1) transparent;
}
.seg-picker-menu.hidden{display:none;}
.seg-picker-opt{
  padding:7px 14px;font-family:'DM Sans',sans-serif;font-size:.75rem;
  color:rgba(255,255,255,.65);cursor:pointer;white-space:nowrap;
  transition:background .1s,color .1s;
}
.seg-picker-opt:hover{background:rgba(255,255,255,.07);color:#fff;}
.seg-picker-opt.active{color:var(--gold);}
.seg-note-inp{
  flex:1;background:transparent;border:none;outline:none;
  color:#fff;font-family:'DM Sans',sans-serif;
  font-size:.68rem;width:100%;
}
.seg-note-inp:focus{color:rgba(255,255,255,.7);}
.seg-note-inp::placeholder{color:rgba(255,255,255,.18);}

/* Segment col 3: delete */
.seg-del{
  padding:0 10px;align-self:stretch;display:flex;align-items:center;
  background:none;border:none;color:rgba(255,255,255,.18);
  cursor:pointer;font-size:.65rem;transition:color .15s;
}
.seg-del:hover{color:#c0000e;}

/* TOAST */
#pln-toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:#1a1a24;border:1px solid rgba(255,255,255,.12);color:#e8e8e8;font-family:'DM Sans',sans-serif;font-size:.8rem;padding:10px 20px;border-radius:20px;z-index:9999;opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;white-space:nowrap;}
#pln-toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ── MOBILE BOOKING UI (≤700px) ── */

/* Hide mobile-only elements on desktop */
#mob-booking-shell{display:none;}
#mob-picker-sheet,#mob-rename-sheet,#mob-seg-sheet{display:none;}
#mob-picker-sheet:not(.hidden),#mob-rename-sheet:not(.hidden),#mob-seg-sheet:not(.hidden){display:flex;}

@media(max-width:700px){

  /* ── NAV ── */
  nav{padding:6px 14px!important;}
  .logo-text-col{display:none;}
  .nav-tv-svg{width:34px!important;}

  /* ── MAJOR TABS: keep both, hide PDF, inline Save ── */
  #major-tab-bar{padding:0;overflow-x:auto;scrollbar-width:none;}
  #major-tab-bar::-webkit-scrollbar{display:none;}
  .major-tab{padding:10px 16px;font-size:.8rem;letter-spacing:1.5px;}
  #pln-pdf-btn{display:none!important;}
  /* Move save to FAB — hide inline */
  #major-tab-actions{display:none!important;}

  /* ── HIDE DESKTOP PLANNER TOOLBAR (show/episode inputs) ── */
  #planner-toolbar{display:none!important;}

  /* ── HIDE DESKTOP LEFT ROSTER PANEL ── */
  #planner-left{display:none!important;}

  /* ── HIDE DESKTOP CARDS AREA, show mobile shell instead ── */
  #workspace-booking{display:none!important;}

  /* ── SHOW MOBILE BOOKING SHELL ── */
  #mob-booking-shell{
    display:flex;flex-direction:column;flex:1;overflow:hidden;
    background:var(--bg);width:100%;
  }

  /* Show tabs: horizontal scroll */
  #mob-show-tabs{
    display:flex;align-items:stretch;overflow-x:auto;
    scrollbar-width:none;-webkit-overflow-scrolling:touch;
    background:#0b0b10;border-bottom:1px solid rgba(255,255,255,.08);
    flex-shrink:0;
  }
  #mob-show-tabs::-webkit-scrollbar{display:none;}
  .mob-stab{
    padding:11px 18px;border:none;background:none;
    color:rgba(255,255,255,.45);font-family:'DM Sans',sans-serif;
    font-size:.8rem;font-weight:600;white-space:nowrap;cursor:pointer;
    border-bottom:2px solid transparent;transition:all .15s;flex-shrink:0;
    -webkit-tap-highlight-color:transparent;
  }
  .mob-stab.active{color:#fff;border-bottom-color:var(--gold);}
  .mob-stab-add{
    padding:11px 14px;border:none;background:none;
    color:rgba(255,255,255,.3);font-family:'DM Sans',sans-serif;
    font-size:.85rem;cursor:pointer;flex-shrink:0;
    -webkit-tap-highlight-color:transparent;
  }
  /* Editable tab — long press shows rename */
  .mob-stab-name{pointer-events:none;}

  /* Progress bar: full width below show tabs */
  #mob-progress-wrap{
    flex-shrink:0;background:#0b0b10;padding:0 0 8px;
    border-bottom:1px solid rgba(255,255,255,.07);
  }
  #mob-prog-bar{width:100%;height:3px;background:rgba(255,255,255,.08);}
  #mob-prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--gold));transition:width .4s;}
  #mob-prog-label{
    font-size:.6rem;color:rgba(255,255,255,.35);text-align:right;
    padding:3px 12px 0;font-family:'DM Sans',sans-serif;
  }

  /* Sub tabs: Roster | Program */
  #mob-sub-tabs{
    display:flex;border-bottom:1px solid rgba(255,255,255,.08);
    background:#0d0d12;flex-shrink:0;
  }
  .mob-subtab{
    flex:1;padding:11px 0;text-align:center;
    font-family:'DM Sans',sans-serif;font-size:.8rem;font-weight:700;
    color:rgba(255,255,255,.4);border:none;background:none;cursor:pointer;
    border-bottom:2px solid transparent;letter-spacing:.5px;
    -webkit-tap-highlight-color:transparent;transition:all .15s;
  }
  .mob-subtab.active{color:#fff;border-bottom-color:var(--accent);}

  /* ── ROSTER PANEL ── */
  #mob-roster-panel{
    display:flex;flex-direction:column;flex:1;overflow:hidden;
  }
  #mob-roster-panel.hidden{display:none;}
  #mob-roster-add{
    display:flex;gap:8px;padding:10px 14px;
    border-bottom:1px solid rgba(255,255,255,.07);flex-shrink:0;
  }
  #mob-roster-inp{
    flex:1;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);
    border-radius:8px;padding:9px 13px;color:#eee;
    font-family:'DM Sans',sans-serif;font-size:.85rem;outline:none;
  }
  #mob-roster-inp:focus{border-color:rgba(200,168,75,.5);}
  #mob-roster-inp::placeholder{color:rgba(255,255,255,.28);}
  #mob-roster-addbtn{
    flex-shrink:0;width:38px;height:38px;background:rgba(255,255,255,.1);
    border:1px solid rgba(255,255,255,.18);border-radius:8px;color:#fff;
    font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;
  }
  #mob-roster-list{
    flex:1;overflow-y:auto;padding:8px 12px;
    display:flex;flex-direction:column;gap:6px;
  }
  .mob-roster-item{
    display:flex;align-items:center;justify-content:space-between;
    padding:11px 14px;background:rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.1);border-radius:10px;
    font-family:'DM Sans',sans-serif;font-size:.88rem;font-weight:600;color:#e8e8e8;
  }
  .mob-roster-item.used{opacity:.35;}
  .mob-roster-rmv{
    background:none;border:none;color:rgba(255,255,255,.3);
    font-size:.75rem;cursor:pointer;padding:2px 4px;
  }
  .mob-roster-rmv:hover{color:#c0000e;}

  /* ── PROGRAM PANEL ── */
  #mob-program-panel{
    display:none;flex-direction:column;flex:1;overflow:hidden;
  }
  #mob-program-panel.active{display:flex;}
  #mob-cards-scroll{
    flex:1;overflow-y:auto;padding:10px 12px 100px;
    -webkit-overflow-scrolling:touch;
  }

  /* ── MOBILE CARD ── */
  .mob-card{
    background:#16161c;border:1px solid rgba(255,255,255,.09);
    border-radius:12px;margin-bottom:10px;overflow:hidden;
    transition:box-shadow .2s, opacity .2s, transform .2s;
    touch-action:pan-y; /* allow long-press drag but not interfere with scroll */

  .mob-card.done{border-color:rgba(76,175,100,.3);background:#0e1810;}
  .mob-card.mob-lifting{
    opacity:.55;transform:scale(.97);
    box-shadow:0 12px 40px rgba(0,0,0,.7);
  }
  .mob-card.mob-drag-over{
    border-color:rgba(200,168,75,.7);
    box-shadow:0 0 0 2px rgba(200,168,75,.3);
  }

  /* Card header */
  .mob-card-header{
    display:flex;align-items:center;gap:10px;
    padding:12px 14px 0;
  }
  .mob-card-num{
    font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:2px;
    color:rgba(255,255,255,.25);flex-shrink:0;min-width:24px;
  }
  .mob-card-title-inp{
    flex:1;background:none;border:none;outline:none;
    font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:2px;
    color:#fff;min-width:0;
  }
  .mob-card-title-inp::placeholder{color:rgba(255,255,255,.2);}
  .mob-card-done-cb{
    width:18px;height:18px;accent-color:#4caf64;cursor:pointer;flex-shrink:0;
  }
  .mob-card-del{
    background:none;border:none;color:rgba(255,255,255,.25);
    font-size:.75rem;cursor:pointer;padding:2px 4px;flex-shrink:0;
  }

  /* Competitors area */
  .mob-card-competitors{
    padding:8px 14px 0;display:flex;flex-wrap:wrap;gap:6px;align-items:center;
    min-height:34px;
  }
  .mob-comp-chip{
    display:inline-flex;align-items:center;gap:5px;
    padding:5px 11px;background:rgba(255,255,255,.12);
    border:1px solid rgba(255,255,255,.2);border-radius:20px;
    font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:700;color:#fff;
  }
  .mob-comp-x{
    background:none;border:none;color:rgba(255,255,255,.4);
    font-size:.65rem;cursor:pointer;padding:0;line-height:1;
  }
  .mob-vs-sep{
    font-size:.6rem;font-weight:800;letter-spacing:1.5px;
    color:rgba(255,255,255,.35);font-family:'DM Sans',sans-serif;
  }
  .mob-add-comp{
    display:inline-flex;align-items:center;gap:4px;
    padding:5px 10px;background:rgba(255,255,255,.06);
    border:1px dashed rgba(255,255,255,.2);border-radius:20px;
    font-family:'DM Sans',sans-serif;font-size:.78rem;color:rgba(255,255,255,.45);
    cursor:pointer;-webkit-tap-highlight-color:transparent;
    transition:background .15s,border-color .15s;
  }
  .mob-add-comp:active{background:rgba(255,255,255,.12);}

  /* Bottom row: pills + trophy */
  .mob-card-bottom{
    padding:8px 14px 12px;
    display:flex;align-items:center;gap:8px;flex-wrap:wrap;
  }
  /* Format pills */
  .mob-fmt-pill{
    padding:4px 12px;border-radius:14px;border:1px solid rgba(255,255,255,.18);
    background:rgba(255,255,255,.07);color:rgba(255,255,255,.65);
    font-family:'DM Sans',sans-serif;font-size:.7rem;font-weight:700;
    cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all .15s;
  }
  .mob-fmt-pill.active{
    border-color:rgba(200,168,75,.7);background:rgba(200,168,75,.18);color:#e8c060;
  }
  /* Trophy button */
  .mob-trophy-btn{
    background:none;border:none;font-size:1.05rem;cursor:pointer;
    opacity:.3;transition:opacity .2s;padding:2px 4px;
    -webkit-tap-highlight-color:transparent;flex-shrink:0;
  }
  .mob-trophy-btn.active{opacity:1;}
  /* Championship input (shown when trophy active) */
  .mob-champ-row{
    display:none;padding:0 14px 10px;
    align-items:center;gap:8px;
  }
  .mob-champ-row.visible{display:flex;}
  .mob-champ-inp{
    flex:1;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.15);
    border-radius:8px;padding:8px 12px;color:#eee;
    font-family:'DM Sans',sans-serif;font-size:.82rem;outline:none;
  }
  .mob-champ-inp:focus{border-color:rgba(200,168,75,.5);}
  .mob-champ-inp::placeholder{color:rgba(255,255,255,.25);}
  .mob-champ-check{
    flex-shrink:0;width:30px;height:30px;background:rgba(76,175,100,.15);
    border:1px solid rgba(76,175,100,.3);border-radius:8px;
    color:#4caf64;font-size:.8rem;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
  }

  /* ── SEGMENT CARD (mobile) ── */
  .mob-seg-card{
    background:#111118;border:1px solid rgba(255,255,255,.07);
    border-radius:10px;margin-bottom:8px;
    display:flex;align-items:center;gap:10px;padding:10px 14px;
    opacity:.8;
  }
  .mob-seg-card.done{opacity:.4;}
  .mob-seg-done{width:14px;height:14px;accent-color:#6fcf80;cursor:pointer;flex-shrink:0;}
  .mob-seg-type{
    flex:1;font-family:'DM Sans',sans-serif;font-size:.8rem;
    color:rgba(255,255,255,.6);cursor:pointer;position:relative;
  }
  .mob-seg-del{background:none;border:none;color:rgba(255,255,255,.2);font-size:.72rem;cursor:pointer;flex-shrink:0;}

  /* ── ADD BUTTONS ── */
  #mob-add-btns{
    display:flex;gap:10px;padding:4px 12px 12px;flex-shrink:0;
  }
  .mob-add-btn{
    flex:1;padding:12px;background:rgba(255,255,255,.05);
    border:1px dashed rgba(255,255,255,.18);border-radius:10px;
    color:rgba(255,255,255,.45);font-family:'DM Sans',sans-serif;
    font-size:.8rem;font-weight:600;cursor:pointer;
    -webkit-tap-highlight-color:transparent;transition:background .15s;
  }
  .mob-add-btn:active{background:rgba(255,255,255,.1);}

  /* ── FLOATING SAVE ── */
  #mob-save-fab{
    position:fixed;bottom:16px;right:16px;z-index:200;
    background:var(--accent);color:#fff;border:none;
    border-radius:28px;padding:13px 24px;
    font-family:'DM Sans',sans-serif;font-size:.85rem;font-weight:700;
    cursor:pointer;box-shadow:0 4px 20px rgba(192,0,14,.5);
    letter-spacing:.5px;display:flex;align-items:center;gap:7px;
    -webkit-tap-highlight-color:transparent;
  }

  /* ── PICKER SHEET (roster select) ── */
  #mob-picker-sheet{
    position:fixed;inset:0;z-index:300;
    display:flex;flex-direction:column;justify-content:flex-end;
  }
  #mob-picker-sheet.hidden{display:none;}
  #mob-picker-backdrop{
    position:absolute;inset:0;background:rgba(0,0,0,.6);
  }
  #mob-picker-panel{
    position:relative;z-index:1;
    background:#1a1a24;border-radius:20px 20px 0 0;
    border-top:1px solid rgba(255,255,255,.1);
    max-height:65vh;display:flex;flex-direction:column;
    padding-bottom:env(safe-area-inset-bottom,16px);
  }
  #mob-picker-handle{
    width:36px;height:4px;background:rgba(255,255,255,.2);
    border-radius:2px;margin:10px auto 4px;flex-shrink:0;
  }
  #mob-picker-title{
    font-family:'Bebas Neue',sans-serif;font-size:.95rem;letter-spacing:2px;
    color:rgba(255,255,255,.5);text-align:center;padding:0 16px 10px;
    flex-shrink:0;border-bottom:1px solid rgba(255,255,255,.07);
  }
  #mob-picker-list{
    overflow-y:auto;flex:1;padding:8px 12px 16px;
    display:flex;flex-direction:column;gap:6px;
  }
  .mob-picker-item{
    padding:13px 16px;background:rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.1);border-radius:10px;
    font-family:'DM Sans',sans-serif;font-size:.9rem;font-weight:600;
    color:#e8e8e8;cursor:pointer;-webkit-tap-highlight-color:transparent;
    transition:background .1s,border-color .1s;
  }
  .mob-picker-item:active{background:rgba(200,168,75,.15);border-color:rgba(200,168,75,.4);}
  .mob-picker-item.used{opacity:.3;pointer-events:none;}

  /* ── RENAME SHEET ── */
  #mob-rename-sheet{
    position:fixed;inset:0;z-index:300;
    display:flex;flex-direction:column;justify-content:flex-end;
  }
  #mob-rename-sheet.hidden{display:none;}
  #mob-rename-backdrop{position:absolute;inset:0;background:rgba(0,0,0,.6);}
  #mob-rename-panel{
    position:relative;z-index:1;background:#1a1a24;
    border-radius:20px 20px 0 0;border-top:1px solid rgba(255,255,255,.1);
    padding:16px 16px calc(16px + env(safe-area-inset-bottom,0px));
  }
  #mob-rename-panel h3{
    font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:2px;
    color:rgba(255,255,255,.5);margin-bottom:12px;
  }
  #mob-rename-inp{
    width:100%;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.2);
    border-radius:10px;padding:11px 14px;color:#fff;
    font-family:'DM Sans',sans-serif;font-size:.95rem;outline:none;margin-bottom:10px;
  }
  #mob-rename-inp:focus{border-color:rgba(200,168,75,.5);}
  .mob-rename-btns{display:flex;gap:8px;}
  .mob-rename-ok{
    flex:1;padding:12px;background:var(--gold);color:#111;
    border:none;border-radius:10px;font-family:'DM Sans',sans-serif;
    font-size:.88rem;font-weight:700;cursor:pointer;
  }
  .mob-rename-cancel{
    padding:12px 20px;background:rgba(255,255,255,.08);color:#fff;
    border:1px solid rgba(255,255,255,.15);border-radius:10px;
    font-family:'DM Sans',sans-serif;font-size:.88rem;cursor:pointer;
  }

  /* ── SEGMENT TYPE SHEET ── */
  #mob-seg-sheet{
    position:fixed;inset:0;z-index:300;
    display:flex;flex-direction:column;justify-content:flex-end;
  }
  #mob-seg-sheet.hidden{display:none;}
  #mob-seg-backdrop{position:absolute;inset:0;background:rgba(0,0,0,.6);}
  #mob-seg-panel{
    position:relative;z-index:1;background:#1a1a24;
    border-radius:20px 20px 0 0;border-top:1px solid rgba(255,255,255,.1);
    max-height:60vh;display:flex;flex-direction:column;
    padding-bottom:env(safe-area-inset-bottom,16px);
  }
  #mob-seg-panel .mob-picker-handle{display:block;}
  #mob-seg-title{
    font-family:'Bebas Neue',sans-serif;font-size:.95rem;letter-spacing:2px;
    color:rgba(255,255,255,.5);text-align:center;padding:0 16px 10px;
    flex-shrink:0;border-bottom:1px solid rgba(255,255,255,.07);
  }
  #mob-seg-list{
    overflow-y:auto;flex:1;padding:8px 12px 16px;
    display:flex;flex-direction:column;gap:5px;
  }
  .mob-seg-opt{
    padding:12px 16px;background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.08);border-radius:9px;
    font-family:'DM Sans',sans-serif;font-size:.85rem;color:rgba(255,255,255,.7);
    cursor:pointer;-webkit-tap-highlight-color:transparent;
  }
  .mob-seg-opt:active{background:rgba(255,255,255,.12);}
  .mob-seg-opt.active{color:var(--gold);border-color:rgba(200,168,75,.4);}

  /* Roster overlay (used from program tab if needed) */
  #mob-roster-overlay{
    display:none;position:fixed;inset:0;z-index:45;
    background:rgba(0,0,0,.45);
  }
  #mob-roster-overlay.active{display:block;}

  /* Hide old desktop elements inside workspace-management on mobile */
  #workspace-management{overflow-x:auto;}
  #mgmt-col-header{min-width:1000px;}
  #mgmt-roster-list{min-width:1000px;}
}

/* ── ROSTER MGMT WORKSPACE ── */
.mgmt-row{
  display:grid;grid-template-columns:36px 44px 200px 48px 130px 120px 80px 80px 150px 44px 180px;
  min-height:46px;border-bottom:1px solid rgba(255,255,255,.05);
  align-items:center;background:transparent;transition:background .1s;
  position:relative;
}
.mgmt-row:nth-child(odd){background:rgba(255,255,255,.015);}
.mgmt-row:hover{background:rgba(200,168,75,.04) !important;}
.mgmt-drag{cursor:grab;color:rgba(255,255,255,.25);display:flex;align-items:center;justify-content:center;align-self:stretch;border-right:1px solid rgba(255,255,255,.05);transition:color .15s;}
.mgmt-drag:hover{color:rgba(255,255,255,.7);}
.mgmt-drag.dragging{cursor:grabbing;}
.mgmt-cb-cell{display:flex;align-items:center;justify-content:center;border-right:1px solid rgba(255,255,255,.05);align-self:stretch;padding:0 8px;}
.mgmt-cb{width:14px;height:14px;accent-color:#c8a84b;cursor:pointer;}
.mgmt-name-cell{padding:0 14px;border-right:1px solid rgba(255,255,255,.05);align-self:stretch;display:flex;align-items:center;font-family:'DM Sans',sans-serif;font-size:.84rem;font-weight:600;color:#e8e8e8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mgmt-tags-cell{padding:0 14px;border-right:1px solid rgba(255,255,255,.05);align-self:stretch;display:flex;align-items:center;}
.mgmt-tags-inp{background:transparent;border:none;outline:none;color:rgba(255,255,255,.6);font-family:'DM Sans',sans-serif;font-size:.75rem;width:100%;padding:0 4px;}
.mgmt-tags-inp::placeholder{color:rgba(255,255,255,.18);font-style:italic;}
.mgmt-tags-inp:focus{color:#fff;}
.mgmt-created-cell{padding:0 12px;align-self:stretch;display:flex;align-items:center;justify-content:center;border-right:1px solid rgba(255,255,255,.05);}
.mgmt-created-toggle{display:flex;align-items:center;gap:5px;cursor:pointer;user-select:none;color:rgba(255,255,255,.35);font-family:'DM Sans',sans-serif;font-size:.68rem;font-weight:600;white-space:nowrap;}
.mgmt-created-toggle input[type=checkbox]{accent-color:#c8a84b;width:13px;height:13px;cursor:pointer;flex-shrink:0;}
.mgmt-created-toggle:has(input:checked){color:#c8a84b;}
.mgmt-notes-cell{padding:0 14px;align-self:stretch;display:flex;align-items:center;}
.mgmt-notes-inp{background:transparent;border:none;outline:none;color:rgba(255,255,255,.6);font-family:'DM Sans',sans-serif;font-size:.75rem;width:100%;padding:0 4px;}
.mgmt-notes-inp::placeholder{color:rgba(255,255,255,.18);font-style:italic;}
.mgmt-notes-inp:focus{color:#fff;}
.mgmt-ovr-cell{padding:0 6px;border-right:1px solid rgba(255,255,255,.05);align-self:stretch;display:flex;align-items:center;justify-content:center;}
.mgmt-ovr-inp{background:transparent;border:none;outline:none;color:#c8a84b;font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:1px;width:100%;text-align:center;padding:0;}
.mgmt-ovr-inp::placeholder{color:rgba(255,255,255,.18);font-family:'DM Sans',sans-serif;font-size:.75rem;letter-spacing:0;}
.mgmt-ovr-inp:focus{color:#e8c060;}
.mgmt-narrow-cell{padding:0 4px;border-right:1px solid rgba(255,255,255,.05);align-self:stretch;display:flex;align-items:center;justify-content:center;}
.mgmt-narrow-inp{background:transparent;border:none;outline:none;color:rgba(255,255,255,.65);font-family:'DM Sans',sans-serif;font-size:.75rem;width:100%;text-align:center;padding:0 2px;}
.mgmt-narrow-inp::placeholder{color:rgba(255,255,255,.15);font-style:italic;}
.mgmt-narrow-inp:focus{color:#fff;}
.mgmt-contact-cell{padding:0 14px;border-right:1px solid rgba(255,255,255,.05);align-self:stretch;display:flex;align-items:center;}
.mgmt-contact-inp{background:transparent;border:none;outline:none;color:rgba(255,255,255,.6);font-family:'DM Sans',sans-serif;font-size:.75rem;width:100%;padding:0 4px;}
.mgmt-contact-inp::placeholder{color:rgba(255,255,255,.18);font-style:italic;}
.mgmt-contact-inp:focus{color:#fff;}
.mgmt-row.dragging-src{opacity:.35;}
.mgmt-row.drag-over-top{border-top:2px solid rgba(200,168,75,.6);}
.mgmt-row.drag-over-bot{border-bottom:2px solid rgba(200,168,75,.6);}
</style>
</head>

<!-- PLANNER -->
<div id="planner-wrap">

  <!-- MAJOR TABS -->
  <div id="major-tab-bar">
    <button class="major-tab active" id="mtab-booking" onclick="switchMajorTab('booking')">Booking</button>
    <button class="major-tab" id="mtab-management" onclick="switchMajorTab('management')">Roster Mgmt</button>
    <div style="flex:1;"></div>
    <div id="major-tab-actions" style="display:flex;align-items:center;gap:8px;padding:0 16px;">
      <button class="pln-btn pln-btn-pdf" id="pln-pdf-btn" onclick="openPdfPreview()">View as PDF</button>
      <button class="pln-btn pln-btn-save" onclick="plannerSave()">Save</button>
    </div>
  </div>

  <!-- BOOKING SUB-TOOLBAR (outside body so it spans full width above roster+cards) -->
  <div id="planner-toolbar">
    <div id="planner-tabs-row"></div>
    <div id="planner-actions">
      <input id="pln-show-name" class="pln-show-inp" placeholder="Show name…" oninput="plannerDirty()">
      <input id="pln-episode" class="pln-show-inp" placeholder="Episode / #" style="width:100px;" oninput="plannerDirty()">
      <span id="pln-progress-label">0%</span>
      <div class="pln-progress-bar"><div class="pln-progress-fill" id="pln-prog-fill" style="width:0%"></div></div>

    </div>
  </div>

  <!-- BODY: roster + workspace side by side, below toolbar -->
  <div id="planner-body">

    <!-- LEFT — ROSTER (desktop only) -->
    <div id="planner-left">
      <div id="planner-left-header">
        <div id="planner-left-title">Roster</div>
        <div id="planner-add-row">
          <input id="planner-name-inp" placeholder="Wrestler name…" onkeydown="if(event.key==='Enter')plannerAddRoster()" maxlength="40">
          <button id="planner-add-btn" onclick="plannerAddRoster()">+</button>
        </div>
      </div>
      <div id="planner-roster-list"></div>
    </div>

    <!-- RIGHT — WORKSPACE -->
    <div id="planner-workspace">

      <!-- BOOKING WORKSPACE (cards only — toolbar moved above) -->

<script>
// ── STATE ──
var _tabs = [{ show_name:'', episode:'', cards:[] }];
var _tabIdx = 0;
var _roster = [];
var _dbId = null;
var _dragName = null;
var _dragCardIdx = null;
var _dragChip = null; // { cardIdx, nameIdx }
var _mgmtSort = null; // 'asc' | 'desc' | null

function _cur() { return _tabs[_tabIdx]; }

function plannerDirty() {
  // marks unsaved state — PDF button always available
}

function _defaultCards() {
  return Array.from({length:5}, function(_, i) {
    return { type:'match', title: 'Match ' + String.fromCharCode(65+i), names:[], matchType:'', championship:'', done:false };
  });
}

// ── INIT ──
window.addEventListener('DOMContentLoaded', function() {
  initNav();
  plannerLoad();
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closePdfPreview();
  });
});

// ── NAV ──
function initNav() {
  var session = getSession();
  if (!session) return;
  var ini = document.getElementById('nav-initials');
  var img = document.getElementById('nav-avatar-img');
  var nameEl = document.getElementById('dd-name');
  var emailEl = document.getElementById('dd-email');
  // Initial values from session
  var displayName = session.display_name || session.displayName || session.username || '?';
  if (ini) ini.textContent = displayName.charAt(0).toUpperCase();
  if (nameEl) nameEl.textContent = displayName;
  if (emailEl) emailEl.textContent = '@' + session.username;
  document.getElementById('nav-user-btn').style.visibility = 'visible';
  // Show my-profile always for logged in users
  var profBtn = document.getElementById('my-profile-btn');
  if (profBtn) profBtn.style.display = 'flex';
  // Admin check
  if ((session.username||'').toLowerCase() === ADMIN_USERNAME) {
    var adminBtn = document.getElementById('admin-panel-btn');
    if (adminBtn) adminBtn.style.display = 'flex';
  }
  // Fetch full user data
  sbGet('users', 'username=eq.'+encodeURIComponent(session.username)+'&select=display_name,avatar_url,promo_name,is_efed_owner,role').then(function(rows) {
    if (!rows || !rows[0]) return;
    var u = rows[0];
    var fullName = u.display_name || session.username;
    if (ini) ini.textContent = fullName.charAt(0).toUpperCase();
    if (nameEl) nameEl.textContent = fullName;
    if (u.avatar_url && img) { img.src = u.avatar_url; img.style.display = 'block'; if (ini) ini.style.display = 'none'; }
    if ((u.is_efed_owner || u.role === 'owner') && u.promo_name) {
      if (emailEl) { emailEl.textContent = 'Owner of ' + u.promo_name; emailEl.style.color = '#c8a84b'; }
      var efedBtn = document.getElementById('my-efed-btn');
      if (efedBtn) efedBtn.style.display = 'flex';
    } else {
      if (emailEl) emailEl.textContent = '@' + session.username;
    }
  }).catch(function(){});
  document.addEventListener('click', function(e) {
    var dd = document.getElementById('user-dropdown');
    if (!dd) return;
    if (!dd.contains(e.target) && !document.getElementById('nav-user-btn').contains(e.target)) {
      dd.classList.remove('open');
    }
  });
}
function toggleDropdown(close) {
  var dd = document.getElementById('user-dropdown');
  if (dd) dd.classList.toggle('open', !close);
}
function toggleTheme() {
  var isDay = document.documentElement.classList.toggle('day-mode');
  localStorage.setItem('theme', isDay ? 'day' : 'night');
}
function openSettings() { window.location.href = 'index.html?settings=1'; }
function handleSignOut() {
  localStorage.removeItem('efed_session');
  window.location.href = 'auth.html';
}

// ── TOAST ──
var _toastTimer = null;
function showToast(msg) {
  var el = document.getElementById('pln-toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(function() { el.classList.remove('show'); }, 2800);
}

// ── LOAD ──
function _parseField(val, fallback) {
  if (!val) return fallback;
  if (typeof val === 'string') { try { return JSON.parse(val); } catch(e) { return fallback; } }
  return val;
}
async function plannerLoad() {
  var session = getSession(); if (!session) return;
  try {
    var rows = await sbGet('show_planner', 'username=eq.'+encodeURIComponent(session.username)+'&order=updated_at.desc&limit=1');
    if (rows && rows.length && !rows.error) {
      var d = rows[0]; _dbId = d.id;
      _roster = _parseField(d.roster, []);
      var parsedTabs = _parseField(d.tabs, null);
      var parsedCards = _parseField(d.cards, _defaultCards());
      _tabs = (parsedTabs && Array.isArray(parsedTabs) && parsedTabs.length)
        ? parsedTabs
        : [{ show_name: d.show_name || '', episode: d.episode || '', cards: parsedCards }];
    } else {
      _tabs = [{ show_name:'', episode:'', cards:_defaultCards() }]; _roster = []; _dbId = null;
    }
  } catch(e) {
    _tabs = [{ show_name:'', episode:'', cards:_defaultCards() }]; _roster = [];
  }
  _tabIdx = 0;
  renderTabs(); loadTab();
}

function loadTab() {
  var tab = _cur();
  document.getElementById('pln-show-name').value = tab.show_name || '';
  document.getElementById('pln-episode').value = tab.episode || '';
  renderRoster(); renderCards(); updateProgress();
}

// ── TABS ──
function renderTabs() {
  var row = document.getElementById('planner-tabs-row');
  row.innerHTML = _tabs.map(function(t, i) {
    var lbl = t.show_name || ('Show ' + (i+1));
    return '<button class="planner-tab' + (i===_tabIdx?' active':'') + '" onclick="switchTab('+i+')">' + _esc(lbl) + '</button>';
  }).join('') + '<button class="planner-tab-add" onclick="newTab()">+ New Show</button>';
}
function switchTab(i) {
  saveCurFields();
  _tabIdx = i; renderTabs(); loadTab(); plannerDirty();
}
function newTab() {
  saveCurFields();
  _tabs.push({ show_name:'', episode:'', cards:_defaultCards() });
  _tabIdx = _tabs.length - 1;
  renderTabs(); loadTab(); plannerDirty();
}
function saveCurFields() {
  var cur = _cur();
  cur.show_name = document.getElementById('pln-show-name').value.trim();
  cur.episode = document.getElementById('pln-episode').value.trim();
}

// ── SAVE / POST ──
async function plannerSave() {
  var session = getSession(); if (!session) return;
  saveCurFields();
  var cur = _cur();
  try {
    var resp, result;
    if (_dbId) {
      var patchPayload = {
        show_name: cur.show_name || '',
        episode: cur.episode || '',
        cards: cur.cards,
        tabs: _tabs,
        roster: _roster
      };
      resp = await fetch(SUPABASE_URL+'/rest/v1/show_planner?id=eq.'+encodeURIComponent(_dbId), {
        method: 'PATCH', headers: SB_HEADERS, body: JSON.stringify(patchPayload)
      });
    } else {
      var insertPayload = {
        username: session.username,
        show_name: cur.show_name || '',
        episode: cur.episode || '',
        cards: cur.cards,
        tabs: _tabs,
        roster: _roster
      };
      resp = await fetch(SUPABASE_URL+'/rest/v1/show_planner', {
        method: 'POST', headers: SB_HEADERS, body: JSON.stringify(insertPayload)
      });
    }
    if (!resp.ok) {
      var errText = await resp.text();
      showToast('Save failed (' + resp.status + '): ' + errText.slice(0, 120));
      console.error('Planner save error:', errText);
      return;
    }
    try { var arr = await resp.json(); result = Array.isArray(arr) ? arr[0] : arr; } catch(e) {}
    if (!_dbId && result && result.id) _dbId = result.id;
    showToast('Planner saved!');
    renderTabs();
  } catch(e) { showToast('Save error: ' + e.message); console.error(e); }
}

// ── PDF PREVIEW ──
function buildPdfHtml() {
  saveCurFields();
  var cur = _cur();
  var showName = cur.show_name || 'Untitled Show';
  var episode  = cur.episode  || '';
  var cards    = cur.cards    || [];

  var fmtLabel = { singles:'Singles', promo:'Promo', triple:'Triple Threat', '2v1':'2-on-1', '1v2':'1-on-2', fatal4:'Fatal 4-Way', '2v2':'Tag Team (2v2)' };

  var matchRows = cards.map(function(card, i) {
    var names    = (card.names || []).map(function(n){return n.name;}).join(' vs. ') || '—';
    var matchType= card.matchType    || '';
    var champ    = card.championship || '';
    var fmt      = fmtLabel[card.matchFormat] || '';
    var title    = card.title        || ('Match ' + String.fromCharCode(65+i));
    var done     = card.done;

    var tags = [fmt, matchType].filter(Boolean).join(' · ');
    return '<tr class="'+(done?'done':'')+'">'
      + '<td class="slot-cell"><span class="slot-label">'+_esc(title)+'</span>'+(done?'<span class="done-badge">✓ Done</span>':'')+'</td>'
      + '<td class="names-cell">'+_esc(names)+'</td>'
      + '<td class="meta-cell">'+(tags?'<span class="tag">'+_esc(tags)+'</span>':'')+(champ?'<br><span class="champ">🏆 '+_esc(champ)+'</span>':'')+'</td>'
      + '</tr>';
  }).join('');

  var total = cards.length;
  var doneCount = cards.filter(function(c){return c.done;}).length;
  var pct = total ? Math.round(doneCount/total*100) : 0;
  var today = new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});

  return '<!DOCTYPE html><html><head><meta charset="UTF-8">'
    + '<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">'
    + '<style>'
    + '*{margin:0;padding:0;box-sizing:border-box;}'
    + 'body{background:#fff;color:#111;font-family:"DM Sans",sans-serif;padding:40px 48px;}'
    + 'header{border-bottom:3px solid #c0000e;padding-bottom:18px;margin-bottom:28px;}'
    + '.org{font-size:.65rem;letter-spacing:3px;text-transform:uppercase;color:#888;margin-bottom:4px;}'
    + 'h1{font-family:"Bebas Neue",sans-serif;font-size:2.4rem;letter-spacing:4px;color:#111;line-height:1;}'
    + 'h1 span{color:#c0000e;}'
    + '.episode{font-size:.8rem;color:#666;margin-top:4px;letter-spacing:.5px;}'
    + '.meta-bar{display:flex;gap:24px;margin-bottom:28px;padding:14px 18px;background:#f5f5f7;border-radius:8px;border-left:4px solid #c8a84b;}'
    + '.meta-item{display:flex;flex-direction:column;gap:2px;}'
    + '.meta-key{font-size:.6rem;letter-spacing:2px;text-transform:uppercase;color:#999;font-weight:700;}'
    + '.meta-val{font-size:.9rem;font-weight:700;color:#111;}'
    + 'table{width:100%;border-collapse:collapse;}'
    + 'thead th{font-size:.6rem;letter-spacing:2px;text-transform:uppercase;color:#999;font-weight:700;padding:8px 12px;text-align:left;border-bottom:2px solid #e8e8e8;}'
    + 'tbody tr{border-bottom:1px solid #f0f0f0;}'
    + 'tbody tr:hover{background:#fafafa;}'
    + 'tbody tr.done{opacity:.55;}'
    + 'td{padding:13px 12px;vertical-align:top;}'
    + '.slot-cell{width:140px;}'
    + '.slot-label{font-family:"Bebas Neue",sans-serif;font-size:1rem;letter-spacing:2px;color:#111;display:block;}'
    + '.done-badge{display:inline-block;margin-top:4px;font-size:.6rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;background:#e6f4ea;color:#2e7d32;padding:2px 7px;border-radius:10px;}'
    + '.names-cell{font-size:.9rem;font-weight:600;color:#111;padding-right:20px;}'
    + '.meta-cell{font-size:.8rem;color:#555;}'
    + '.tag{display:inline-block;background:#f0f0f4;color:#555;padding:2px 8px;border-radius:10px;font-size:.7rem;font-weight:600;letter-spacing:.4px;}'
    + '.champ{display:inline-block;margin-top:5px;color:#a07830;font-weight:600;font-size:.8rem;}'
    + 'footer{margin-top:32px;padding-top:14px;border-top:1px solid #e8e8e8;display:flex;justify-content:space-between;align-items:center;}'
    + '.footer-note{font-size:.65rem;color:#bbb;letter-spacing:.5px;}'
    + '.progress-pill{font-size:.7rem;font-weight:700;padding:4px 12px;border-radius:20px;background:'+(pct===100?'#e6f4ea':'#fff3e0')+';color:'+(pct===100?'#2e7d32':'#e65100')+'}'
    + '@media print{'
    + 'body{padding:24px 32px;}'
    + 'header{page-break-after:avoid;}'
    + '}'
    + '</style></head><body>'
    + '<header>'
    + '<div class="org">EFED Streaming Hub — Show Planner</div>'
    + '<h1><span>FSW</span> ' + _esc(showName) + '</h1>'
    + (episode ? '<div class="episode">'+_esc(episode)+'</div>' : '')
    + '</header>'
    + '<div class="meta-bar">'
    + '<div class="meta-item"><div class="meta-key">Date Generated</div><div class="meta-val">'+today+'</div></div>'
    + '<div class="meta-item"><div class="meta-key">Total Matches</div><div class="meta-val">'+total+'</div></div>'
    + '<div class="meta-item"><div class="meta-key">Confirmed</div><div class="meta-val">'+doneCount+' / '+total+'</div></div>'
    + '</div>'
    + '<table><thead><tr><th>Slot</th><th>Match-up</th><th>Type / Championship</th></tr></thead>'
    + '<tbody>'+matchRows+'</tbody></table>'
    + '<footer><span class="footer-note">Generated by EFED Streaming Hub · efed-stream.vercel.app</span>'
    + '<span class="progress-pill">'+pct+'% Complete</span></footer>'
    + '</body></html>';
}

function buildRosterPdfHtml() {
  var today = new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});
  var rows = _roster.map(function(r, i) {
    return '<tr><td class="num">' + (i+1) + '</td><td class="name">' + _esc(r.name) + '</td></tr>';
  }).join('');
  return '<!DOCTYPE html><html><head><meta charset="UTF-8">'
    + '<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">'
    + '<style>'
    + '*{margin:0;padding:0;box-sizing:border-box;}'
    + 'body{background:#fff;color:#111;font-family:"DM Sans",sans-serif;padding:40px 48px;}'
    + 'header{border-bottom:3px solid #c0000e;padding-bottom:18px;margin-bottom:28px;}'
    + '.org{font-size:.65rem;letter-spacing:3px;text-transform:uppercase;color:#888;margin-bottom:4px;}'
    + 'h1{font-family:"Bebas Neue",sans-serif;font-size:2.4rem;letter-spacing:4px;color:#111;line-height:1;}'
    + 'h1 span{color:#c0000e;}'
    + '.sub{font-size:.8rem;color:#666;margin-top:4px;letter-spacing:.5px;}'
    + 'table{width:100%;border-collapse:collapse;margin-top:8px;}'
    + 'thead th{font-size:.6rem;letter-spacing:2px;text-transform:uppercase;color:#999;font-weight:700;padding:8px 12px;text-align:left;border-bottom:2px solid #e8e8e8;}'
    + 'tbody tr{border-bottom:1px solid #f0f0f0;}'
    + 'tbody tr:nth-child(even){background:#fafafa;}'
    + 'td{padding:11px 12px;font-size:.92rem;}'

// ── SMART COLUMN LAYOUT ──
// Cards fill top-to-bottom in columns, balanced at all times
// With N cards and C columns: first (N % C) columns get ceil(N/C), rest get floor(N/C)
function distributeCards(cards, numCols) {
  var cols = Array.from({length:numCols}, function(){return[];});
  var n = cards.length;
  var col = 0, row = 0;
  // Fill column by column, top to bottom
  var perCol = Math.ceil(n / numCols);
  var extras = n % numCols; // columns with one extra (0 = all even)
  var cardIdx = 0;
  for (var c = 0; c < numCols && cardIdx < n; c++) {
    var count = (extras === 0) ? Math.floor(n/numCols) : (c < extras ? Math.ceil(n/numCols) : Math.floor(n/numCols));
    for (var r = 0; r < count && cardIdx < n; r++) {
      cols[c].push({ card:cards[cardIdx], originalIdx:cardIdx });
      cardIdx++;
    }
  }
  return cols;
}

  // Handle-only drag

// ── CHIP DRAG (swap names within a card) ──
function chipDragStart(e, cardIdx, nameIdx) {
  e.stopPropagation();
  _dragChip = { cardIdx: cardIdx, nameIdx: nameIdx };
  _dragName = null; _dragCardIdx = null;
  e.dataTransfer.effectAllowed = 'move';
  var chip = document.getElementById('chip-'+cardIdx+'-'+nameIdx);
  if (chip) chip.classList.add('drag-src');
}
function chipDragOver(e, cardIdx, nameIdx) {
  if (!_dragChip) return;
  if (_dragChip.cardIdx === cardIdx && _dragChip.nameIdx !== nameIdx) {
    e.preventDefault(); e.stopPropagation();
    var chip = document.getElementById('chip-'+cardIdx+'-'+nameIdx);
    if (chip) chip.style.outline = '1px solid rgba(200,168,75,.6)';
  }
}
function chipDragLeave(e, cardIdx, nameIdx) {
  var chip = document.getElementById('chip-'+cardIdx+'-'+nameIdx);
  if (chip) chip.style.outline = '';
}
function chipDrop(e, cardIdx, nameIdx) {
  e.preventDefault(); e.stopPropagation();
  var chip = document.getElementById('chip-'+cardIdx+'-'+nameIdx);
  if (chip) chip.style.outline = '';
  if (!_dragChip) return;
  if (_dragChip.cardIdx !== cardIdx) return; // only within same card
  var src = _dragChip.nameIdx;
  _dragChip = null;
  if (src === nameIdx) return;
  var names = _cur().cards[cardIdx].names;
  var tmp = names[src]; names[src] = names[nameIdx]; names[nameIdx] = tmp;
  renderCards(); plannerDirty();
}

function dzOver(e, idx) {
  if (_dragName) { e.preventDefault(); e.stopPropagation(); var z=document.getElementById('dz-'+idx); if(z)z.classList.add('drag-over'); }
}
function dzLeave(idx) {
  var z=document.getElementById('dz-'+idx); if(z)z.classList.remove('drag-over');
}
function dzDrop(e, idx) {
  e.preventDefault(); e.stopPropagation();
  var z=document.getElementById('dz-'+idx); if(z)z.classList.remove('drag-over');
  if (_dragChip) { _dragChip = null; return; }
  if (!_dragName) return;
  var cur=_cur(); var card=cur.cards[idx];
  if (card.names.find(function(n){return n.id===_dragName.id;})) return;
  if (card.names.length >= 6) return;
  card.names.push({name:_dragName.name, id:_dragName.id});
  // Auto-set format
  var nc = card.names.length;
  if (nc===2) card.matchFormat='singles';
  else if (nc===3) card.matchFormat='triple';
  else if (nc===4) card.matchFormat='fatal4';
  _dragName = null;
  renderCards(); renderRoster(); updateProgress(); plannerDirty();
}

// ── RIGHT-COLUMN RESIZE (Type | Championship | Format) ──
(function() {
  // CSS var names and their default px values
  var cols = [
    { varName:'--cw-type',  defaultW:160, min:80,  max:300 },
    { varName:'--cw-champ', defaultW:200, min:80,  max:360 },
    { varName:'--cw-fmt',   defaultW:120, min:60,  max:200 }
  ];
  var root = document.documentElement;

  function applyWidths() {
    cols.forEach(function(c) {
      var saved = localStorage.getItem('planner_'+c.varName);
      var w = saved ? parseInt(saved) : c.defaultW;
      root.style.setProperty(c.varName, w+'px');
      c.currentW = w;
    });
  }

  function addHandles() {
    var hdr = document.getElementById('planner-col-header');
    if (!hdr) return;
    // Remove any existing handles
    hdr.querySelectorAll('.col-resize-handle').forEach(function(h){h.remove();});

    // We want handles at the right edge of cols 4, 5, 6 (0-indexed: 3,4,5)
    // Get the header cells
    var cells = hdr.querySelectorAll('.pch');
    // Cells: [0]=ctrl [1]=slot [2]=matchup [3]=type [4]=champ [5]=fmt
    // Handles go between type|champ (after cell 3) and champ|fmt (after cell 4)
    // For fmt right edge we skip (it's the last col)
    var handleCols = [3, 4]; // 0-indexed, after which cell to place handle
    handleCols.forEach(function(ci, hi) {
      var cell = cells[ci];
      if (!cell) return;
      var handle = document.createElement('div');
      handle.className = 'col-resize-handle';
      // Position at right edge of this cell
      // We'll use a mousemove approach; position is set after render
      cell.style.position = 'relative';
      handle.style.right = '-4px';
      handle.style.left = 'auto';
      handle.style.position = 'absolute';
      cell.appendChild(handle);

      var colDef = cols[hi + 1]; // hi=0 → champ, hi=1 → fmt
      // Actually: handle after type (ci=3) controls champ width? No.
      // Handle at right edge of TYPE col → dragging right makes TYPE wider
      // Handle at right edge of CHAMP col → dragging right makes CHAMP wider
      var targetCol = cols[hi]; // hi=0 → type, hi=1 → champ
      var startX, startW;

      handle.addEventListener('mousedown', function(e) {
        e.preventDefault();
        startX = e.clientX;
        startW = targetCol.currentW;
        handle.classList.add('dragging');
        document.body.style.cursor = 'col-resize';
        document.body.style.userSelect = 'none';
      });
      document.addEventListener('mousemove', function(e) {
        if (!handle.classList.contains('dragging')) return;
        var newW = Math.min(targetCol.max, Math.max(targetCol.min, startW + (e.clientX - startX)));
        targetCol.currentW = newW;
        root.style.setProperty(targetCol.varName, newW+'px');
      });
      document.addEventListener('mouseup', function() {
        if (!handle.classList.contains('dragging')) return;
        handle.classList.remove('dragging');
        document.body.style.cursor = '';
        document.body.style.userSelect = '';
        localStorage.setItem('planner_'+targetCol.varName, targetCol.currentW);
      });
    });
  }

  function init() { applyWidths(); }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
  else init();

  // Re-attach handles after each renderCards call
  var _origRender = null;
  window.addEventListener('DOMContentLoaded', function() {
    // Patch renderCards to re-add handles after render
    var origRC = renderCards;
    renderCards = function() {
      origRC.apply(this, arguments);
      addHandles();
    };
    addHandles();
  });
})();

// Per-wrestler mgmt data stored in _rosterMgmt keyed by wrestler id
var _rosterMgmt = {};

function getMgmt(id) {
  if (!_rosterMgmt[id]) _rosterMgmt[id] = { downloaded:false, tags:'', rating:'', nickname:'', weight:'', height:'', hometown:'', created:false, character:false, moveset:false, entrance:false, victory:false };
  return _rosterMgmt[id];
}

var _mgmtDragSrcIdx = null;

function sortMgmtRoster(dir) {
  _mgmtSort = dir;
  _roster.sort(function(a, b) {
    var na = (a.name||'').toLowerCase(), nb = (b.name||'').toLowerCase();
    return dir === 'asc' ? (na < nb ? -1 : na > nb ? 1 : 0) : (na > nb ? -1 : na < nb ? 1 : 0);
  });
  // Update arrow highlight
  var asc = document.getElementById('mgmt-sort-asc');
  var desc = document.getElementById('mgmt-sort-desc');

function renderMgmtRoster() {

function buildMgmtRow(r, idx) {
  var m = getMgmt(r.id);
  var row = document.createElement('div');
  row.className = 'mgmt-row';
  row.dataset.id = r.id;
  row.dataset.idx = idx;


  row.innerHTML =
    // Col 1: drag handle
    '<div class="mgmt-drag" title="Drag to reorder">'
      + '<svg width="10" height="9" viewBox="0 0 10 9" fill="currentColor"><rect width="10" height="1.5" rx=".75"/><rect y="3.5" width="10" height="1.5" rx=".75"/><rect y="7" width="10" height="1.5" rx=".75"/></svg>'
    + '</div>'
    // Col 2: Downloaded checkbox
    + '<div class="mgmt-cb-cell" title="Downloaded">'
      + '<input type="checkbox" class="mgmt-cb"' + (m.downloaded?' checked':'') + ' onchange="setMgmt(\''+r.id+'\',\'downloaded\',this.checked)">'
    + '</div>'
    // Col 3: Wrestler name
    + '<div class="mgmt-name-cell">' + _esc(r.name) + '</div>'
    // Col 4: OVR Rating
    + '<div class="mgmt-ovr-cell">'
      + '<input class="mgmt-ovr-inp" type="text" inputmode="numeric" maxlength="2" placeholder="" value="' + _esc(m.rating||'') + '" oninput="setMgmt(\''+r.id+'\',\'rating\',this.value)">'
    + '</div>'
    // Col 5: Hashtags input
    + '<div class="mgmt-tags-cell">'
      + '<input class="mgmt-tags-inp" placeholder="#hashtags for 2K26…" value="' + _esc(m.tags||'') + '" oninput="setMgmt(\''+r.id+'\',\'tags\',this.value)">'
    + '</div>'
    // Col 5: Contact input
    + '<div class="mgmt-contact-cell">'
      + '<input class="mgmt-contact-inp" placeholder="Discord / email…" value="' + _esc(m.contact||'') + '" oninput="setMgmt(\''+r.id+'\',\'contact\',this.value)">'
    + '</div>'
    // Col 6: Nickname
    + '<div class="mgmt-tags-cell">'
      + '<input class="mgmt-tags-inp" placeholder="Nickname…" value="' + _esc(m.nickname||'') + '" oninput="setMgmt(\''+r.id+'\',\'nickname\',this.value)">'
    + '</div>'
    // Col 7: Weight
    + '<div class="mgmt-narrow-cell">'
      + '<input class="mgmt-narrow-inp" placeholder="lbs" value="' + _esc(m.weight||'') + '" oninput="setMgmt(\''+r.id+'\',\'weight\',this.value)">'
    + '</div>'
    // Col 8: Height
    + '<div class="mgmt-narrow-cell">'
      + '<input class="mgmt-narrow-inp" placeholder="ht" value="' + _esc(m.height||'') + '" oninput="setMgmt(\''+r.id+'\',\'height\',this.value)">'
    + '</div>'
    // Col 9: Hometown
    + '<div class="mgmt-tags-cell">'
      + '<input class="mgmt-tags-inp" placeholder="City, State…" value="' + _esc(m.hometown||'') + '" oninput="setMgmt(\''+r.id+'\',\'hometown\',this.value)">'
    + '</div>'
    // Col 10: Created checkbox (simple)
    + '<div class="mgmt-created-cell">'
      + '<label class="mgmt-created-toggle" title="2K Created"><input type="checkbox"' + (m.created?' checked':'') + ' onchange="setMgmt(\''+r.id+'\',\'created\',this.checked)"></label>'
    + '</div>'
    // Col 11: Notes
    + '<div class="mgmt-notes-cell">'
      + '<input class="mgmt-notes-inp" placeholder="Notes…" value="' + _esc(m.notes||'') + '" oninput="setMgmt(\''+r.id+'\',\'notes\',this.value)">'
    + '</div>';

  // Drag-and-drop on the handle
  var handle = row.querySelector('.mgmt-drag');
  handle.draggable = true;
  handle.addEventListener('dragstart', function(e) {
    _mgmtDragSrcIdx = idx;
    row.classList.add('dragging-src');
    e.dataTransfer.effectAllowed = 'move';
  });
  handle.addEventListener('dragend', function() {
    row.classList.remove('dragging-src');
    _mgmtDragSrcIdx = null;
    document.querySelectorAll('.mgmt-row').forEach(function(r){ r.classList.remove('drag-over-top','drag-over-bot'); });
  });
  row.addEventListener('dragover', function(e) {
    if (_mgmtDragSrcIdx === null || _mgmtDragSrcIdx === idx) return;
    e.preventDefault();
    var rect = row.getBoundingClientRect();
    var mid = rect.top + rect.height / 2;
    row.classList.remove('drag-over-top','drag-over-bot');
    row.classList.add(e.clientY < mid ? 'drag-over-top' : 'drag-over-bot');
  });
  row.addEventListener('dragleave', function() {
    row.classList.remove('drag-over-top','drag-over-bot');
  });
  row.addEventListener('drop', function(e) {
    e.preventDefault();
    row.classList.remove('drag-over-top','drag-over-bot');
    if (_mgmtDragSrcIdx === null || _mgmtDragSrcIdx === idx) return;
    var rect = row.getBoundingClientRect();
    var mid = rect.top + rect.height / 2;
    var insertBefore = e.clientY < mid;
    var moved = _roster.splice(_mgmtDragSrcIdx, 1)[0];
    var newIdx = _roster.indexOf(_roster[idx > _mgmtDragSrcIdx ? idx - 1 : idx]);
    var targetIdx = idx > _mgmtDragSrcIdx ? idx - 1 : idx;
    _roster.splice(insertBefore ? targetIdx : targetIdx + 1, 0, moved);
    _mgmtDragSrcIdx = null;
    renderMgmtRoster();
    renderRoster();
    plannerDirty();
  });

  return row;
}

function setMgmt(id, field, val) {
  getMgmt(id)[field] = val;
  plannerDirty();
}

function mobBuildCard(card, idx) {
  var names = card.names || [], nc = names.length;
  var done = card.done;
  var fmt = card.matchFormat || '';
  var champActive = !!(card.championship);

  var el = document.createElement('div');
  el.className = 'mob-card' + (done ? ' done' : '');
  el.dataset.idx = idx;

  // Separator logic
  function getSep(ni) {
    if (fmt === 'promo') return '&';
    if (fmt === '2v1' && nc===3) return ni===0 ? '&' : 'VS';
    if (fmt === '1v2' && nc===3) return ni===0 ? 'VS' : '&';
    return 'VS';
  }

  var chipsHtml = names.map(function(n, ni) {
    var sep = ni < nc-1 ? '<span class="mob-vs-sep">'+getSep(ni)+'</span>' : '';
    return '<span class="mob-comp-chip">'
      + _esc(n.name)
      + '<button class="mob-comp-x" onclick="mobRemoveComp('+idx+',\''+n.id+'\')">✕</button>'
      + '</span>' + sep;
  }).join('');

  var fmtOpts = nc===2 ? [['Singles','singles'],['Promo','promo']]
              : nc===3 ? [['Triple','triple'],['2v1','2v1'],['1v2','1v2']]
              : nc>=4  ? [['Fatal 4','fatal4'],['2v2','2v2']]
              : null;
  var fmtHtml = fmtOpts ? fmtOpts.map(function(p) {
    return '<button class="mob-fmt-pill'+(fmt===p[1]?' active':'')+'" onclick="mobSetFmt('+idx+',\''+p[1]+'\')">'+p[0]+'</button>';
  }).join('') : '';

  el.innerHTML =
    '<div class="mob-card-header">'
      + '<span class="mob-card-num">'+(idx+1)+'</span>'
      + '<input class="mob-card-title-inp" value="'+_esc(card.title||'')+'" placeholder="Slot name…" oninput="updateCardField('+idx+',\'title\',this.value)" maxlength="40">'
      + '<input type="checkbox" class="mob-card-done-cb"'+(done?' checked':'')+' onchange="mobToggleDone('+idx+')">'
      + '<button class="mob-card-del" onclick="mobDeleteCard('+idx+')">✕</button>'
    + '</div>'
    + '<div class="mob-card-competitors">'
      + chipsHtml
      + '<button class="mob-add-comp" onclick="mobOpenPicker('+idx+')">＋ Add competitor</button>'
    + '</div>'
    + '<div class="mob-card-bottom">'
      + '<button class="mob-trophy-btn'+(champActive?' active':'')+'" onclick="mobToggleChamp('+idx+')" title="Championship match">🏆</button>'
      + fmtHtml
    + '</div>'
    + '<div class="mob-champ-row'+(champActive?' visible':'')+'" id="mob-champ-row-'+idx+'">'
      + '<input class="mob-champ-inp" id="mob-champ-inp-'+idx+'" placeholder="Championship…" value="'+_esc(card.championship||'')+'" oninput="updateCardField('+idx+',\'championship\',this.value)">'
      + '<button class="mob-champ-check" onclick="mobConfirmChamp('+idx+')">✓</button>'
    + '</div>';

  // Long-press drag to reorder
  mobAttachCardDrag(el, idx);
  return el;
}

function mobBuildSeg(card, idx) {

function mobPickCompetitor(rosterId) {
