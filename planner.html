<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#07070a;--surface:#111114;--surface2:#1a1a1f;--accent:#c0000e;--gold:#c8a84b;--text:#e8e8e8;--muted:#8a8a9a;--border:rgba(255,255,255,.07);}
html.day-mode{--bg:#f0f0f4;--surface:#ffffff;--surface2:#e8e8ee;--text:#111114;--accent:#c0000e;--gold:#a07830;}
html.day-mode body{background:var(--bg)!important;color:var(--text);}
html.day-mode nav{background:rgba(240,240,244,.97)!important;border-bottom:1px solid rgba(0,0,0,.1)!important;}
html.day-mode .logo-main{color:#111114!important;}
html.day-mode .logo-eyebrow{color:rgba(0,0,0,.45)!important;}
html.day-mode .nav-icon-btn{color:rgba(0,0,0,.55)!important;}
html.day-mode .user-dropdown{background:#fff!important;border-color:rgba(0,0,0,.1)!important;}
html.day-mode .dropdown-item{color:rgba(0,0,0,.75)!important;}
html.day-mode .dropdown-item:hover{background:rgba(0,0,0,.05)!important;}
html.day-mode .planner-card{background:#fff!important;border-color:rgba(0,0,0,.1)!important;}
html.day-mode .planner-inp{background:rgba(0,0,0,.04)!important;color:#111!important;border-color:rgba(0,0,0,.15)!important;}
html.day-mode .planner-pill{background:rgba(0,0,0,.06)!important;border-color:rgba(0,0,0,.15)!important;color:#111!important;}
html.day-mode #planner-left{border-right-color:rgba(0,0,0,.08)!important;background:#f5f5f8!important;}
html.day-mode #planner-toolbar{border-bottom-color:rgba(0,0,0,.08)!important;background:#fff!important;}
.theme-sun{display:none;}.theme-moon{display:block;}
html.day-mode .theme-sun{display:block;}html.day-mode .theme-moon{display:none;}

body{background:#000;color:var(--text);font-family:'DM Sans',sans-serif;height:100vh;overflow:hidden;display:flex;flex-direction:column;}

/* NAV */
nav{position:relative;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:8px 56px;background:rgba(7,7,10,.97);backdrop-filter:blur(16px);border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0;}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
.nav-tv-svg{width:38px;height:32px;}
.nav-tv-svg--day{display:none;}
html.day-mode .nav-tv-svg:not(.nav-tv-svg--day){display:none;}
html.day-mode .nav-tv-svg--day{display:block;}
.logo-text-col{display:flex;flex-direction:column;}
.logo-eyebrow{font-size:.52rem;letter-spacing:3px;color:rgba(255,255,255,.5);font-weight:300;font-style:italic;text-transform:uppercase;}
.logo-main{font-family:'Bebas Neue',sans-serif;font-size:1.75rem;letter-spacing:4px;color:#fff;}
.logo-main em{color:var(--gold);font-style:normal;}
.nav-right{display:flex;align-items:center;gap:10px;}
.nav-icon-btn{background:none;border:none;cursor:pointer;color:rgba(255,255,255,.6);padding:6px;display:flex;align-items:center;justify-content:center;border-radius:50%;transition:color .2s,background .2s;width:36px;height:36px;}
.nav-icon-btn:hover{color:#fff;background:rgba(255,255,255,.08);}
.nav-avatar-initials{width:42px;height:42px;border-radius:50%;border:2px solid rgba(200,168,75,.4);background:rgba(200,168,75,.12);color:var(--gold);font-size:.75rem;font-weight:700;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.nav-tv-svg{width:52px;height:auto;display:block;flex-shrink:0;filter:drop-shadow(0 0 8px rgba(192,0,14,.4));transition:filter .2s;}
.nav-tv-svg--day{display:none;}
html.day-mode .nav-tv-svg:not(.nav-tv-svg--day){display:none;}
html.day-mode .nav-tv-svg--day{display:inline;}
.nav-user-wrap{position:relative;}
.user-dropdown{position:absolute;top:calc(100% + 8px);right:0;background:rgba(13,13,16,.98);border:1px solid rgba(255,255,255,.1);border-radius:10px;min-width:190px;padding:6px 0;opacity:0;pointer-events:none;transform:translateY(-6px);transition:opacity .2s,transform .2s;box-shadow:0 20px 48px rgba(0,0,0,.7);z-index:400;}
.user-dropdown.open{opacity:1;pointer-events:all;transform:translateY(0);}
.dropdown-header{padding:10px 14px 8px;border-bottom:1px solid rgba(255,255,255,.06);margin-bottom:4px;}
.dropdown-name{font-size:.9rem;font-weight:600;color:#fff;margin-bottom:2px;}
.dropdown-email{font-size:.65rem;color:var(--muted);}
.dropdown-item{display:flex;align-items:center;gap:10px;padding:9px 14px;font-size:.82rem;color:rgba(255,255,255,.65);cursor:pointer;transition:background .15s,color .15s;background:none;border:none;width:100%;text-align:left;font-family:'DM Sans',sans-serif;}
.dropdown-item:hover{background:rgba(255,255,255,.05);color:rgba(255,255,255,.9);}
.dropdown-item.danger{color:rgba(255,80,80,.6);}
.dropdown-item.danger:hover{background:rgba(192,0,14,.08);color:#ff6b6b;}

/* PLANNER LAYOUT */
#planner-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg);}

/* TOOLBAR */
#planner-toolbar{display:flex;align-items:center;gap:12px;padding:12px 20px;border-bottom:1px solid rgba(255,255,255,.07);flex-shrink:0;background:#0d0d10;}
#planner-tabs-row{display:flex;align-items:center;gap:5px;flex:1;overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none;}
#planner-tabs-row::-webkit-scrollbar{display:none;}
.planner-tab{padding:6px 14px;border-radius:6px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);color:rgba(255,255,255,.4);font-family:'DM Sans',sans-serif;font-size:.72rem;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .15s;}
.planner-tab.active{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.2);color:#fff;}
.planner-tab-add{padding:6px 12px;border-radius:6px;border:1px dashed rgba(255,255,255,.12);background:none;color:rgba(255,255,255,.28);font-family:'DM Sans',sans-serif;font-size:.72rem;cursor:pointer;transition:color .15s;}
.planner-tab-add:hover{color:rgba(255,255,255,.5);}
#planner-actions{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.pln-show-inp{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:7px;padding:7px 12px;color:#e8e8e8;font-family:'DM Sans',sans-serif;font-size:.82rem;outline:none;}
.pln-show-inp:focus{border-color:rgba(200,168,75,.4);}
.pln-show-inp::placeholder{color:rgba(255,255,255,.25);}
#pln-progress-label{font-size:.7rem;color:rgba(255,255,255,.35);white-space:nowrap;font-family:'DM Sans',sans-serif;}
.pln-progress-bar{width:80px;height:4px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden;flex-shrink:0;}
.pln-progress-fill{height:100%;background:linear-gradient(90deg,#c0000e,#c8a84b);border-radius:2px;transition:width .4s;}
.pln-btn{padding:7px 16px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:.78rem;font-weight:700;cursor:pointer;border:none;transition:opacity .15s;}
.pln-btn-save{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);color:#fff;}
.pln-btn-save:hover{background:rgba(255,255,255,.16);}
.pln-btn-post{background:var(--accent);color:#fff;opacity:.35;cursor:default;}
.pln-btn-post.ready{opacity:1;cursor:pointer;}
.pln-btn-post.ready:hover{opacity:.85;}

/* BODY */
#planner-body{display:flex;flex:1;overflow:hidden;min-height:0;}

/* LEFT — ROSTER */
#planner-left{width:220px;flex-shrink:0;border-right:1px solid rgba(255,255,255,.07);display:flex;flex-direction:column;overflow:hidden;background:#0a0a0d;}
#planner-left-header{padding:14px 14px 10px;border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0;}
#planner-left-title{font-size:.52rem;letter-spacing:2.5px;text-transform:uppercase;color:rgba(255,255,255,.3);font-weight:700;margin-bottom:10px;}
#planner-add-row{display:flex;gap:6px;}
#planner-name-inp{flex:1;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:7px;padding:8px 10px;color:#e8e8e8;font-family:'DM Sans',sans-serif;font-size:.8rem;outline:none;}
#planner-name-inp:focus{border-color:rgba(200,168,75,.4);}
#planner-name-inp::placeholder{color:rgba(255,255,255,.22);}
#planner-add-btn{padding:8px 11px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:7px;color:rgba(255,255,255,.6);cursor:pointer;font-size:.9rem;line-height:1;transition:background .15s;}
#planner-add-btn:hover{background:rgba(255,255,255,.14);color:#fff;}
#planner-roster-list{flex:1;overflow-y:auto;padding:10px 12px;display:flex;flex-direction:column;gap:6px;}
.planner-pill{display:flex;align-items:center;justify-content:space-between;gap:6px;padding:8px 11px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:22px;cursor:grab;font-size:.8rem;font-weight:600;color:#e8e8e8;font-family:'DM Sans',sans-serif;user-select:none;transition:opacity .2s,background .15s;}
.planner-pill:hover{background:rgba(255,255,255,.1);}
.planner-pill.used{opacity:.28;border-color:rgba(255,255,255,.05);background:rgba(255,255,255,.03);}
.planner-pill-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;user-select:text;-webkit-user-select:text;}
.planner-pill-x{background:none;border:none;color:rgba(255,255,255,.25);cursor:pointer;font-size:.7rem;padding:0 2px;line-height:1;flex-shrink:0;}
.planner-pill-x:hover{color:#c0000e;}

/* RIGHT — CARDS */
#planner-right{flex:1;overflow-y:auto;padding:18px 20px;}
#planner-columns{display:flex;gap:14px;align-items:flex-start;}
.planner-col{flex:1;display:flex;flex-direction:column;gap:10px;}

/* CARD */
.planner-card{background:#111118;border:1px solid rgba(255,255,255,.09);border-radius:12px;padding:14px;transition:border-color .2s;}
.planner-card.done{border-color:rgba(76,175,100,.3);background:#0e1412;}
.planner-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px;}
.planner-card-left{display:flex;align-items:center;gap:7px;flex:1;min-width:0;}
.planner-drag-handle{cursor:grab;color:rgba(255,255,255,.2);flex-shrink:0;line-height:0;}
.planner-card-title{background:none;border:none;color:#e8e8e8;font-family:'Bebas Neue',sans-serif;font-size:1.05rem;letter-spacing:2.5px;outline:none;min-width:0;flex:1;user-select:text;-webkit-user-select:text;cursor:text;}
.planner-card-title::placeholder{color:rgba(255,255,255,.2);}
.planner-card-right{display:flex;align-items:center;gap:7px;}
.planner-done-cb{width:15px;height:15px;accent-color:#4caf64;cursor:pointer;flex-shrink:0;}
.planner-del-btn{background:none;border:none;color:rgba(255,255,255,.18);cursor:pointer;font-size:.75rem;padding:2px 4px;line-height:1;transition:color .15s;}
.planner-del-btn:hover{color:#c0000e;}

/* DROP ZONE */
.planner-drop-zone{min-height:46px;border:1px dashed rgba(255,255,255,.12);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.68rem;color:rgba(255,255,255,.2);font-family:'DM Sans',sans-serif;margin-bottom:9px;transition:border-color .2s,background .2s;flex-wrap:wrap;gap:6px;padding:8px;}
.planner-drop-zone.has-names{border-style:solid;border-color:rgba(255,255,255,.09);justify-content:flex-start;}
.planner-drop-zone.drag-over{border-color:rgba(200,168,75,.5);background:rgba(200,168,75,.05);}
.planner-name-chip{display:inline-flex;align-items:center;gap:4px;padding:4px 9px;background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.14);border-radius:14px;font-size:.75rem;font-weight:600;color:#e8e8e8;font-family:'DM Sans',sans-serif;user-select:text;-webkit-user-select:text;}
.planner-chip-x{background:none;border:none;color:rgba(255,255,255,.28);cursor:pointer;font-size:.65rem;padding:0 1px;line-height:1;}
.planner-chip-x:hover{color:#c0000e;}
.planner-more-hint{font-size:.55rem;color:rgba(255,255,255,.15);font-style:italic;width:100%;text-align:center;margin-top:2px;pointer-events:none;}

/* FORMAT PILLS */
.planner-fmt-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px;}
.planner-fmt-btn{padding:3px 10px;border-radius:12px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:rgba(255,255,255,.45);font-size:.65rem;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;}
.planner-fmt-btn.active{border-color:rgba(200,168,75,.5);background:rgba(200,168,75,.12);color:#c8a84b;}

/* CARD INPUTS */
.planner-card-inputs{display:flex;gap:6px;}
.planner-card-inp{flex:1;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:7px;padding:7px 9px;color:#e8e8e8;font-family:'DM Sans',sans-serif;font-size:.76rem;outline:none;min-width:0;user-select:text;-webkit-user-select:text;}
.planner-card-inp:focus{border-color:rgba(200,168,75,.35);}
.planner-card-inp::placeholder{color:rgba(255,255,255,.2);}

/* ADD SLOT */
#planner-add-slot{display:block;width:100%;padding:11px;background:rgba(255,255,255,.02);border:1px dashed rgba(255,255,255,.1);border-radius:10px;color:rgba(255,255,255,.3);font-family:'DM Sans',sans-serif;font-size:.75rem;cursor:pointer;transition:background .15s,color .15s;margin-top:2px;text-align:center;}
#planner-add-slot:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.6);}

/* TOAST */
#pln-toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:#1a1a24;border:1px solid rgba(255,255,255,.12);color:#e8e8e8;font-family:'DM Sans',sans-serif;font-size:.8rem;padding:10px 20px;border-radius:20px;z-index:9999;opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;white-space:nowrap;}
#pln-toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

@media(max-width:700px){
  #planner-left{width:170px;}
  #planner-toolbar{flex-wrap:wrap;padding:8px 12px;gap:8px;}
  .pln-show-inp{width:100px;}
  nav{padding:8px 20px!important;}
}
</style>
</head>

<div id="pln-toast"></div>

<script>
// ── STATE ──
var _tabs = [{ show_name:'', episode:'', cards:[] }];
var _tabIdx = 0;
var _roster = [];
var _dbId = null;
var _dragName = null;
var _dragCardIdx = null;
var _numCols = 3; // 3 columns on desktop

function _cur() { return _tabs[_tabIdx]; }

function plannerDirty() {
  var btn = document.getElementById('pln-post-btn');
  if (btn) { btn.classList.remove('ready'); }
}

function _defaultCards() {
  return Array.from({length:5}, function(_, i) {
    return { title: 'Match ' + String.fromCharCode(65+i), names:[], matchType:'', championship:'', done:false };
  });
}

// ── INIT ──
window.addEventListener('DOMContentLoaded', function() {
  initNav();
  plannerLoad();
  // Detect column count from width
  function updateCols() {
    var w = document.getElementById('planner-right').offsetWidth;
    _numCols = w > 900 ? 3 : w > 550 ? 2 : 1;
  }
  updateCols();
  window.addEventListener('resize', function() { updateCols(); renderCards(); });
});

// ── NAV ──
function initNav() {
  var session = getSession();
  if (!session) return;
  var ini = document.getElementById('nav-initials');
  var img = document.getElementById('nav-avatar-img');
  var name = document.getElementById('dd-name');
  var email = document.getElementById('dd-email');
  if (ini) ini.textContent = (session.display_name||session.username||'?').charAt(0).toUpperCase();
  if (name) name.textContent = session.display_name || session.username;
  if (email) email.textContent = session.username;
  document.getElementById('nav-user-btn').style.visibility = 'visible';
  // Load avatar
  sbGet('users', 'username=eq.'+encodeURIComponent(session.username)+'&select=avatar_url,promo_name,is_efed_owner').then(function(rows) {
    if (!rows || !rows[0]) return;
    var u = rows[0];
    if (u.avatar_url && img) { img.src = u.avatar_url; img.style.display = 'block'; if (ini) ini.style.display = 'none'; }
    if ((u.is_efed_owner || u.promo_name) && document.getElementById('my-efed-btn')) {
      document.getElementById('my-efed-btn').style.display = 'flex';
    }
  }).catch(function(){});
  document.addEventListener('click', function(e) {
    var dd = document.getElementById('user-dropdown');
    if (!dd) return;
    if (!dd.contains(e.target) && !document.getElementById('nav-user-btn').contains(e.target)) {
      dd.classList.remove('open');
    }
  });
}
function toggleDropdown(close) {
  var dd = document.getElementById('user-dropdown');
  if (dd) dd.classList.toggle('open', !close);
}
function toggleTheme() {
  var isDay = document.documentElement.classList.toggle('day-mode');
  localStorage.setItem('theme', isDay ? 'day' : 'night');
}
function openSettings() { window.location.href = 'index.html?settings=1'; }
function handleSignOut() {
  localStorage.removeItem('efed_session');
  window.location.href = 'auth.html';
}

// ── TOAST ──
var _toastTimer = null;
function showToast(msg) {
  var el = document.getElementById('pln-toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(function() { el.classList.remove('show'); }, 2800);
}

// ── LOAD ──
async function plannerLoad() {
  var session = getSession(); if (!session) return;
  try {
    var rows = await sbGet('show_planner', 'username=eq.'+encodeURIComponent(session.username)+'&order=updated_at.desc&limit=1');
    if (rows && rows.length && !rows.error) {
      var d = rows[0]; _dbId = d.id;
      _roster = d.roster || [];
      _tabs = (d.tabs && Array.isArray(d.tabs)) ? d.tabs : [{ show_name:d.show_name||'', episode:d.episode||'', cards:d.cards||_defaultCards() }];
    } else {
      _tabs = [{ show_name:'', episode:'', cards:_defaultCards() }]; _roster = []; _dbId = null;
    }
  } catch(e) {
    _tabs = [{ show_name:'', episode:'', cards:_defaultCards() }]; _roster = [];
  }
  _tabIdx = 0;
  renderTabs(); loadTab();
}

function loadTab() {
  var tab = _cur();
  document.getElementById('pln-show-name').value = tab.show_name || '';
  document.getElementById('pln-episode').value = tab.episode || '';
  renderRoster(); renderCards(); updateProgress();
}

// ── TABS ──
function renderTabs() {
  var row = document.getElementById('planner-tabs-row');
  row.innerHTML = _tabs.map(function(t, i) {
    var lbl = t.show_name || ('Show ' + (i+1));
    return '<button class="planner-tab' + (i===_tabIdx?' active':'') + '" onclick="switchTab('+i+')">' + _esc(lbl) + '</button>';
  }).join('') + '<button class="planner-tab-add" onclick="newTab()">+ New Show</button>';
}
function switchTab(i) {
  saveCurFields();
  _tabIdx = i; renderTabs(); loadTab(); plannerDirty();
}
function newTab() {
  saveCurFields();
  _tabs.push({ show_name:'', episode:'', cards:_defaultCards() });
  _tabIdx = _tabs.length - 1;
  renderTabs(); loadTab(); plannerDirty();
}
function saveCurFields() {
  var cur = _cur();
  cur.show_name = document.getElementById('pln-show-name').value.trim();
  cur.episode = document.getElementById('pln-episode').value.trim();
}

// ── SAVE / POST ──
async function plannerSave() {
  var session = getSession(); if (!session) return;
  saveCurFields();
  var cur = _cur();
  var payload = { username: session.username, roster: _roster, tabs: _tabs,
    show_name: cur.show_name, episode: cur.episode, cards: cur.cards, updated_at: Date.now() };
  try {
    if (_dbId) {
      await sbPatch('show_planner', 'id=eq.'+encodeURIComponent(_dbId), payload);
    } else {
      var r = await sbInsert('show_planner', payload);
      if (r && r[0]) _dbId = r[0].id;
    }
    showToast('Planner saved!');
    var btn = document.getElementById('pln-post-btn');
    if (btn) btn.classList.add('ready');
    renderTabs();
  } catch(e) { showToast('Save failed: ' + e.message); }
}

async function plannerPost() {
  var btn = document.getElementById('pln-post-btn');
  if (!btn || !btn.classList.contains('ready')) return;
  var session = getSession(); if (!session) return;
  var cur = _cur();
  // Map cards to event matches format
  var matches = cur.cards.map(function(card) {
    var names = card.names || [], fmt = card.matchFormat || '';
    var type = 'none', teams = [];
    if (!names.length) { type = 'none'; }
    else if (names.length === 1) { type = 'freetext'; teams = [[names[0].name]]; }
    else if (names.length === 2) {
      if (fmt === 'promo') { type = 'freetext'; teams = [[names.map(function(n){return n.name;}).join(' & ')]]; }
      else { type = 'singles'; teams = [[names[0].name],[names[1].name]]; }
    } else if (names.length === 3) {
      if (fmt === '2v1') { type = 'tag'; teams = [[names[0].name,names[1].name],[names[2].name]]; }
      else if (fmt === '1v2') { type = 'tag'; teams = [[names[0].name],[names[1].name,names[2].name]]; }
      else { type = 'triple'; teams = [[names[0].name],[names[1].name],[names[2].name]]; }
    } else {
      if (fmt === '2v2') { type = 'tag'; teams = [[names[0].name,names[1].name],[names[2].name,names[3].name]]; }
      else { type = 'fatal4'; teams = names.slice(0,4).map(function(n){return[n.name];}); }
    }
    return { label:card.title||'', championship:card.championship||'', type:type, teams:teams, champs:[], matchType:card.matchType||'' };
  }).filter(function(m) { return m.type !== 'none'; });

  var title = cur.show_name || 'Upcoming Show';
  if (btn) { btn.textContent = 'Posting…'; btn.classList.remove('ready'); }
  try {
    var r = await sbPatch('users', 'username=eq.'+encodeURIComponent(session.username), {
      efed_event_matches: JSON.stringify(matches),
      efed_event_align: 'center',
      efed_event_title: title,
      efed_event_date: null, efed_event_location: null, efed_event_main: null, efed_event_hype: null
    });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    showToast('Posted to eFed! ✓');
    setTimeout(function() { window.location.href = 'efed.html'; }, 1200);
  } catch(e) {
    showToast('Post failed: ' + e.message);
    if (btn) { btn.textContent = 'Post to eFed'; btn.classList.add('ready'); }
  }
}

// ── ROSTER ──
function plannerAddRoster() {
  var inp = document.getElementById('planner-name-inp');
  var name = inp.value.trim(); if (!name) return;
  _roster.push({ name:name, id: Date.now()+'_'+Math.random().toString(36).slice(2) });
  inp.value = ''; inp.focus();
  renderRoster(); plannerDirty();
}
function removeRoster(id) {
  _roster = _roster.filter(function(r){return r.id!==id;});
  _tabs.forEach(function(t){t.cards.forEach(function(c){c.names=c.names.filter(function(n){return n.id!==id;});});});
  renderRoster(); renderCards(); updateProgress(); plannerDirty();
}
function renderRoster() {
  var list = document.getElementById('planner-roster-list');
  var cur = _cur();
  var usedIds = new Set(cur.cards.flatMap(function(c){return c.names.map(function(n){return n.id;});}));
  list.innerHTML = _roster.map(function(r) {
    var used = usedIds.has(r.id);
    return '<div class="planner-pill'+(used?' used':'')+'" draggable="true" ondragstart="rosterDragStart(event,\''+r.id+'\')" ondragend="rosterDragEnd()">'
      + '<span class="planner-pill-name">'+_esc(r.name)+'</span>'
      + '<button class="planner-pill-x" onclick="removeRoster(\''+r.id+'\')">&#x2715;</button>'
      + '</div>';
  }).join('');
}
function rosterDragStart(e, id) {
  var r = _roster.find(function(r){return r.id===id;});
  if (!r) return;
  _dragName = r; _dragCardIdx = null;
  e.dataTransfer.effectAllowed = 'copy';
}
function rosterDragEnd() { _dragName = null; renderRoster(); }

// ── CARDS ──
function plannerAddCard() {
  var cur = _cur();
  var idx = cur.cards.length;
  cur.cards.push({ title:'Match '+String.fromCharCode(65+idx), names:[], matchType:'', championship:'', done:false });
  renderCards(); updateProgress(); plannerDirty();
}
function deleteCard(idx) {
  var cur = _cur(); cur.cards.splice(idx,1);
  renderCards(); renderRoster(); updateProgress(); plannerDirty();
}
function toggleDone(idx) {
  var cur = _cur(); cur.cards[idx].done = !cur.cards[idx].done;
  renderCards(); updateProgress(); plannerDirty();
}
function updateCardField(idx, field, val) {
  _cur().cards[idx][field] = val; plannerDirty();
}
function removeNameFromCard(cardIdx, nameId) {
  var cur = _cur(); cur.cards[cardIdx].names = cur.cards[cardIdx].names.filter(function(n){return n.id!==nameId;});
  renderCards(); renderRoster(); updateProgress(); plannerDirty();
}
function setFmt(cardIdx, fmt) {
  _cur().cards[cardIdx].matchFormat = fmt; renderCards(); plannerDirty();
}

// ── SMART COLUMN LAYOUT ──
// Cards fill top-to-bottom in columns, balanced at all times
// With N cards and C columns: first (N % C) columns get ceil(N/C), rest get floor(N/C)
function distributeCards(cards, numCols) {
  var cols = Array.from({length:numCols}, function(){return[];});
  var n = cards.length;
  var col = 0, row = 0;
  // Fill column by column, top to bottom
  var perCol = Math.ceil(n / numCols);
  var extras = n % numCols; // columns with one extra (0 = all even)
  var cardIdx = 0;
  for (var c = 0; c < numCols && cardIdx < n; c++) {
    var count = (extras === 0) ? Math.floor(n/numCols) : (c < extras ? Math.ceil(n/numCols) : Math.floor(n/numCols));
    for (var r = 0; r < count && cardIdx < n; r++) {
      cols[c].push({ card:cards[cardIdx], originalIdx:cardIdx });
      cardIdx++;
    }
  }
  return cols;
}

function renderCards() {
  var wrap = document.getElementById('planner-columns');
  var cur = _cur();
  var cards = cur.cards;
  var numCols = Math.min(_numCols, Math.max(1, cards.length > 0 ? _numCols : 1));
  var cols = distributeCards(cards, numCols);

  wrap.innerHTML = '';
  wrap.style.display = 'flex';
  wrap.style.gap = '14px';
  wrap.style.alignItems = 'flex-start';

  cols.forEach(function(col) {
    var colEl = document.createElement('div');
    colEl.className = 'planner-col';
    col.forEach(function(item) {
      colEl.appendChild(buildCard(item.card, item.originalIdx));
    });
    wrap.appendChild(colEl);
  });
}

function buildCard(card, idx) {
  var names = card.names || [], nc = names.length, done = card.done, fmt = card.matchFormat || '';

  var el = document.createElement('div');
  el.className = 'planner-card' + (done?' done':'');
  el.dataset.idx = idx;
  el.draggable = true;

  // Drop zone
  var dropHtml = '';
  if (nc === 0) {
    dropHtml = '<span style="pointer-events:none;color:rgba(255,255,255,.2);font-size:.68rem;font-style:italic;">Drag a name here…</span>';
  } else {
    dropHtml = names.map(function(n) {
      return '<div class="planner-name-chip">'+_esc(n.name)+'<button class="planner-chip-x" onclick="removeNameFromCard('+idx+',\''+n.id+'\')">&#x2715;</button></div>';
    }).join('');
    if (nc < 5) dropHtml += '<div class="planner-more-hint">You may drag more names here</div>';
  }

  // Format buttons
  var fmtOpts = nc===2 ? [['Singles','singles'],['Promo','promo']]
              : nc===3 ? [['Triple Threat','triple'],['2v1','2v1'],['1v2','1v2']]
              : nc>=4  ? [['Fatal 4-Way','fatal4'],['2v2','2v2']]
              : null;
  var fmtHtml = fmtOpts ? '<div class="planner-fmt-row">' + fmtOpts.map(function(p) {
    return '<button class="planner-fmt-btn'+(fmt===p[1]?' active':'')+'" onclick="setFmt('+idx+',\''+p[1]+'\')">'+p[0]+'</button>';
  }).join('') + '</div>' : '';

  el.innerHTML =
    '<div class="planner-card-header">'
    + '<div class="planner-card-left">'
    + '<div class="planner-drag-handle" draggable="false">'
    + '<svg width="10" height="9" viewBox="0 0 10 9" fill="rgba(255,255,255,.2)"><rect width="10" height="1.5" rx=".75"/><rect y="3.5" width="10" height="1.5" rx=".75"/><rect y="7" width="10" height="1.5" rx=".75"/></svg>'
    + '</div>'
    + '<input class="planner-card-title" value="'+_esc(card.title||'')+'" placeholder="Slot name…" oninput="updateCardField('+idx+',\'title\',this.value)" maxlength="40">'
    + '</div>'
    + '<div class="planner-card-right">'
    + '<input type="checkbox" class="planner-done-cb"'+(done?' checked':'')+' onchange="toggleDone('+idx+')">'
    + '<button class="planner-del-btn" onclick="deleteCard('+idx+')">&#x2715;</button>'
    + '</div>'
    + '</div>'
    + '<div class="planner-drop-zone'+(nc>0?' has-names':'')+'" id="dz-'+idx+'" ondragover="dzOver(event,'+idx+')" ondragleave="dzLeave('+idx+')" ondrop="dzDrop(event,'+idx+')">'
    + dropHtml
    + '</div>'
    + fmtHtml
    + '<div class="planner-card-inputs">'
    + '<input class="planner-card-inp" placeholder="Match type…" value="'+_esc(card.matchType||'')+'" oninput="updateCardField('+idx+',\'matchType\',this.value)">'
    + '<input class="planner-card-inp" placeholder="Championship…" value="'+_esc(card.championship||'')+'" oninput="updateCardField('+idx+',\'championship\',this.value)">'
    + '</div>';

  // Card drag for reordering
  el.addEventListener('dragstart', function(e) {
    if (e.target.closest && e.target.closest('.planner-drop-zone')) return;
    if (_dragName !== null) return;
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'BUTTON') { e.preventDefault(); return; }
    _dragCardIdx = idx; el.style.opacity = '.45';
    e.dataTransfer.effectAllowed = 'move';
  });
  el.addEventListener('dragend', function() { el.style.opacity = '1'; _dragCardIdx = null; });
  el.addEventListener('dragover', function(e) {
    if (_dragCardIdx !== null && _dragCardIdx !== idx && _dragName === null) {
      e.preventDefault(); el.style.borderColor = 'rgba(200,168,75,.4)';
    }
  });
  el.addEventListener('dragleave', function() {
    el.style.borderColor = done ? 'rgba(76,175,100,.3)' : 'rgba(255,255,255,.09)';
  });
  el.addEventListener('drop', function(e) {
    if (_dragCardIdx !== null && _dragCardIdx !== idx && _dragName === null) {
      e.preventDefault();
      var cur = _cur();
      var moved = cur.cards.splice(_dragCardIdx, 1)[0];
      cur.cards.splice(idx, 0, moved);
      _dragCardIdx = null; renderCards(); plannerDirty();
    }
  });

  return el;
}

function dzOver(e, idx) {
  if (_dragName) { e.preventDefault(); e.stopPropagation(); var z=document.getElementById('dz-'+idx); if(z)z.classList.add('drag-over'); }
}
function dzLeave(idx) {
  var z=document.getElementById('dz-'+idx); if(z)z.classList.remove('drag-over');
}
function dzDrop(e, idx) {
  e.preventDefault(); e.stopPropagation();
  var z=document.getElementById('dz-'+idx); if(z)z.classList.remove('drag-over');
  if (!_dragName) return;
  var cur=_cur(); var card=cur.cards[idx];
  if (card.names.find(function(n){return n.id===_dragName.id;})) return;
  if (card.names.length >= 6) return;
  card.names.push({name:_dragName.name, id:_dragName.id});
  if (card.names.length===2) card.matchFormat='singles';
  else if (card.names.length===3) card.matchFormat='triple';
  else if (card.names.length>=4) card.matchFormat='fatal4';
  _dragName = null;
  renderCards(); renderRoster(); updateProgress(); plannerDirty();
}

// ── PROGRESS ──
function updateProgress() {
  var cards = _cur().cards || [];
  if (!cards.length) {
    document.getElementById('pln-prog-fill').style.width = '0%';
    document.getElementById('pln-progress-label').textContent = '0%';
    return;
  }
  var done = cards.filter(function(c){return c.done;}).length;
  var pct = Math.round((done/cards.length)*100);
  document.getElementById('pln-prog-fill').style.width = pct + '%';
  document.getElementById('pln-progress-label').textContent = pct + '%';
}
</script>

<script>
(function(){
  var SX=15,SY=27,SW=90,SH=52,PX=1;
  var darkG=['#000','#111','#222','#333','#444','#555','#666','#777','#888','#999','#aaa','#bbb','#ccc','#ddd','#eee','#fff'];
  var dayG =['#333','#444','#555','#666','#777','#888','#999','#aaa','#bbb','#ccc','#ddd','#eee','#fff'];
  var NS='http://www.w3.org/2000/svg';
  function renderFrame(el,greys){
    var frag=document.createDocumentFragment();
    for(var y=SY;y<SY+SH;y+=PX){
      var x=SX;
      while(x<SX+SW){
        var w=Math.floor(Math.random()*4)+1;
        if(x+w>SX+SW) w=SX+SW-x;
        var r=document.createElementNS(NS,'rect');
        r.setAttribute('x',x); r.setAttribute('y',y);
        r.setAttribute('width',w); r.setAttribute('height',PX);
        r.setAttribute('fill',greys[Math.floor(Math.random()*greys.length)]);
        frag.appendChild(r); x+=w;
      }
    }
    while(el.firstChild) el.removeChild(el.firstChild);
    el.appendChild(frag);
  }
  function start(){
    var d=document.getElementById('tv-static-dark');
    var l=document.getElementById('tv-static-day');
    if(!d&&!l) return;
    function tick(){ if(d) renderFrame(d,darkG); if(l) renderFrame(l,dayG); }
    tick(); setInterval(tick,42);
  }
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',start);
  else start();
})();
</script>
</body>
