<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#07070a">
<title>Messages — EFED Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#07070a; --surface:#111114; --surface2:#1a1a1f; --surface3:#222228;
  --accent:#c0000e; --gold:#c8a84b; --text:#e8e8e8;
  --muted:#8a8a9a; --border:rgba(255,255,255,.07);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{font-size:17px;}
body{background:#000;color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;scrollbar-width:none;overflow-x:hidden;}
body::-webkit-scrollbar{display:none;}

/* PAGE CARD */
.page-card{max-width:960px;margin:0 auto;background:var(--bg);box-shadow:0 0 0 1px rgba(255,255,255,.05),0 32px 80px rgba(0,0,0,.9);min-height:100vh;position:relative;}

/* NAV */
nav{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:8px 56px;background:rgba(7,7,10,.97);backdrop-filter:blur(16px);border-bottom:1px solid rgba(255,255,255,.04);}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
.nav-tv-svg{width:36px;height:30px;}
.logo-text-col{display:flex;flex-direction:column;}
.logo-eyebrow{font-size:.58rem;letter-spacing:3px;color:rgba(255,255,255,.55);font-weight:300;font-style:italic;text-transform:uppercase;margin-bottom:2px;}
.logo-main{font-family:'Bebas Neue',sans-serif;font-size:1.75rem;letter-spacing:4px;color:#fff;white-space:nowrap;}
.logo-main em{color:var(--gold);font-style:normal;}
.nav-right{display:flex;align-items:center;gap:16px;}
.nav-icon-btn{background:none;border:none;cursor:pointer;color:rgba(255,255,255,.6);padding:6px;display:flex;align-items:center;justify-content:center;border-radius:50%;transition:color .2s,background .2s;width:36px;height:36px;position:relative;}
.nav-icon-btn:hover{color:#fff;background:rgba(255,255,255,.08);}
.nav-avatar-wrap{width:42px;height:42px;border-radius:50%;border:2px solid rgba(200,168,75,.4);background:rgba(200,168,75,.12);color:var(--gold);font-size:.7rem;font-weight:700;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.nav-user-wrap{position:relative;}
.user-dropdown{position:absolute;top:calc(100% + 10px);right:0;background:rgba(13,13,16,.98);border:1px solid rgba(255,255,255,.1);border-radius:12px;min-width:220px;padding:6px 0;opacity:0;pointer-events:none;transform:translateY(-6px);transition:opacity .2s,transform .2s;box-shadow:0 20px 48px rgba(0,0,0,.7);z-index:400;}
.user-dropdown.open{opacity:1;pointer-events:all;transform:translateY(0);}
.dd-header{padding:14px 18px 10px;border-bottom:1px solid rgba(255,255,255,.06);margin-bottom:4px;}
.dd-name{font-size:1rem;font-weight:600;color:#fff;margin-bottom:3px;}
.dd-sub{font-size:.78rem;color:var(--muted);}
.dd-item{display:flex;align-items:center;gap:12px;padding:11px 18px;font-size:.88rem;color:rgba(255,255,255,.65);cursor:pointer;transition:background .15s,color .15s;background:none;border:none;width:100%;text-align:left;font-family:'DM Sans',sans-serif;}
.dd-item:hover{background:rgba(255,255,255,.05);color:rgba(255,255,255,.9);}
.dd-item.danger{color:rgba(255,80,80,.6);}
.dd-item.danger:hover{background:rgba(192,0,14,.08);color:#ff6b6b;}
.notif-dot{display:none;position:absolute;width:7px;height:7px;border-radius:50%;background:var(--accent);border:1.5px solid var(--bg);top:3px;right:3px;}
.notif-dot.on{display:block;}

/* USER SEARCH DROPDOWN */
.srch-wrap{position:relative;}
#srch{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:7px 10px 7px 30px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.73rem;outline:none;transition:border-color .2s;}
#srch:focus{border-color:rgba(200,168,75,.3);}
#srch::placeholder{color:var(--muted);}
#user-results{position:absolute;top:calc(100% + 4px);left:0;right:0;background:rgba(18,18,22,.98);border:1px solid rgba(255,255,255,.1);border-radius:10px;overflow:hidden;z-index:50;box-shadow:0 12px 32px rgba(0,0,0,.7);display:none;max-height:220px;overflow-y:auto;}
#user-results.open{display:block;}
.user-result{display:flex;align-items:center;gap:10px;padding:9px 12px;cursor:pointer;transition:background .15s;}
.user-result:hover{background:rgba(255,255,255,.06);}
.user-result-av{width:30px;height:30px;border-radius:50%;background:var(--surface3);border:1px solid rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.65rem;color:var(--gold);flex-shrink:0;}
.user-result-name{font-size:.75rem;font-weight:600;color:#fff;}
.user-result-sub{font-size:.62rem;color:var(--muted);}

/* PROFILE NAV ROW */
@keyframes hub-scan{0%{transform:translateX(-100%)}100%{transform:translateX(400%)}}
.profile-nav-row{display:flex;background:var(--surface2);border-bottom:1px solid rgba(255,255,255,.07);}
.profile-nav-tab{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;padding:11px 8px;position:relative;overflow:hidden;background:transparent;border:none;text-decoration:none;cursor:pointer;transition:background .2s;border-right:1px solid rgba(255,255,255,.06);white-space:nowrap;}
.profile-nav-tab:last-child{border-right:none;}
.profile-nav-tab::after{content:'';position:absolute;top:0;left:0;width:25%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.06),transparent);animation:hub-scan 2.8s ease-in-out infinite;pointer-events:none;}
.profile-nav-tab:hover{background:rgba(255,255,255,.04);}
.profile-nav-tab:hover .hub-circle{background:rgba(255,255,255,.15);border-color:rgba(255,255,255,.25);}
.profile-nav-tab:hover .hub-label{color:rgba(255,255,255,.85);}
.hub-circle{width:26px;height:26px;border-radius:50%;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);display:flex;align-items:center;justify-content:center;transition:background .2s,border-color .2s;flex-shrink:0;}
.hub-label{font-family:'DM Sans',sans-serif;font-size:.65rem;font-weight:600;letter-spacing:2px;color:rgba(255,255,255,.5);text-transform:uppercase;transition:color .2s;}

/* IDENTITY ROW */
.identity-row{display:flex;align-items:center;justify-content:space-between;padding:10px 18px;background:var(--surface2);border-bottom:1px solid rgba(255,255,255,.07);min-height:48px;}
.identity-name{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:3px;color:#fff;line-height:1.1;}
.identity-icons{display:flex;align-items:center;gap:8px;}
.mail-orb{width:34px;height:34px;border-radius:50%;background:rgba(160,160,180,.08);border:1px solid rgba(200,200,220,.15);display:flex;align-items:center;justify-content:center;font-size:1rem;}

/* TAB BAR */
.tab-bar{display:flex;border-bottom:1px solid rgba(255,255,255,.06);background:var(--bg);position:relative;overflow:hidden;}
.tab-btn{flex:1;padding:13px 0;font-family:'DM Sans',sans-serif;font-size:.62rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.3);cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;transition:color .2s;margin-bottom:-1px;position:relative;z-index:1;}
.tab-btn.active{color:#fff;border-bottom-color:var(--accent);}
.tab-btn:hover:not(.active){color:rgba(255,255,255,.55);}
.tab-ink{position:absolute;bottom:0;left:0;height:2px;background:var(--accent);width:50%;transition:transform .28s cubic-bezier(.4,0,.2,1);pointer-events:none;}

/* STATUS */
#status-bar{padding:5px 16px;font-size:.6rem;color:var(--muted);background:var(--surface2);border-bottom:1px solid var(--border);text-align:center;display:none;}

/* MESSAGES AREA */
.msg-area{
  display:flex;
  height:calc(100vh - 57px - 44px - 48px - 44px);
  overflow:hidden;
}

/* LEFT PANEL */
#panel-left{width:272px;min-width:272px;flex-shrink:0;display:flex;flex-direction:column;border-right:1px solid var(--border);background:var(--surface);height:100%;}
.list-top{padding:10px 12px 0;flex-shrink:0;}
.list-search{position:relative;}
.list-search svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none;}
#srch{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:7px 10px 7px 30px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.73rem;outline:none;transition:border-color .2s;}
#srch:focus{border-color:rgba(200,168,75,.3);}
#srch::placeholder{color:var(--muted);}
#convo-list{flex:1;overflow-y:auto;scrollbar-width:none;}
#convo-list::-webkit-scrollbar{display:none;}
.convo{display:flex;align-items:center;gap:10px;padding:11px 13px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .15s;position:relative;}
.convo:hover{background:rgba(255,255,255,.03);}
.convo.active{background:rgba(200,168,75,.07);border-left:2px solid var(--gold);padding-left:11px;}
.convo-av{width:40px;height:40px;border-radius:50%;background:var(--surface3);border:1.5px solid rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.75rem;color:var(--gold);flex-shrink:0;}
.convo-info{flex:1;min-width:0;}
.convo-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:2px;}
.convo-name{font-size:.78rem;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:140px;}
.convo-ts{font-size:.57rem;color:var(--muted);flex-shrink:0;}
.convo-prev{font-size:.68rem;color:rgba(255,255,255,.28);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.convo-prev.unread{color:var(--text);font-weight:500;}
.unread-dot{position:absolute;right:12px;top:50%;transform:translateY(-50%);width:7px;height:7px;border-radius:50%;background:var(--accent);}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:180px;color:var(--muted);font-size:.72rem;gap:8px;}
.empty-state svg{opacity:.2;}

/* RIGHT PANEL */
#panel-right{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--bg);height:100%;}
#no-chat{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--muted);}
#no-chat svg{opacity:.15;}
#no-chat strong{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:2px;color:rgba(255,255,255,.12);display:block;margin-bottom:2px;}
#no-chat p{font-size:.73rem;}
#chat-view{display:none;flex-direction:column;height:100%;}
#chat-hdr{display:flex;align-items:center;gap:10px;padding:11px 14px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;}
#mob-back{display:none;background:none;border:none;color:var(--gold);cursor:pointer;padding:4px;flex-shrink:0;}
#chat-av{width:32px;height:32px;border-radius:50%;background:var(--surface3);border:1.5px solid rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.68rem;color:var(--gold);flex-shrink:0;}
#chat-name{font-size:.85rem;font-weight:700;color:#fff;}
#chat-status{font-size:.6rem;color:var(--muted);}
#chat-body{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:2px;scrollbar-width:thin;scrollbar-color:var(--surface3) transparent;}
#chat-body::-webkit-scrollbar{width:3px;}
#chat-body::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:3px;}
.date-div{display:flex;align-items:center;gap:10px;margin:8px 0 4px;color:var(--muted);font-size:.58rem;letter-spacing:.8px;text-transform:uppercase;font-weight:600;}
.date-div::before,.date-div::after{content:'';flex:1;height:1px;background:var(--border);}
.msg-row{display:flex;margin-bottom:1px;}
.msg-row.mine{justify-content:flex-end;}
.msg-row.gap{margin-top:8px;}
.bubble{max-width:68%;padding:8px 12px;border-radius:16px;font-size:.78rem;line-height:1.5;word-break:break-word;}
.msg-row.mine .bubble{background:#1c3a1c;border:1px solid rgba(76,175,80,.18);color:#e8f5e8;border-bottom-right-radius:4px;}
.msg-row.theirs .bubble{background:var(--surface2);border:1px solid var(--border);color:var(--text);border-bottom-left-radius:4px;}
.msg-row.mine.first .bubble{border-bottom-right-radius:16px;}
.msg-row.theirs.first .bubble{border-bottom-left-radius:16px;}
.msg-t{font-size:.55rem;color:var(--muted);margin-top:2px;padding:0 3px;}
.msg-row.mine .msg-t{text-align:right;}
#composer{padding:10px 14px;border-top:1px solid var(--border);background:var(--surface);display:flex;align-items:flex-end;gap:10px;flex-shrink:0;}
#msg-inp{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:18px;padding:8px 14px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.78rem;outline:none;resize:none;max-height:100px;overflow-y:auto;line-height:1.45;scrollbar-width:none;transition:border-color .2s;}
#msg-inp:focus{border-color:rgba(200,168,75,.3);}
#msg-inp::placeholder{color:var(--muted);}
#msg-inp::-webkit-scrollbar{display:none;}
#send-btn{width:34px;height:34px;border-radius:50%;background:var(--gold);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .2s,transform .1s;}
#send-btn:hover{background:#dbb94f;}
#send-btn:active{transform:scale(.92);}
#send-btn:disabled{background:var(--surface3);cursor:not-allowed;}
#send-btn svg{color:#000;}
#send-btn:disabled svg{color:var(--muted);}

/* TOAST */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#222;color:#fff;padding:8px 18px;border-radius:20px;font-size:.7rem;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;}

/* MOBILE */
@media(max-width:640px){
  nav{padding:8px 16px;}
  .logo-main{font-size:1.3rem;}
  #panel-left{width:100%;min-width:100%;border-right:none;}
  #panel-right{position:fixed;inset:0;z-index:200;transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);background:var(--bg);}
  #panel-right.open{transform:translateX(0);}
  #mob-back{display:flex !important;}
  .msg-area{height:calc(100vh - 57px - 44px - 48px - 44px);}
}
@media(max-width:480px){
  .hub-label{font-size:.6rem;letter-spacing:1px;}
}
</style>
</head>
<body>
<div id="toast"></div>

<!-- NAV -->
<nav>
  <a href="index.html" class="logo">
    <svg class="nav-tv-svg" viewBox="0 0 120 100" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="5" y="18" width="110" height="72" rx="8" fill="#1a1a1f" stroke="#333" stroke-width="1.5"/>
      <rect x="12" y="24" width="96" height="58" rx="5" fill="#0a0a0e" stroke="#222" stroke-width="1"/>
      <rect x="15" y="27" width="90" height="52" fill="#111"/>
      <line x1="38" y1="18" x2="22" y2="3" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="82" y1="18" x2="98" y2="3" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
      <rect x="5" y="84" width="110" height="6" fill="#141418"/>
      <circle cx="100" cy="87" r="2.2" fill="#c0000e" opacity=".9"/>
      <rect x="28" y="90" width="10" height="8" rx="2" fill="#111"/>
      <rect x="82" y="90" width="10" height="8" rx="2" fill="#111"/>
    </svg>
    <div class="logo-text-col">
      <span class="logo-eyebrow">The Official</span>
      <span class="logo-main"><em>EFED</em> Streaming Hub</span>
    </div>
  </a>
  <div class="nav-right">
    <button class="nav-icon-btn" id="search-btn" aria-label="Search">
      <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    </button>
    <button class="nav-icon-btn" aria-label="Notifications">
      <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      <div class="notif-dot" id="notif-dot"></div>
    </button>
    <div class="nav-user-wrap" id="user-wrap">
      <button class="nav-icon-btn" onclick="toggleDD()">
        <div class="nav-avatar-wrap" id="nav-av">
          <img id="nav-av-img" src="" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:50%;display:none;" onerror="this.style.display='none'">
          <span id="nav-initials">?</span>
        </div>
      </button>
      <div class="user-dropdown" id="user-dd">
        <div class="dd-header">
          <div class="dd-name" id="dd-name">—</div>
          <div class="dd-sub" id="dd-sub"></div>
        </div>
        <button class="dd-item" onclick="toggleDD(true);window.location.href='index.html'">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.6)" stroke-width="2" stroke-linecap="round"><rect x="2" y="7" width="20" height="15" rx="2"/><polyline points="17 2 12 7 7 2"/></svg>Back to Hub
        </button>
        <button class="dd-item" onclick="toggleDD(true);goProfile()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>My Profile
        </button>
        <div style="height:1px;background:rgba(255,255,255,.06);margin:4px 0;"></div>
        <button class="dd-item danger" onclick="signOut()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Sign Out
        </button>
      </div>
    </div>
  </div>
</nav>

<!-- PAGE CARD -->
<div class="page-card">

  <!-- PROFILE NAV ROW -->
  <div class="profile-nav-row">
    <a href="index.html" class="profile-nav-tab">
      <div class="hub-circle">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.6)" stroke-width="1.5" stroke-linecap="round"><rect x="2" y="8" width="20" height="13" rx="2"/><line x1="9" y1="8" x2="6" y2="2"/><line x1="15" y1="8" x2="18" y2="2"/></svg>
      </div>
      <span class="hub-label">Back to Hub</span>
    </a>
    <button class="profile-nav-tab" onclick="goProfile()">
      <div class="hub-circle">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.6)" stroke-width="1.5" stroke-linecap="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </div>
      <span class="hub-label">My Profile</span>
    </button>
    <button class="profile-nav-tab" id="efed-tab" style="display:none;" onclick="window.location.href='efed.html'">
      <div class="hub-circle">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.6)" stroke-width="1.5" stroke-linecap="round"><circle cx="12" cy="8" r="6"/><path d="M15.477 12.89L17 22l-5-3-5 3 1.523-9.11"/></svg>
      </div>
      <span class="hub-label">My eFed</span>
    </button>
  </div>

  <!-- IDENTITY ROW -->
  <div class="identity-row">
    <div class="identity-name">Messages</div>
    <div class="identity-icons"><div class="mail-orb">✉️</div></div>
  </div>

  <!-- TAB BAR -->
  <div class="tab-bar">
    <button class="tab-btn active" onclick="setTab(0,this)">All</button>
    <button class="tab-btn" onclick="setTab(1,this)">Unread</button>
    <div class="tab-ink" id="tab-ink"></div>
  </div>

  <div id="status-bar"></div>

  <!-- TWO-PANEL AREA -->
  <div class="msg-area">

    <!-- LEFT: convo list -->
    <div id="panel-left">
      <div class="list-top">
        <div class="list-search srch-wrap" id="srch-wrap">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none;z-index:1;"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="srch" placeholder="Search or start new chat…" autocomplete="off">
          <div id="user-results"></div>
        </div>
      </div>
      <div id="convo-list">
        <div class="empty-state">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          <span>Loading…</span>
        </div>
      </div>
    </div>

    <!-- RIGHT: chat -->
    <div id="panel-right">
      <div id="no-chat">
        <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        <div><strong>Select a conversation</strong><p>Choose someone to start chatting</p></div>
      </div>
      <div id="chat-view">
        <div id="chat-hdr">
          <button id="mob-back" onclick="closeMob()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
          </button>
          <div id="chat-av"></div>
          <div><div id="chat-name">—</div><div id="chat-status"></div></div>
        </div>
        <div id="chat-body"></div>
        <div id="composer">
          <textarea id="msg-inp" placeholder="Type a message…" rows="1"></textarea>
          <button id="send-btn" disabled>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
      </div>
    </div>

  </div><!-- /.msg-area -->
</div><!-- /.page-card -->

<script>
function getSess(){try{return JSON.parse(localStorage.getItem('efed_session'));}catch{return null;}}
function goProfile(){const s=getSess();window.location.href=s?'profile.html?u='+encodeURIComponent(s.username):'profile.html';}
function signOut(){localStorage.removeItem('efed_session');window.location.href='index.html';}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.style.opacity='1';setTimeout(()=>t.style.opacity='0',2500);}
function setStatus(m){const s=document.getElementById('status-bar');s.textContent=m;s.style.display=m?'block':'none';}
function toggleDD(c){document.getElementById('user-dd').classList[c?'remove':'toggle']('open');}
document.addEventListener('click',e=>{if(!e.target.closest('#user-wrap'))toggleDD(true);});
function closeMob(){document.getElementById('panel-right').classList.remove('open');}

let curFilter='all';
function setTab(i,btn){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-ink').style.transform=`translateX(${i*100}%)`;
  curFilter=i===0?'all':'unread';
  if(typeof renderList==='function')renderList();
}

// populate nav
(function(){
  const s=getSess();if(!s)return;
  const name=s.display_name||s.username||'?';
  document.getElementById('dd-name').textContent=name;
  document.getElementById('dd-sub').textContent=s.role||'';
  const img=document.getElementById('nav-av-img'),ini=document.getElementById('nav-initials');
  if(s.avatar_url){img.src=s.avatar_url;img.style.display='';ini.style.display='none';}
  else{ini.textContent=name.slice(0,2).toUpperCase();}
  if(s.is_efed_owner||s.role==='owner')document.getElementById('efed-tab').style.display='flex';
})();
</script>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getAuth,signInAnonymously,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import{getFirestore,collection,doc,addDoc,setDoc,getDocs,onSnapshot,query,orderBy,where,updateDoc,serverTimestamp,limit,startAt,endAt}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const cfg={apiKey:"AIzaSyDqtd_BdmxW4r3mAhs8rWFz-xTu3EkFwYo",authDomain:"efed-hub-4a899.firebaseapp.com",projectId:"efed-hub-4a899",storageBucket:"efed-hub-4a899.firebasestorage.app",messagingSenderId:"827965605330",appId:"1:827965605330:web:848a485cd50188e1fd740b",measurementId:"G-F8BC1GJYFD"};
const fbApp=initializeApp(cfg),auth=getAuth(fbApp),db=getFirestore(fbApp);

function getSess(){try{return JSON.parse(localStorage.getItem('efed_session'));}catch{return null;}}
const _toast=m=>{const t=document.getElementById('toast');t.textContent=m;t.style.opacity='1';setTimeout(()=>t.style.opacity='0',2800);};
const _status=m=>{const s=document.getElementById('status-bar');s.textContent=m;s.style.display=m?'block':'none';};

let me=null,activeId=null,activePart=null,unsubMsgs=null,convos=[];

// ── INIT ──────────────────────────────────────────────────────────────────────
async function init(){
  const s=getSess();
  if(!s?.username){_status('Please log in to view messages');return;}
  _status('Connecting…');
  try{await signInAnonymously(auth);}
  catch(e){console.error('Auth error',e);_status('Connection failed — refresh to retry');return;}

  onAuthStateChanged(auth,async u=>{
    if(!u)return;
    me={username:s.username.toLowerCase(),displayName:s.display_name||s.username,uid:u.uid};
    console.log('Logged in as',me.username,'uid',u.uid);
    try{
      await setDoc(doc(db,'users',me.username),{username:me.username,displayName:me.displayName,uid:u.uid,lastSeen:serverTimestamp()},{merge:true});
      console.log('User doc saved');
    }catch(e){console.error('setDoc users error',e);}
    _status(null);
    subConvos();
    const w=new URLSearchParams(location.search).get('with');
    if(w)openOrCreate(w.toLowerCase());
  });
}

// ── CONVERSATIONS ─────────────────────────────────────────────────────────────
function subConvos(){
  const q=query(collection(db,'conversations'),where('participants','array-contains',me.username),orderBy('lastMessageAt','desc'));
  onSnapshot(q,snap=>{
    convos=snap.docs.map(d=>({id:d.id,...d.data()}));
    renderList();
  },err=>console.error('subConvos error',err));
}

window.renderList=function(){
  const s=document.getElementById('srch').value.toLowerCase().trim();
  let list=convos;
  if(window.curFilter==='unread')list=list.filter(c=>(c.unreadCount?.[me?.username]||0)>0);
  // Only filter existing convos if no user-search dropdown open
  if(s&&document.getElementById('user-results').children.length===0){
    list=list.filter(c=>partner(c).includes(s));
  }
  const el=document.getElementById('convo-list');
  if(!list.length){
    el.innerHTML=`<div class="empty-state"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><span>${window.curFilter==='unread'?'No unread messages':'No conversations yet'}</span></div>`;
    return;
  }
  el.innerHTML=list.map(c=>{
    const p=partner(c),u=c.unreadCount?.[me?.username]||0,ts=c.lastMessageAt?.toDate?fmtT(c.lastMessageAt.toDate()):'';
    return`<div class="convo${c.id===activeId?' active':''}" onclick="sel('${c.id}','${p}')">
      <div class="convo-av">${p.slice(0,2).toUpperCase()}</div>
      <div class="convo-info">
        <div class="convo-top"><span class="convo-name">${p}</span><span class="convo-ts">${ts}</span></div>
        <div class="convo-prev${u?' unread':''}">${c.lastMessage||'No messages yet'}</div>
      </div>
      ${u?'<div class="unread-dot"></div>':''}
    </div>`;
  }).join('');
};

function partner(c){return(c.participants||[]).find(p=>p!==me?.username)||'?';}

// ── USER SEARCH DROPDOWN ──────────────────────────────────────────────────────
let searchTimer=null;
document.getElementById('srch').addEventListener('input',async function(){
  const val=this.value.trim().toLowerCase();
  clearTimeout(searchTimer);
  if(!val){closeResults();if(typeof renderList==='function')renderList();return;}
  // filter existing convos instantly
  if(typeof renderList==='function')renderList();
  // debounce user search
  searchTimer=setTimeout(()=>searchUsers(val),250);
});

document.getElementById('srch').addEventListener('blur',()=>{
  setTimeout(closeResults,200);
});

async function searchUsers(term){
  const res=document.getElementById('user-results');
  try{
    // Query users collection — username starts with term
    const q=query(collection(db,'users'),orderBy('username'),startAt(term),endAt(term+''),limit(8));
    const snap=await getDocs(q);
    const results=snap.docs.map(d=>d.data()).filter(u=>u.username!==me.username);
    if(!results.length){closeResults();return;}
    res.innerHTML=results.map(u=>`
      <div class="user-result" onclick="startChat('${u.username}')">
        <div class="user-result-av">${u.username.slice(0,2).toUpperCase()}</div>
        <div>
          <div class="user-result-name">${u.displayName||u.username}</div>
          <div class="user-result-sub">@${u.username}</div>
        </div>
      </div>`).join('');
    res.classList.add('open');
    res.style.display='block';
  }catch(e){console.error('user search error',e);closeResults();}
}

function closeResults(){
  const r=document.getElementById('user-results');
  r.classList.remove('open');
  r.style.display='none';
  r.innerHTML='';
}

window.startChat=function(username){
  document.getElementById('srch').value='';
  closeResults();
  if(typeof renderList==='function')renderList();
  openOrCreate(username.toLowerCase());
};

// ── OPEN / CREATE CONVO ───────────────────────────────────────────────────────
async function openOrCreate(p){
  const ex=convos.find(c=>c.participants?.includes(p));
  if(ex){sel(ex.id,p);return;}
  try{
    const ref=await addDoc(collection(db,'conversations'),{
      participants:[me.username,p],
      lastMessage:'',
      lastMessageAt:serverTimestamp(),
      unreadCount:{[me.username]:0,[p]:0}
    });
    console.log('New convo created',ref.id);
    sel(ref.id,p);
  }catch(e){console.error('openOrCreate error',e);_toast('Could not start conversation');}
}

// ── SELECT CONVO ─────────────────────────────────────────────────────────────
window.sel=function(id,p){
  activeId=id;activePart=p;
  renderList();
  document.getElementById('no-chat').style.display='none';
  const cv=document.getElementById('chat-view');cv.style.display='flex';
  document.getElementById('chat-av').textContent=p.slice(0,2).toUpperCase();
  document.getElementById('chat-name').textContent=p;
  document.getElementById('send-btn').disabled=false;
  document.getElementById('panel-right').classList.add('open');
  if(unsubMsgs)unsubMsgs();
  const q=query(collection(db,'conversations',id,'messages'),orderBy('sentAt','asc'),limit(300));
  unsubMsgs=onSnapshot(q,
    snap=>renderMsgs(snap.docs.map(d=>({id:d.id,...d.data()}))),
    err=>console.error('messages listener error',err)
  );
  markRead(id);
};

function markRead(id){
  updateDoc(doc(db,'conversations',id),{[`unreadCount.${me.username}`]:0}).catch(e=>console.error('markRead',e));
}

// ── RENDER MESSAGES ───────────────────────────────────────────────────────────
function renderMsgs(msgs){
  const body=document.getElementById('chat-body');
  const atBot=body.scrollHeight-body.scrollTop-body.clientHeight<80;
  let html='',lastD=null,lastS=null;
  msgs.forEach((m,i)=>{
    const d=m.sentAt?.toDate?m.sentAt.toDate():new Date(),ds=fmtD(d);
    const mine=m.sender===me.username,same=lastS===m.sender;
    if(ds!==lastD){html+=`<div class="date-div">${ds}</div>`;lastD=ds;lastS=null;}
    const gap=!same?' gap':'',first=!same;
    html+=`<div class="msg-row ${mine?'mine':'theirs'}${gap}${first?' first':''}">
      <div>
        <div class="bubble">${esc(m.text)}</div>
        ${first||i===msgs.length-1?`<div class="msg-t">${fmtS(d)}</div>`:''}
      </div>
    </div>`;
    lastS=m.sender;
  });
  body.innerHTML=html||`<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--muted);font-size:.72rem;">Say hello 👋</div>`;
  if(atBot||!msgs.length)body.scrollTop=body.scrollHeight;
}

// ── SEND ─────────────────────────────────────────────────────────────────────
async function send(){
  if(!activeId||!me){console.warn('send: no activeId or me');return;}
  const inp=document.getElementById('msg-inp'),txt=inp.value.trim();
  if(!txt)return;
  const saved=txt;
  inp.value='';inp.style.height='';
  document.getElementById('send-btn').disabled=true;
  try{
    console.log('Sending to convo',activeId,'as',me.username);
    const msgRef=await addDoc(collection(db,'conversations',activeId,'messages'),{
      text:saved,
      sender:me.username,
      sentAt:serverTimestamp()
    });
    console.log('Message saved',msgRef.id);
    const prev=saved.length>60?saved.slice(0,60)+'…':saved;
    const cu=convos.find(c=>c.id===activeId)?.unreadCount?.[activePart]||0;
    await updateDoc(doc(db,'conversations',activeId),{
      lastMessage:prev,
      lastMessageAt:serverTimestamp(),
      [`unreadCount.${activePart}`]:cu+1
    });
    console.log('Convo updated');
  }catch(e){
    console.error('send error',e);
    _toast('Failed to send — check console');
    inp.value=saved;
  }
  document.getElementById('send-btn').disabled=false;
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function fmtT(d){const diff=Date.now()-d;if(diff<60000)return'now';if(diff<3600000)return Math.floor(diff/60000)+'m';if(diff<86400000)return d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});if(diff<604800000)return['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()];return d.toLocaleDateString([],{month:'short',day:'numeric'});}
function fmtS(d){return d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});}
function fmtD(d){const t=new Date();t.setHours(0,0,0,0);const dd=new Date(d);dd.setHours(0,0,0,0);const diff=t-dd;if(diff===0)return'Today';if(diff===86400000)return'Yesterday';return d.toLocaleDateString([],{weekday:'long',month:'long',day:'numeric'});}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ── EVENTS ───────────────────────────────────────────────────────────────────
const mi=document.getElementById('msg-inp');
mi.addEventListener('input',()=>{mi.style.height='auto';mi.style.height=Math.min(mi.scrollHeight,100)+'px';});
mi.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}});
document.getElementById('send-btn').addEventListener('click',send);

init();
</script>
</body>
</html>
