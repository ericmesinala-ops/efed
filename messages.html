<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#07070a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Messages — EFED Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #07070a;
    --surface: #111114;
    --surface2: #1a1a1f;
    --surface3: #222228;
    --accent: #c0000e;
    --gold: #c8a84b;
    --gold-dim: rgba(200,168,75,.15);
    --gold-border: rgba(200,168,75,.25);
    --text: #e8e8e8;
    --muted: #5a5a6a;
    --muted2: rgba(255,255,255,.28);
    --border: rgba(255,255,255,.07);
    --online: #4caf7d;
    --panel-w: 320px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; }

  /* ── LAYOUT ── */
  #app { display: flex; height: 100vh; }

  /* ── LEFT PANEL ── */
  #panel-left {
    width: var(--panel-w);
    min-width: var(--panel-w);
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    height: 100%;
    flex-shrink: 0;
  }

  .panel-header {
    padding: 16px 16px 0;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .panel-header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }

  .panel-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.5rem;
    letter-spacing: 3px;
    color: #fff;
  }

  .back-btn {
    display: none;
    align-items: center;
    gap: 6px;
    background: none;
    border: none;
    color: var(--gold);
    font-family: 'DM Sans', sans-serif;
    font-size: .75rem;
    font-weight: 600;
    letter-spacing: .5px;
    cursor: pointer;
    padding: 4px 0;
  }

  /* Search */
  .search-wrap {
    position: relative;
    margin-bottom: 12px;
  }
  .search-wrap svg {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    pointer-events: none;
  }
  #search-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 12px 8px 34px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: .78rem;
    outline: none;
    transition: border-color .2s;
  }
  #search-input:focus { border-color: var(--gold-border); }
  #search-input::placeholder { color: var(--muted); }

  /* Filter tabs */
  .filter-tabs {
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--border);
  }
  .filter-tab {
    flex: 1;
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: .72rem;
    font-weight: 600;
    letter-spacing: .8px;
    text-transform: uppercase;
    padding: 8px 0 10px;
    cursor: pointer;
    transition: color .2s, border-color .2s;
    margin-bottom: -1px;
  }
  .filter-tab.active { color: var(--gold); border-bottom-color: var(--gold); }

  /* Conversation list */
  #convo-list {
    flex: 1;
    overflow-y: auto;
    scrollbar-width: none;
  }
  #convo-list::-webkit-scrollbar { display: none; }

  .convo-item {
    display: flex;
    align-items: center;
    gap: 11px;
    padding: 12px 16px;
    cursor: pointer;
    border-bottom: 1px solid var(--border);
    transition: background .15s;
    position: relative;
  }
  .convo-item:hover { background: rgba(255,255,255,.03); }
  .convo-item.active { background: var(--gold-dim); }

  .convo-av {
    position: relative;
    flex-shrink: 0;
  }
  .convo-av-img {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: var(--surface3);
    border: 1.5px solid rgba(255,255,255,.1);
    object-fit: cover;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: .85rem;
    color: var(--gold);
    overflow: hidden;
  }
  .online-dot {
    position: absolute;
    bottom: 1px;
    right: 1px;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--online);
    border: 2px solid var(--surface);
  }

  .convo-info { flex: 1; min-width: 0; }
  .convo-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 3px; }
  .convo-name { font-size: .82rem; font-weight: 600; color: #fff; truncate: ellipsis; white-space: nowrap; overflow: hidden; max-width: 160px; }
  .convo-time { font-size: .6rem; color: var(--muted); flex-shrink: 0; }
  .convo-preview { font-size: .72rem; color: var(--muted2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: flex; align-items: center; gap: 4px; }
  .convo-preview.unread { color: var(--text); font-weight: 500; }

  .unread-badge {
    position: absolute;
    right: 14px;
    bottom: 14px;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent);
  }

  .empty-list {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 200px;
    color: var(--muted);
    font-size: .78rem;
    gap: 8px;
  }
  .empty-list svg { opacity: .3; }

  /* ── RIGHT PANEL (CHAT) ── */
  #panel-right {
    flex: 1;
    display: flex;
    flex-direction: column;
    height: 100%;
    background: var(--bg);
    min-width: 0;
  }

  /* Chat header */
  #chat-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }
  #chat-header-av {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: var(--surface3);
    border: 1.5px solid rgba(255,255,255,.1);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: .75rem;
    color: var(--gold);
    flex-shrink: 0;
    overflow: hidden;
  }
  #chat-header-name { font-size: .9rem; font-weight: 700; color: #fff; }
  #chat-header-status { font-size: .65rem; color: var(--muted); }
  #chat-mobile-back {
    display: none;
    background: none;
    border: none;
    color: var(--gold);
    cursor: pointer;
    padding: 4px;
    margin-right: 4px;
  }

  /* No conversation selected */
  #no-chat {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: var(--muted);
  }
  #no-chat svg { opacity: .2; }
  #no-chat p { font-size: .82rem; }
  #no-chat strong { font-family: 'Bebas Neue', sans-serif; font-size: 1.2rem; letter-spacing: 2px; color: rgba(255,255,255,.15); display: block; margin-bottom: 4px; }

  /* Messages area */
  #chat-body {
    flex: 1;
    overflow-y: auto;
    padding: 16px 18px;
    display: flex;
    flex-direction: column;
    gap: 2px;
    scrollbar-width: thin;
    scrollbar-color: var(--surface3) transparent;
  }
  #chat-body::-webkit-scrollbar { width: 4px; }
  #chat-body::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 4px; }

  /* Date divider */
  .date-divider {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 10px 0 6px;
    color: var(--muted);
    font-size: .62rem;
    letter-spacing: .8px;
    text-transform: uppercase;
    font-weight: 600;
  }
  .date-divider::before, .date-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* Message bubbles */
  .msg-row {
    display: flex;
    margin-bottom: 1px;
  }
  .msg-row.mine { justify-content: flex-end; }
  .msg-row.theirs { justify-content: flex-start; }

  .msg-row.gap-top { margin-top: 8px; }

  .bubble {
    max-width: 68%;
    padding: 8px 12px;
    border-radius: 16px;
    font-size: .82rem;
    line-height: 1.5;
    word-break: break-word;
  }
  .msg-row.mine .bubble {
    background: #1e3a1e;
    border: 1px solid rgba(76,175,80,.2);
    color: #e8f5e8;
    border-bottom-right-radius: 4px;
  }
  .msg-row.theirs .bubble {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    border-bottom-left-radius: 4px;
  }
  .msg-row.mine.first .bubble { border-bottom-right-radius: 16px; }
  .msg-row.theirs.first .bubble { border-bottom-left-radius: 16px; }

  .msg-time {
    font-size: .58rem;
    color: var(--muted);
    margin-top: 2px;
    padding: 0 4px;
  }
  .msg-row.mine .msg-time { text-align: right; }

  /* Composer */
  #composer {
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    align-items: flex-end;
    gap: 10px;
    flex-shrink: 0;
  }
  #msg-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 9px 14px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: .82rem;
    outline: none;
    resize: none;
    max-height: 120px;
    overflow-y: auto;
    line-height: 1.45;
    scrollbar-width: none;
    transition: border-color .2s;
  }
  #msg-input:focus { border-color: var(--gold-border); }
  #msg-input::placeholder { color: var(--muted); }
  #msg-input::-webkit-scrollbar { display: none; }

  #send-btn {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    background: var(--gold);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background .2s, transform .1s;
  }
  #send-btn:hover { background: #dbb94f; }
  #send-btn:active { transform: scale(.92); }
  #send-btn svg { color: #000; }
  #send-btn:disabled { background: var(--surface3); cursor: not-allowed; }
  #send-btn:disabled svg { color: var(--muted); }

  /* Loading / status */
  #status-bar {
    padding: 6px 16px;
    font-size: .65rem;
    color: var(--muted);
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    text-align: center;
    display: none;
  }

  /* Toast */
  #toast {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    background: #222;
    color: #fff;
    padding: 8px 16px;
    border-radius: 20px;
    font-size: .75rem;
    z-index: 9999;
    opacity: 0;
    transition: opacity .3s;
    pointer-events: none;
  }

  /* ── MOBILE ── */
  @media (max-width: 640px) {
    #panel-left { width: 100%; min-width: 100%; }
    #panel-right { position: fixed; inset: 0; z-index: 100; transform: translateX(100%); transition: transform .25s cubic-bezier(.4,0,.2,1); }
    #panel-right.open { transform: translateX(0); }
    #chat-mobile-back { display: flex; }
  }
</style>
</head>
<body>

<div id="toast"></div>
<div id="status-bar">Connecting…</div>

<div id="app">

  <!-- LEFT: Conversation List -->
  <div id="panel-left">
    <div class="panel-header">
      <div class="panel-header-top">
        <span class="panel-title">Messages</span>
        <button class="back-btn" id="back-to-site" onclick="window.history.back()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
          Back
        </button>
      </div>
      <div class="search-wrap">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="search-input" placeholder="Search conversations…">
      </div>
      <div class="filter-tabs">
        <button class="filter-tab active" data-filter="all" onclick="setFilter('all',this)">All</button>
        <button class="filter-tab" data-filter="unread" onclick="setFilter('unread',this)">Unread</button>
      </div>
    </div>
    <div id="convo-list"></div>
  </div>

  <!-- RIGHT: Chat -->
  <div id="panel-right">
    <!-- No conversation selected -->
    <div id="no-chat">
      <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <div>
        <strong>Select a conversation</strong>
        <p>Choose someone from the left to start chatting</p>
      </div>
    </div>

    <!-- Active chat (hidden until conversation selected) -->
    <div id="chat-view" style="display:none;flex-direction:column;height:100%;">
      <div id="chat-header">
        <button id="chat-mobile-back" onclick="closeChatMobile()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <div id="chat-header-av"></div>
        <div>
          <div id="chat-header-name">—</div>
          <div id="chat-header-status"></div>
        </div>
      </div>
      <div id="chat-body"></div>
      <div id="composer">
        <textarea id="msg-input" placeholder="Type a message…" rows="1"></textarea>
        <button id="send-btn" disabled>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </div>
  </div>

</div>

<script type="module">
// ── FIREBASE CONFIG ──────────────────────────────────────────────────────────
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import {
  getFirestore, collection, doc, addDoc, setDoc, getDoc, getDocs,
  onSnapshot, query, orderBy, where, updateDoc, serverTimestamp, limit
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDqtd_BdmxW4r3mAhs8rWFz-xTu3EkFwYo",
  authDomain: "efed-hub-4a899.firebaseapp.com",
  projectId: "efed-hub-4a899",
  storageBucket: "efed-hub-4a899.firebasestorage.app",
  messagingSenderId: "827965605330",
  appId: "1:827965605330:web:848a485cd50188e1fd740b",
  measurementId: "G-F8BC1GJYFD"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// ── SESSION ──────────────────────────────────────────────────────────────────
function getSession() {
  try { return JSON.parse(localStorage.getItem('efed_session')); } catch { return null; }
}

let currentUser = null; // { username, firebaseUid }
let activeConvoId = null;
let activeConvoPartner = null;
let unsubMessages = null;
let unsubConvos = null;
let allConvos = [];
let currentFilter = 'all';

// ── TOAST ────────────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.opacity = '1';
  setTimeout(() => t.style.opacity = '0', 2500);
}

// ── STATUS BAR ───────────────────────────────────────────────────────────────
function setStatus(msg) {
  const s = document.getElementById('status-bar');
  if (msg) { s.textContent = msg; s.style.display = 'block'; }
  else { s.style.display = 'none'; }
}

// ── INIT ─────────────────────────────────────────────────────────────────────
async function init() {
  const session = getSession();
  if (!session || !session.username) {
    setStatus('Not logged in — please log in to use messages');
    return;
  }

  setStatus('Connecting…');

  try {
    await signInAnonymously(auth);
  } catch (e) {
    setStatus('Connection error — please refresh');
    console.error(e);
    return;
  }

  onAuthStateChanged(auth, async (fbUser) => {
    if (!fbUser) return;

    currentUser = { username: session.username.toLowerCase(), firebaseUid: fbUser.uid, displayName: session.username };

    // Store firebase UID linked to username
    await setDoc(doc(db, 'users', currentUser.username), {
      username: currentUser.username,
      displayName: session.displayName || session.username,
      firebaseUid: fbUser.uid,
      lastSeen: serverTimestamp()
    }, { merge: true });

    setStatus(null);
    loadConversations();

    // Check ?with= param to auto-open a DM
    const withUser = new URLSearchParams(location.search).get('with');
    if (withUser) openOrCreateConvo(withUser.toLowerCase());
  });
}

// ── CONVERSATIONS ─────────────────────────────────────────────────────────────
function loadConversations() {
  const q = query(
    collection(db, 'conversations'),
    where('participants', 'array-contains', currentUser.username),
    orderBy('lastMessageAt', 'desc')
  );

  unsubConvos = onSnapshot(q, (snap) => {
    allConvos = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderConvoList();
  });
}

function renderConvoList() {
  const search = document.getElementById('search-input').value.toLowerCase();
  let convos = allConvos;

  if (currentFilter === 'unread') {
    convos = convos.filter(c => (c.unreadCount?.[currentUser.username] || 0) > 0);
  }
  if (search) {
    convos = convos.filter(c => {
      const partner = getPartner(c);
      return partner.includes(search);
    });
  }

  const list = document.getElementById('convo-list');
  if (convos.length === 0) {
    list.innerHTML = `<div class="empty-list"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><span>No conversations yet</span></div>`;
    return;
  }

  list.innerHTML = convos.map(c => convoHTML(c)).join('');
}

function getPartner(convo) {
  return (convo.participants || []).find(p => p !== currentUser.username) || '?';
}

function convoHTML(c) {
  const partner = getPartner(c);
  const unread = c.unreadCount?.[currentUser.username] || 0;
  const initials = partner.slice(0, 2).toUpperCase();
  const ts = c.lastMessageAt?.toDate ? fmtTime(c.lastMessageAt.toDate()) : '';
  const preview = c.lastMessage || '';
  const isActive = c.id === activeConvoId ? 'active' : '';
  const isUnread = unread > 0;

  return `
    <div class="convo-item ${isActive}" onclick="selectConvo('${c.id}','${partner}')">
      <div class="convo-av">
        <div class="convo-av-img">${initials}</div>
      </div>
      <div class="convo-info">
        <div class="convo-top">
          <span class="convo-name">${partner}</span>
          <span class="convo-time">${ts}</span>
        </div>
        <div class="convo-preview ${isUnread ? 'unread' : ''}">${preview}</div>
      </div>
      ${isUnread ? '<div class="unread-badge"></div>' : ''}
    </div>`;
}

// ── OPEN / CREATE CONVO ───────────────────────────────────────────────────────
async function openOrCreateConvo(partnerUsername) {
  // Look for existing convo with this pair
  const existing = allConvos.find(c => c.participants?.includes(partnerUsername));
  if (existing) {
    selectConvo(existing.id, partnerUsername);
    return;
  }

  // Create new
  const ref = await addDoc(collection(db, 'conversations'), {
    participants: [currentUser.username, partnerUsername],
    lastMessage: '',
    lastMessageAt: serverTimestamp(),
    unreadCount: { [currentUser.username]: 0, [partnerUsername]: 0 }
  });
  selectConvo(ref.id, partnerUsername);
}

window.selectConvo = function(convoId, partner) {
  activeConvoId = convoId;
  activeConvoPartner = partner;

  // Update UI
  renderConvoList();
  document.getElementById('no-chat').style.display = 'none';
  const cv = document.getElementById('chat-view');
  cv.style.display = 'flex';

  document.getElementById('chat-header-name').textContent = partner;
  document.getElementById('chat-header-status').textContent = '';
  document.getElementById('chat-header-av').textContent = partner.slice(0, 2).toUpperCase();
  document.getElementById('send-btn').disabled = false;

  // Mobile: slide in
  document.getElementById('panel-right').classList.add('open');

  // Clear old listener
  if (unsubMessages) unsubMessages();

  // Listen to messages
  const q = query(
    collection(db, 'conversations', convoId, 'messages'),
    orderBy('sentAt', 'asc'),
    limit(200)
  );

  unsubMessages = onSnapshot(q, (snap) => {
    const msgs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderMessages(msgs);
  });

  // Mark as read
  markRead(convoId);
};

function markRead(convoId) {
  if (!currentUser) return;
  updateDoc(doc(db, 'conversations', convoId), {
    [`unreadCount.${currentUser.username}`]: 0
  }).catch(() => {});
}

// ── RENDER MESSAGES ───────────────────────────────────────────────────────────
function renderMessages(msgs) {
  const body = document.getElementById('chat-body');
  const wasAtBottom = body.scrollHeight - body.scrollTop - body.clientHeight < 80;

  let html = '';
  let lastDate = null;
  let lastSender = null;

  msgs.forEach((m, i) => {
    const date = m.sentAt?.toDate ? m.sentAt.toDate() : new Date();
    const dateStr = fmtDate(date);
    const isMine = m.sender === currentUser.username;
    const sameGroup = lastSender === m.sender;

    if (dateStr !== lastDate) {
      html += `<div class="date-divider">${dateStr}</div>`;
      lastDate = dateStr;
      lastSender = null;
    }

    const gapTop = !sameGroup ? 'gap-top' : '';
    const firstInGroup = !sameGroup;

    html += `
      <div class="msg-row ${isMine ? 'mine' : 'theirs'} ${gapTop} ${firstInGroup ? 'first' : ''}">
        <div>
          <div class="bubble">${escapeHTML(m.text)}</div>
          ${firstInGroup || i === msgs.length - 1 ? `<div class="msg-time">${fmtTimeShort(date)}</div>` : ''}
        </div>
      </div>`;

    lastSender = m.sender;
  });

  body.innerHTML = html || '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--muted);font-size:.78rem;">Say hello 👋</div>';

  if (wasAtBottom || msgs.length === 0) {
    body.scrollTop = body.scrollHeight;
  }
}

// ── SEND MESSAGE ──────────────────────────────────────────────────────────────
async function sendMessage() {
  if (!activeConvoId || !currentUser) return;
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  input.style.height = '';
  document.getElementById('send-btn').disabled = true;

  try {
    await addDoc(collection(db, 'conversations', activeConvoId, 'messages'), {
      text,
      sender: currentUser.username,
      sentAt: serverTimestamp()
    });

    await updateDoc(doc(db, 'conversations', activeConvoId), {
      lastMessage: text.length > 60 ? text.slice(0, 60) + '…' : text,
      lastMessageAt: serverTimestamp(),
      [`unreadCount.${activeConvoPartner}`]: (allConvos.find(c => c.id === activeConvoId)?.unreadCount?.[activeConvoPartner] || 0) + 1
    });
  } catch (e) {
    showToast('Failed to send — please retry');
    input.value = text;
  }

  document.getElementById('send-btn').disabled = false;
}

// ── MOBILE BACK ───────────────────────────────────────────────────────────────
window.closeChatMobile = function() {
  document.getElementById('panel-right').classList.remove('open');
};

// ── FILTERS ───────────────────────────────────────────────────────────────────
window.setFilter = function(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderConvoList();
};

// ── HELPERS ───────────────────────────────────────────────────────────────────
function fmtTime(date) {
  const now = new Date();
  const diff = now - date;
  if (diff < 60000) return 'now';
  if (diff < 3600000) return Math.floor(diff / 60000) + 'm';
  if (diff < 86400000) return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  if (diff < 604800000) return ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][date.getDay()];
  return date.toLocaleDateString([], { month: 'short', day: 'numeric' });
}

function fmtTimeShort(date) {
  return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

function fmtDate(date) {
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const d = new Date(date.getFullYear(), date.getMonth(), date.getDate());
  const diff = today - d;
  if (diff === 0) return 'Today';
  if (diff === 86400000) return 'Yesterday';
  return date.toLocaleDateString([], { weekday: 'long', month: 'long', day: 'numeric' });
}

function escapeHTML(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
}

// ── EVENTS ────────────────────────────────────────────────────────────────────
document.getElementById('search-input').addEventListener('input', renderConvoList);

const input = document.getElementById('msg-input');
input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 120) + 'px';
});
input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});
document.getElementById('send-btn').addEventListener('click', sendMessage);

// ── START ─────────────────────────────────────────────────────────────────────
init();
</script>
