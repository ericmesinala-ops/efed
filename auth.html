<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#c0000e">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="EFED Hub">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📺</text></svg>">

<title>EFED Streaming Hub — Access</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --red: #c0000e; --gold: #c8a84b; --bg: #07070a;
  --surface: #0f0f13; --muted: #5a5a6a; --text: #e8e8e8;
  --border: rgba(255,255,255,.07);
}
html, body { width:100%; min-height:100vh; background:var(--bg); font-family:'DM Sans',sans-serif; color:var(--text); overflow-x:hidden; }

.bg-layer {
  position:fixed; inset:0; z-index:0;
  overflow:hidden; background:#07070a;
}
/* Muted iframe stretches to cover full screen */
.bg-hero-iframe-wrap {
  position:absolute; inset:0; z-index:1; pointer-events:none; overflow:hidden;
}
.bg-hero-iframe-wrap iframe {
  position:absolute; top:50%; left:50%;
  width:177.78vh; height:100vh;
  min-width:100%; min-height:56.25vw;
  transform:translate(-50%,-50%);
  opacity:.6; pointer-events:none; border:none;
}
/* Thumbnail shown while iframe loads */
.bg-hero-thumb {
  position:absolute; inset:0; z-index:2;
  background-size:cover; background-position:center;
  transition:opacity 1.4s ease;
}
.bg-hero-thumb.hidden { opacity:0; pointer-events:none; }
/* Black fade for transitions */
.bg-hero-fade {
  position:absolute; inset:0; z-index:3;
  background:#000; opacity:0; pointer-events:none;
  transition:opacity 1.2s ease;
}
.bg-hero-fade.active { opacity:1; }
/* Grain */
.bg-hero-grain {
  position:absolute; inset:0; z-index:4; opacity:.035; pointer-events:none;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
  background-size:200px; animation:grain 1s steps(2) infinite;
}
/* Vignette */
.bg-hero-vignette {
  position:absolute; inset:0; z-index:5; pointer-events:none;
  background:
    radial-gradient(ellipse 80% 80% at 50% 50%, rgba(7,7,10,.25) 20%, rgba(7,7,10,.82) 100%),
    linear-gradient(to right, rgba(7,7,10,.92) 0%, rgba(7,7,10,.45) 40%, rgba(7,7,10,.45) 60%, rgba(7,7,10,.92) 100%),
    linear-gradient(to top, rgba(7,7,10,.98) 0%, rgba(7,7,10,.55) 25%, rgba(7,7,10,.2) 55%, transparent 75%),
    linear-gradient(to bottom, rgba(7,7,10,.88) 0%, rgba(7,7,10,.2) 30%, transparent 50%);
}
@keyframes grain {
  0%{background-position:0 0} 25%{background-position:20px -15px}
  50%{background-position:-10px 20px} 75%{background-position:15px 10px}
  100%{background-position:-20px -5px}
}
.scan {
  position:fixed; left:0; right:0; height:1px;
  background:linear-gradient(to right,transparent,rgba(192,0,14,.4),transparent);
  z-index:1; pointer-events:none;
  animation:scan 6s ease-in-out infinite; opacity:0;
}
@keyframes scan {
  0%{top:-2px;opacity:0} 10%{opacity:1} 90%{opacity:1} 100%{top:100vh;opacity:0}
}

/* TV Static / glitch effect for Discover the Community */
#auth-discover { position:relative; display:inline-block; width:100%; }
#auth-discover::before, #auth-discover::after {
  content: attr(data-text);
  position:absolute; left:0; right:0; text-align:center;
  font-size:inherit; letter-spacing:inherit; text-transform:inherit;
  font-weight:inherit; font-family:inherit; pointer-events:none;
}
#auth-discover::before {
  color:rgba(255,80,80,.8);
  animation:glitch-r 3.5s infinite steps(1);
  clip-path:polygon(0 15%,100% 15%,100% 45%,0 45%); top:0;
}
#auth-discover::after {
  color:rgba(80,200,255,.8);
  animation:glitch-b 3.5s infinite steps(1) .08s;
  clip-path:polygon(0 55%,100% 55%,100% 80%,0 80%); top:0;
}
@keyframes glitch-r {
  0%,89%   { transform:translate(0,0);     opacity:0; }
  90%      { transform:translate(-2px,1px); opacity:1; }
  91%      { transform:translate(2px,-1px); opacity:1; }
  92%      { transform:translate(-1px,2px); opacity:1; }
  93%,100% { transform:translate(0,0);     opacity:0; }
}
@keyframes glitch-b {
  0%,89%   { transform:translate(0,0);     opacity:0; }
  90%      { transform:translate(2px,-1px); opacity:1; }
  91%      { transform:translate(-2px,1px); opacity:1; }
  92%      { transform:translate(1px,-2px); opacity:1; }
  93%,100% { transform:translate(0,0);     opacity:0; }
}
@keyframes static-flicker {
  0%,100% { opacity:1;  text-shadow:0 0 8px rgba(200,168,75,.6); }
  90%     { opacity:1;  text-shadow:0 0 8px rgba(200,168,75,.6); }
  90.5%   { opacity:.55; text-shadow:2px 0 6px rgba(255,80,80,.9),-2px 0 6px rgba(80,200,255,.9); }
  91%     { opacity:1;  text-shadow:0 0 14px rgba(200,168,75,1); }
  91.5%   { opacity:.75; text-shadow:-1px 0 5px rgba(255,80,80,.7),1px 0 5px rgba(80,200,255,.7); }
  92%     { opacity:1;  text-shadow:0 0 8px rgba(200,168,75,.6); }
  96%     { opacity:1;  text-shadow:0 0 8px rgba(200,168,75,.6); }
  96.3%   { opacity:.65; text-shadow:1px 0 8px rgba(255,80,80,.8); }
  96.6%   { opacity:1;  text-shadow:0 0 8px rgba(200,168,75,.6); }
}
.discover-static { animation:static-flicker 4s infinite; display:inline-block; }

.stage {
  position:relative; z-index:2; min-height:100vh;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:28px 16px;
}

.logo { display:flex; flex-direction:column; align-items:center; margin-bottom:24px; }
.rule { width:clamp(50px,12vw,100px); height:1px; background:linear-gradient(to right,transparent,var(--gold),transparent); margin:0 auto 28px; }

/* ── Logo matching nav ── */
.auth-logo-eyebrow {
  font-size:.55rem; letter-spacing:4px; color:rgba(255,255,255,.55);
  text-transform:uppercase; font-weight:300; font-style:italic;
  margin-bottom:6px; text-align:center; width:100%;
  opacity:0; transform:translateY(6px);
  animation: authLogoUp .5s .05s cubic-bezier(.16,1,.3,1) forwards;
}
.auth-logo-main {
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(1.6rem,4.5vw,2.8rem);
  letter-spacing:5px; color:#fff; line-height:1;
  white-space:nowrap;
  filter:drop-shadow(0 0 28px rgba(200,168,75,.25));
  opacity:0; transform:translateY(10px);
  animation: authLogoUp .55s .1s cubic-bezier(.16,1,.3,1) forwards;
}
.auth-logo-main em { color:var(--gold); font-style:normal; }
.auth-logo-tv { font-style:normal; color:inherit; }
#auth-gold-line {
  width:0; height:1px;
  background:linear-gradient(to right,transparent,rgba(200,168,75,.55),transparent);
  margin-top:10px; border-radius:1px;
  animation: authGoldLine .6s .4s cubic-bezier(.16,1,.3,1) forwards;
}
@keyframes authLogoUp {
  to { opacity:1; transform:translateY(0); }
}
@keyframes authGoldLine {
  to { width: clamp(80px,18vw,200px); }
}

.card {
  width:100%; max-width:420px;
  background: linear-gradient(
    160deg,
    rgba(255,255,255,.06) 0%,
    rgba(10,10,14,.38) 40%,
    rgba(10,10,14,.45) 100%
  );
  border-radius:20px; padding:36px 36px;
  backdrop-filter: blur(28px) saturate(140%);
  -webkit-backdrop-filter: blur(28px) saturate(140%);
  border: 1px solid rgba(255,255,255,.1);
  box-shadow:
    0 0 0 1px rgba(255,255,255,.06),
    0 30px 60px rgba(0,0,0,.45),
    0 12px 24px rgba(0,0,0,.28),
    inset 0 1px 0 rgba(255,255,255,.15),
    inset 0 -1px 0 rgba(0,0,0,.2);
  animation:fadeUp .6s .15s ease both;
  position: relative;
  overflow: hidden;
}
/* Top-left light catch — like tinted glass in sunlight */
.card::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(
    125deg,
    rgba(255,255,255,.07) 0%,
    rgba(255,255,255,.02) 35%,
    transparent 60%
  );
  pointer-events: none;
  z-index: 0;
}
/* Sharp specular line on top edge */
.card::after {
  content: '';
  position: absolute;
  top: 0; left: 12%; right: 12%; height: 1px;
  background: linear-gradient(90deg,
    transparent,
    rgba(255,255,255,.5) 25%,
    rgba(255,255,255,.7) 50%,
    rgba(255,255,255,.5) 75%,
    transparent
  );
  pointer-events: none;
  z-index: 1;
}
.card > * { position: relative; z-index: 2; }

/* Tabs */
.tabs {
  display:flex; gap:0; margin-bottom:28px;
  border:1px solid rgba(255,255,255,.1); border-radius:10px; overflow:hidden;
  background: rgba(255,255,255,.04);
}
.tab {
  flex:1; padding:10px; background:transparent; border:none;
  font-family:'Inter',sans-serif; font-size:.75rem; font-weight:500;
  letter-spacing:.3px; text-transform:none; color:rgba(255,255,255,.4);
  cursor:pointer; transition:all .2s;
}
.tab.active {
  background: rgba(255,255,255,.1);
  color:#fff;
  box-shadow: inset 0 1px 0 rgba(255,255,255,.15);
}

.panel { display:none; }
.panel.active { display:block; }

.panel-title { font-family:'Inter',sans-serif; font-size:1.1rem; font-weight:600; letter-spacing:-.3px; color:#fff; margin-bottom:6px; }
.panel-sub { font-size:.78rem; color:rgba(255,255,255,.45); line-height:1.6; margin-bottom:20px; font-family:'Inter',sans-serif; }

/* Form fields */
.field { margin-bottom:16px; }
.field label { display:block; font-size:.7rem; letter-spacing:.2px; text-transform:none; color:rgba(255,255,255,.55); font-weight:500; margin-bottom:5px; font-family:'Inter',sans-serif; }
.field input {
  width:100%; padding:10px 13px;
  background: rgba(255,255,255,.06);
  border: 1px solid rgba(255,255,255,.12);
  border-radius:8px; color:#fff; font-family:'Inter',sans-serif; font-size:.85rem;
  outline:none; transition:border-color .2s, background .2s;
}
.field input:focus { border-color:rgba(255,255,255,.35); background:rgba(255,255,255,.09); }
.field input::placeholder { color:rgba(255,255,255,.25); }

/* Buttons */
.btn-primary {
  width:100%; padding:13px; margin-top:8px;
  background: #c0000e;
  border: none;
  border-radius:10px;
  color: #fff;
  font-family:'Inter',sans-serif;
  font-size:.8rem; font-weight:600; letter-spacing:.2px; text-transform:none;
  cursor:pointer;
  box-shadow: 0 2px 12px rgba(192,0,14,.35);
  transition: background .2s, box-shadow .2s, transform .15s;
}
.btn-primary:hover {
  background: #d4000f;
  box-shadow: 0 4px 20px rgba(192,0,14,.5);
  transform:translateY(-1px);
}
.btn-primary:active { transform:translateY(0); }
.btn-primary:disabled { opacity:.4; cursor:not-allowed; transform:none; }

/* Error / success */
.msg { display:none; margin-bottom:16px; padding:10px 14px; border-radius:8px; font-size:.75rem; line-height:1.5; text-align:center; }
.msg.error { background:rgba(192,0,14,.1); border:1px solid rgba(192,0,14,.3); color:#ff6b6b; }
.msg.success { background:rgba(200,168,75,.08); border:1px solid rgba(200,168,75,.3); color:var(--gold); }
.msg.visible { display:block; }

/* Logged-in view */
#view-hub { display:none; text-align:center; }
#view-hub.active { display:block; }
.hub-welcome { font-family:'Bebas Neue',sans-serif; font-size:1.8rem; letter-spacing:3px; color:#fff; margin-bottom:4px; }
.hub-sub { font-size:.72rem; color:var(--muted); margin-bottom:28px; }

/* Invite codes section */
.invites-wrap { margin-top:20px; border-top:1px solid var(--border); padding-top:20px; }
.invites-label { font-size:.6rem; letter-spacing:2px; text-transform:uppercase; color:var(--gold); font-weight:700; margin-bottom:12px; }
.invite-row {
  display:flex; align-items:center; justify-content:space-between;
  padding:8px 12px; background:rgba(255,255,255,.03); border:1px solid var(--border);
  border-radius:6px; margin-bottom:6px;
}
.invite-code { font-family:monospace; font-size:.8rem; color:#fff; letter-spacing:2px; }
.invite-used { font-family:monospace; font-size:.8rem; color:var(--muted); letter-spacing:2px; text-decoration:line-through; }
.copy-btn {
  font-size:.58rem; letter-spacing:1px; text-transform:uppercase; font-weight:700;
  color: rgba(255,255,255,.8);
  background: rgba(255,255,255,.07);
  border: 1px solid rgba(255,255,255,.15);
  border-radius: 20px; padding: 4px 10px;
  cursor:pointer; font-family:'DM Sans',sans-serif;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  box-shadow: inset 0 1px 0 rgba(255,255,255,.1);
  transition: background .2s, box-shadow .2s;
}
.copy-btn:hover { background: rgba(255,255,255,.13); box-shadow: 0 2px 8px rgba(0,0,0,.2), inset 0 1px 0 rgba(255,255,255,.15); }
.copy-btn.copied { color:#4caf8a; border-color: rgba(76,175,138,.3); background: rgba(76,175,138,.08); }

.signout-btn {
  margin-top:16px; font-size:.65rem; color:var(--muted); background:none; border:none;
  cursor:pointer; font-family:'DM Sans',sans-serif; letter-spacing:1px;
  text-transform:uppercase; transition:color .2s;
}
.signout-btn:hover { color:rgba(255,255,255,.4); }

@keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
@media(max-width:480px){ .card{padding:28px 18px; border-radius:16px;} .auth-logo-main{font-size:1.4rem!important;} .panel-title{font-size:.95rem!important;} }

/* ── TV Logo ── */
.tv-logo-wrap {
  position: relative;
  display: inline-block;
  width: clamp(54px, 8vw, 80px);
  height: auto;
  flex-shrink: 0;
  margin-right: 10px;
}
.tv-logo-img {
  width: 100%;
  height: auto;
  display: block;
  filter: drop-shadow(0 0 12px rgba(192,0,14,.5));
}
/* Static canvas overlaid on the TV screen area */
.tv-static-canvas {
  position: absolute;
  top: 27.9%;
  left: 20.9%;
  width: 36%;
  height: 34%;
  border-radius: 6px;
  opacity: 1;
  mix-blend-mode: normal;
  pointer-events: none;
}
</style>
</head>

<script>
// ── CONFIG ──
const SUPABASE_URL = 'https://osbarvhklizidsffytye.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9zYmFydmhrbGl6aWRzZmZ5dHllIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyNjQ4MzksImV4cCI6MjA4ODg0MDgzOX0.c9EDHCFY50VzSTmz0EUTq1XrX0AvJdynFPxIWT5K7JM';
const SB_HEADERS = { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=representation' };

async function sbGet(table, filters = '') {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${filters}`, { headers: SB_HEADERS });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}
async function sbInsert(table, data) {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, { method: 'POST', headers: SB_HEADERS, body: JSON.stringify(data) });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}
async function sbUpdate(table, data, filters) {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${filters}`, { method: 'PATCH', headers: SB_HEADERS, body: JSON.stringify(data) });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

// ── HELPERS ──
function genCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  const len = Math.random() < 0.5 ? 4 : 5;
  let c = 'EFED-';
  for (let i = 0; i < len; i++) c += chars[Math.floor(Math.random() * chars.length)];
  return c;
}

async function genUniqueCode() {
  // Keep generating until we get one that doesn't exist in the DB
  let attempts = 0;
  while (attempts < 20) {
    const code = genCode();
    const existing = await sbGet('invites', `code=eq.${encodeURIComponent(code)}`);
    if (!existing.length) return code;
    attempts++;
  }
  throw new Error('Could not generate a unique invite code. Try again.');
}

async function hash(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

// ── PASSWORD TOGGLE ──
function togglePass(inputId, btn) {
  const input = document.getElementById(inputId);

  input.type = isHidden ? 'text' : 'password';
  btn.style.color = isHidden ? 'var(--text)' : 'var(--muted)';
  btn.innerHTML = isHidden
    ? `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`
    : `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
}


function getSession() {
  try { return JSON.parse(localStorage.getItem('efed_session')); } catch { return null; }
}
function setSession(u) { localStorage.setItem('efed_session', JSON.stringify(u)); }
function clearSession() { localStorage.removeItem('efed_session'); }

// ── UI ──
async function checkInviteStep() {
  const code = document.getElementById('reg-invite').value.trim().toUpperCase();
  document.getElementById('reg-err').classList.remove('visible');
  if (!code) { showErr('reg-err', 'Please enter your invite code.'); return; }
  if (!/^EFED-[A-Z0-9]{4,5}$/.test(code)) { showErr('reg-err', 'Invalid format. Codes look like EFED-XXXX or EFED-XXXXX.'); return; }
  try {
    const rows = await sbGet('invites', `code=eq.${encodeURIComponent(code)}&used=eq.false`);
    if (!rows || !rows.length) { showErr('reg-err', 'Invalid or already used invite code.'); return; }
    document.getElementById('reg-step1').style.display = 'none';
    document.getElementById('reg-step2').style.display = 'block';
    document.getElementById('reg-invite-carry').value = code;
  } catch(e) {
    showErr('reg-err', 'Could not verify code. Try again.');
  }
}

function showRequestCode() {
  document.getElementById('reg-step1').style.display = 'none';
  document.getElementById('reg-request').style.display = 'block';
}

async function submitCodeRequest() {
  const x = document.getElementById('request-x').value.trim().replace('@','');
  const ig = document.getElementById('request-ig').value.trim().replace('@','');
  if (!x && !ig) { showErr('request-err', 'Please enter at least one social handle.'); return; }

  try {
    await fetch('https://formspree.io/f/xlgprgnk', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        subject: 'EFED Hub — Invite Code Request',
        x_handle: x ? '@' + x : '—',
        ig_handle: ig ? '@' + ig : '—',
        message: `Invite code request from: X: ${x ? '@'+x : '—'} | IG: ${ig ? '@'+ig : '—'}`
      })
    });
    document.getElementById('request-err').classList.remove('visible');
    const ok = document.getElementById('request-ok');
    ok.textContent = '✅ Request sent! We\'ll reach out to you soon.';
    ok.classList.add('visible');
    document.getElementById('request-x').value = '';
    document.getElementById('request-ig').value = '';
  } catch(e) {
    showErr('request-err', 'Could not send. Try again.');
  }
}

function switchTab(tab) {
  const tabs = { login: 0, register: 1 };
  document.getElementById('tab-login').classList.toggle('active', tab === 'login');
  document.getElementById('tab-register').classList.toggle('active', tab === 'register');
  document.querySelector('.tabs').style.display = tab === 'forgot' ? 'none' : 'flex';
  document.getElementById('panel-login').classList.toggle('active', tab === 'login');
  document.getElementById('panel-register').classList.toggle('active', tab === 'register');
  document.getElementById('panel-forgot').classList.toggle('active', tab === 'forgot');
  clearMsgs();
  if (tab === 'forgot') {
    document.getElementById('forgot-step1').style.display = 'block';
    const forgotSub = document.getElementById('forgot-sub'); if (forgotSub) forgotSub.textContent = 'Enter your email and we\'ll send you a reset link.';
    document.getElementById('forgot-user').value = '';
  }
  if (tab === 'register') {
    document.getElementById('reg-step1').style.display = 'block';
    document.getElementById('reg-step2').style.display = 'none';
    document.getElementById('reg-request').style.display = 'none';
  }
}

function clearMsgs() {
  document.querySelectorAll('.msg').forEach(el => { el.classList.remove('visible'); el.textContent=''; });
}
function showErr(id, msg) { const el = document.getElementById(id); el.textContent = msg; el.classList.add('visible'); }
function showOk(id, msg) { const el = document.getElementById(id); el.textContent = msg; el.classList.add('visible'); }
function setLoading(btnId, loading) {
  document.getElementById(btnId).disabled = loading;
  document.getElementById(btnId).textContent = loading ? 'Please wait…' : (btnId === 'login-btn' ? 'Sign In' : 'Create Account');
}

// ── LOGIN ──
async function doLogin() {
  clearMsgs();
  const email = document.getElementById('login-user').value.trim().toLowerCase();
  const pass = document.getElementById('login-pass').value;
  if (!email || !pass) return showErr('login-err', 'Please fill in all fields.');
  if (!email.includes('@')) return showErr('login-err', 'Please enter a valid email.');
  setLoading('login-btn', true);
  try {
    const users = await sbGet('users', `email=eq.${encodeURIComponent(email)}`);
    if (!users.length) return showErr('login-err', 'No account found with that email.');
    const account = users[0];
    if (account.password_hash !== await hash(pass)) return showErr('login-err', 'Incorrect password.');
    if (account.banned) return showErr('login-err', 'This account has been suspended from the EFED Streaming Hub.');
    setSession({ username: account.username, displayName: account.display_name || account.username });
    window.location.replace('index.html');
  } catch(e) {
    showErr('login-err', 'Could not connect. Try again.');
    console.error(e);
  } finally {
    setLoading('login-btn', false);
  }
}

        const stored = (ch.yt_channel_url || '').trim().toLowerCase();
        return stored && (stored === url || stored.includes(url) || url.includes(stored));
      });
      notice.style.display = match ? 'flex' : 'none';
    } catch(e) {}
  }, 500);
}

async function doRegister() {
  clearMsgs();
  const invite = (document.getElementById('reg-invite-carry') || document.getElementById('reg-invite')).value.trim().toUpperCase();
  const email = document.getElementById('reg-email').value.trim().toLowerCase();
  const cawName = document.getElementById('reg-caw-name').value.trim();
  const pass = document.getElementById('reg-pass').value;
  const xHandle = document.getElementById('reg-x').value.trim().replace('@','').toLowerCase();
  const igHandle = document.getElementById('reg-ig').value.trim().replace('@','').toLowerCase();
  const isEfedOwner = document.getElementById('efed-yes').checked;
  const promoName = isEfedOwner ? document.getElementById('reg-promo-name').value.trim() : '';
  const promoAbbr = isEfedOwner ? document.getElementById('reg-promo-abbr').value.trim().toUpperCase() : '';
  const ytChannel = isEfedOwner ? document.getElementById('reg-yt').value.trim() : '';
  const user = cawName.toLowerCase().replace(/[^a-z0-9]+/g, '_').replace(/^_|_$/g, '').substring(0, 30);

  if (!invite || !email || !cawName || !pass) return showErr('reg-err2', 'All fields are required.');
  if (!email.includes('@')) return showErr('reg-err2', 'Please enter a valid email.');
  if (cawName.length < 2) return showErr('reg-err2', 'Please enter your CAW name.');
  if (pass.length < 6) return showErr('reg-err2', 'Password must be at least 6 characters.');
  if (!xHandle && !igHandle) return showErr('reg-err2', 'Please provide at least one social media handle (X or Instagram).');
  if (isEfedOwner && !promoName) return showErr('reg-err2', 'Please enter your promotion name.');
  const twitchChannel = isEfedOwner ? (document.getElementById('reg-twitch')?.value.trim().replace('twitch.tv/','').replace('@','') || '') : '';
  if (isEfedOwner && !ytChannel && !twitchChannel) return showErr('reg-err2', 'Please enter at least one channel URL (YouTube or Twitch).');
  if (isEfedOwner && ytChannel && !ytChannel.includes('youtube.com')) return showErr('reg-err2', 'Please enter a valid YouTube channel URL (e.g. https://youtube.com/@channel).');

  setLoading('reg-btn', true);
  try {
    const invites = await sbGet('invites', `code=eq.${encodeURIComponent(invite)}`);
    if (!invites.length) return showErr('reg-err2', 'Invalid invite code.');
    if (invites[0].used) return showErr('reg-err2', 'This invite code has already been used.');
    const existing = await sbGet('users', `username=eq.${encodeURIComponent(user)}`);
    if (existing.length) return showErr('reg-err2', 'Username already taken. Try another.');
    const existingEmail = await sbGet('users', `email=eq.${encodeURIComponent(email)}`);
    if (existingEmail.length) return showErr('reg-err2', 'Email already registered.');
    if (isEfedOwner && promoName) {
      const existingPromo = await sbGet('users', `promo_name=eq.${encodeURIComponent(promoName)}`);
      if (existingPromo.length) return showErr('reg-err2', 'That promotion name is already registered.');
    }

    // ── SOCIAL BAN CHECK ──
    // Check after submit only — don't reveal who's banned while they're typing
    const socialBanChecks = [];
    if (xHandle) socialBanChecks.push(
      sbGet('banned_socials', `handle=eq.${encodeURIComponent(xHandle)}&platform=eq.x&select=id`).then(r => r.length ? 'x' : null).catch(() => null)
    );
    if (igHandle) socialBanChecks.push(
      sbGet('banned_socials', `handle=eq.${encodeURIComponent(igHandle)}&platform=eq.ig&select=id`).then(r => r.length ? 'ig' : null).catch(() => null)
    );
    if (socialBanChecks.length) {
      const banResults = await Promise.all(socialBanChecks);
      const banned = banResults.filter(Boolean);
      if (banned.length) {
        return showErr('reg-err2', 'We were unable to complete your registration. Please contact us if you believe this is a mistake.');
      }
    }

    await sbInsert('users', {
      username: user,
      password_hash: await hash(pass),
      email,
      display_name: cawName,
      joined_at: Date.now(),
      x_handle: xHandle || null,
      ig_handle: igHandle || null,
      is_efed_owner: isEfedOwner,
      promo_name: promoName || null,
      yt_channel: ytChannel || null,
      twitch_channel: (isEfedOwner && twitchChannel) ? twitchChannel : null,
      role: 'member'
    });

    await sbUpdate('invites', { used: true, used_by: user }, `code=eq.${encodeURIComponent(invite)}`);

    // Notify the invite code creator
    const inviteCreator = invites[0].created_by;
    if (inviteCreator) {
      await sbInsert('notifications', {
        username: inviteCreator,
        type: 'invite',
        message: `🎟️ Your invite code ${invite} was used by ${cawName} — welcome them to the Hub!`,
        video_url: null,
        read: false,
        created_at: Date.now()
      });
    }

    const newCodes = [];
    for (let i = 0; i < 5; i++) {
      try {
        const code = await genUniqueCode();
        newCodes.push({ code, used: false, used_by: null, created_by: user });
      } catch(e) { console.warn('Skipped a code generation:', e); }
    }
    if (newCodes.length > 0) await sbInsert('invites', newCodes);

    setSession({ username: user, displayName: cawName });
    showOk('reg-ok', 'Account created! Welcome to the Hub.');
    setTimeout(() => window.location.replace('index.html'), 800);
  } catch(e) {
    let errMsg = 'Could not connect. Try again.';
    try {
      const parsed = JSON.parse(e.message);
      if (parsed && parsed.message) errMsg = parsed.message;
      else if (parsed && parsed.error) errMsg = parsed.error;
    } catch(_) {
      if (e.message && e.message.length < 200) errMsg = e.message;
    }
    showErr('reg-err2', errMsg);
    console.error('Registration error:', e);
  } finally {
    setLoading('reg-btn', false);
  }
}

// ── FORGOT PASSWORD — Supabase native email reset ──
async function doForgotReset() {
  const email = document.getElementById('forgot-email').value.trim().toLowerCase();
  if (!email || !email.includes('@')) return alert('Please enter a valid email.');
  const btn = document.getElementById('forgot-btn1');
  btn.disabled = true;
  btn.textContent = 'Sending…';
  try {
    await fetch('https://formspree.io/f/xnjgyzrj', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
      body: JSON.stringify({ email, _subject: 'Password Reset Request — EFED Hub' })
    });
    document.getElementById('forgot-step1').style.display = 'none';
    const ok = document.getElementById('forgot-ok');
    ok.style.display = 'block';
    ok.textContent = 'Request sent! The admin will reset your password and contact you shortly.';
  } catch(e) {
    alert('Could not send. Please try again.');
    btn.disabled = false;
    btn.textContent = 'Submit Request';
  }
}


// ── SHOW LOGGED IN VIEW ──
async function showLoggedIn(username) {
  // #view-auth is already empty (no password inputs injected) because the
  // inline script detected a valid session and skipped form injection.
  const hub = document.getElementById('view-hub');
  hub.style.display = 'block';
  hub.classList.add('active');
  document.getElementById('hub-name').textContent = username.toUpperCase();

  const list = document.getElementById('invite-list');
  list.innerHTML = '<p style="font-size:.72rem;color:var(--muted)">Loading codes…</p>';

  try {
    const codes = await sbGet('invites', `created_by=eq.${encodeURIComponent(username)}&order=code.asc`);
    list.innerHTML = '';
    if (!codes.length) {
      list.innerHTML = '<p style="font-size:.72rem;color:var(--muted)">No invite codes yet.</p>';
      return;
    }
    codes.forEach(invite => {
      const row = document.createElement('div');
      row.className = 'invite-row';
      row.innerHTML = invite.used
        ? `<span class="invite-used">${invite.code}</span><span style="font-size:.6rem;color:var(--muted)">Used by ${invite.used_by || '?'}</span>`
        : `<span class="invite-code">${invite.code}</span><button class="copy-btn" onclick="copyCode(this,'${invite.code}')">Copy</button>`;
      list.appendChild(row);
    });
  } catch(e) {
    list.innerHTML = '<p style="font-size:.72rem;color:#ff6b6b">Could not load codes.</p>';
  }
}

function copyCode(btn, code) {
  navigator.clipboard.writeText(code).then(() => {
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
  });
}

// ── SIGN OUT ──
function signOut() {
  clearSession();
  // Reload so the inline script runs fresh and injects the login form.
  // This also ensures iOS sees the password inputs only when truly signed out.
  window.location.reload();
}

// ── INIT ──
async function init() {
  const session = getSession();
  if (session?.username) {
    try {
      const users = await sbGet('users', `username=eq.${encodeURIComponent(session.username)}`);
      if (users.length) {
        const user = users[0];
        // Sync displayName from DB
        if (user.display_name && user.display_name !== session.displayName) {
          session.displayName = user.display_name;
          setSession(session);
        }
        showLoggedIn(session.username);
        return;
      }
    } catch(e) {}
    clearSession();
  }
}

// Enter key support
document.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  if (document.getElementById('panel-login').classList.contains('active')) doLogin();
  else if (document.getElementById('panel-register').classList.contains('active')) {
    if (document.getElementById('reg-step2').style.display !== 'none') doRegister();
    else checkInviteStep();
  }
  else if (document.getElementById('panel-forgot').classList.contains('active')) doForgotReset();
});

init();

// ── TV Static screen animation ──
(function() {
  const canvas = document.getElementById('tv-static-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  let W = 0, H = 0;

  function resize() {
    const rect = canvas.getBoundingClientRect();
    W = canvas.width  = Math.max(Math.round(rect.width), 40);
    H = canvas.height = Math.max(Math.round(rect.height), 26);
  }

  function drawStatic() {
    if (!W || !H) return;
    const id = ctx.createImageData(W, H);
    const buf = id.data;

    for (let y = 0; y < H; y++) {
      // Occasional full horizontal band shift (rolling lines)
      const rowShift = Math.random() < 0.04 ? Math.floor(Math.random() * 80) : 0;
      for (let x = 0; x < W; x++) {
        const i = (y * W + x) * 4;
        // Pure B&W noise — real TV static is greyscale
        const v = Math.floor(Math.random() * 255);
        buf[i]   = v;   // R
        buf[i+1] = v;   // G
        buf[i+2] = v;   // B
        buf[i+3] = 255; // fully opaque
      }
    }

    ctx.putImageData(id, 0, 0);

    // Scanline overlay — dark horizontal lines every 2px for CRT feel
    ctx.fillStyle = 'rgba(0,0,0,0.22)';
    for (let y = 0; y < H; y += 2) {
      ctx.fillRect(0, y, W, 1);
    }

    // Occasional bright horizontal flash band
    if (Math.random() < 0.06) {
      const by = Math.floor(Math.random() * H);
      const bh = Math.floor(Math.random() * 4) + 1;
      ctx.fillStyle = 'rgba(255,255,255,0.6)';
      ctx.fillRect(0, by, W, bh);
    }
  }

  setTimeout(() => {
    resize();
    drawStatic();
    // ~15fps — fast enough to feel like real static
    setInterval(drawStatic, 66);
  }, 400);
})();
