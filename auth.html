<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EFED Streaming Hub — Access</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --red: #c0000e; --gold: #c8a84b; --bg: #07070a;
  --surface: #0f0f13; --muted: #5a5a6a; --text: #e8e8e8;
  --border: rgba(255,255,255,.07);
}
html, body { width:100%; min-height:100vh; background:var(--bg); font-family:'DM Sans',sans-serif; color:var(--text); overflow-x:hidden; }

.bg-layer {
  position:fixed; inset:0; z-index:0;
  background:
    radial-gradient(ellipse 80% 60% at 50% -10%, rgba(192,0,14,.18) 0%, transparent 70%),
    radial-gradient(ellipse 60% 40% at 80% 110%, rgba(200,168,75,.08) 0%, transparent 60%),
    var(--bg);
}
.bg-layer::after {
  content:''; position:absolute; inset:0; opacity:.04; pointer-events:none;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:180px; animation:grain .8s steps(2) infinite;
}
@keyframes grain {
  0%{background-position:0 0} 25%{background-position:18px -14px}
  50%{background-position:-8px 18px} 75%{background-position:14px 8px}
  100%{background-position:-18px -4px}
}
.scan {
  position:fixed; left:0; right:0; height:1px;
  background:linear-gradient(to right,transparent,rgba(192,0,14,.4),transparent);
  z-index:1; pointer-events:none;
  animation:scan 6s ease-in-out infinite; opacity:0;
}
@keyframes scan {
  0%{top:-2px;opacity:0} 10%{opacity:1} 90%{opacity:1} 100%{top:100vh;opacity:0}
}

.stage {
  position:relative; z-index:2; min-height:100vh;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:40px 20px;
}

.logo { display:flex; flex-direction:column; align-items:center; margin-bottom:40px; animation:fadeUp .6s ease both; }
.logo-eyebrow { font-size:.55rem; letter-spacing:4px; color:var(--muted); text-transform:uppercase; font-weight:300; font-style:italic; margin-bottom:6px; }
.logo-main { font-family:'Bebas Neue',sans-serif; font-size:clamp(2.8rem,8vw,5rem); letter-spacing:8px; color:#fff; line-height:1; filter:drop-shadow(0 0 30px rgba(192,0,14,.3)); }
.logo-main em { color:var(--gold); font-style:normal; }
.rule { width:clamp(60px,15vw,120px); height:1px; background:linear-gradient(to right,transparent,var(--gold),transparent); margin:0 auto 40px; animation:fadeUp .6s .1s ease both; }

.card {
  width:100%; max-width:400px;
  background:rgba(255,255,255,.03); border:1px solid var(--border);
  border-radius:16px; padding:40px 36px;
  backdrop-filter:blur(20px);
  box-shadow:0 40px 80px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.06);
  animation:fadeUp .6s .15s ease both;
}

/* Tabs */
.tabs {
  display:flex; gap:0; margin-bottom:32px;
  border:1px solid rgba(255,255,255,.12); border-radius:40px; overflow:hidden;
  background: rgba(255,255,255,.04);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
}
.tab {
  flex:1; padding:10px; background:transparent; border:none;
  font-family:'DM Sans',sans-serif; font-size:.7rem; font-weight:600;
  letter-spacing:1.5px; text-transform:uppercase; color:var(--muted);
  cursor:pointer; transition:all .2s;
}
.tab.active {
  background: rgba(255,255,255,.1);
  color:#fff;
  box-shadow: inset 0 1px 0 rgba(255,255,255,.15);
}

.panel { display:none; }
.panel.active { display:block; }

.panel-title { font-family:'Bebas Neue',sans-serif; font-size:1.6rem; letter-spacing:3px; color:#fff; margin-bottom:4px; }
.panel-sub { font-size:.72rem; color:var(--muted); line-height:1.6; margin-bottom:24px; }

/* Form fields */
.field { margin-bottom:14px; }
.field label { display:block; font-size:.6rem; letter-spacing:2px; text-transform:uppercase; color:var(--muted); font-weight:600; margin-bottom:6px; }
.field input {
  width:100%; padding:11px 14px;
  background:rgba(255,255,255,.05); border:1px solid var(--border);
  border-radius:8px; color:#fff; font-family:'DM Sans',sans-serif; font-size:.85rem;
  outline:none; transition:border-color .2s, background .2s;
}
.field input:focus { border-color:rgba(255,255,255,.3); background:rgba(255,255,255,.08); }
.field input::placeholder { color:var(--muted); }

/* Buttons */
.btn-primary {
  width:100%; padding:13px; margin-top:8px;
  background: rgba(255,255,255,.09);
  border: 1px solid rgba(255,255,255,.2);
  border-radius:40px;
  color: rgba(255,255,255,.95);
  font-family:'DM Sans',sans-serif;
  font-size:.8rem; font-weight:700; letter-spacing:1.5px; text-transform:uppercase;
  cursor:pointer;
  backdrop-filter: blur(12px) saturate(180%);
  -webkit-backdrop-filter: blur(12px) saturate(180%);
  box-shadow: 0 2px 14px rgba(0,0,0,.25), inset 0 1px 0 rgba(255,255,255,.15);
  transition: background .2s, box-shadow .2s, transform .15s;
}
.btn-primary:hover {
  background: rgba(255,255,255,.15);
  box-shadow: 0 4px 22px rgba(0,0,0,.3), inset 0 1px 0 rgba(255,255,255,.2);
  transform:translateY(-1px);
}
.btn-primary:active { transform:translateY(0); }
.btn-primary:disabled { opacity:.35; cursor:not-allowed; transform:none; }

/* Error / success */
.msg { display:none; margin-bottom:16px; padding:10px 14px; border-radius:8px; font-size:.75rem; line-height:1.5; text-align:center; }
.msg.error { background:rgba(192,0,14,.1); border:1px solid rgba(192,0,14,.3); color:#ff6b6b; }
.msg.success { background:rgba(200,168,75,.08); border:1px solid rgba(200,168,75,.3); color:var(--gold); }
.msg.visible { display:block; }

/* Logged-in view */
#view-hub { display:none; text-align:center; }
#view-hub.active { display:block; }
.hub-welcome { font-family:'Bebas Neue',sans-serif; font-size:1.8rem; letter-spacing:3px; color:#fff; margin-bottom:4px; }
.hub-sub { font-size:.72rem; color:var(--muted); margin-bottom:28px; }

/* Invite codes section */
.invites-wrap { margin-top:20px; border-top:1px solid var(--border); padding-top:20px; }
.invites-label { font-size:.6rem; letter-spacing:2px; text-transform:uppercase; color:var(--gold); font-weight:700; margin-bottom:12px; }
.invite-row {
  display:flex; align-items:center; justify-content:space-between;
  padding:8px 12px; background:rgba(255,255,255,.03); border:1px solid var(--border);
  border-radius:6px; margin-bottom:6px;
}
.invite-code { font-family:monospace; font-size:.8rem; color:#fff; letter-spacing:2px; }
.invite-used { font-family:monospace; font-size:.8rem; color:var(--muted); letter-spacing:2px; text-decoration:line-through; }
.copy-btn {
  font-size:.58rem; letter-spacing:1px; text-transform:uppercase; font-weight:700;
  color: rgba(255,255,255,.8);
  background: rgba(255,255,255,.07);
  border: 1px solid rgba(255,255,255,.15);
  border-radius: 20px; padding: 4px 10px;
  cursor:pointer; font-family:'DM Sans',sans-serif;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  box-shadow: inset 0 1px 0 rgba(255,255,255,.1);
  transition: background .2s, box-shadow .2s;
}
.copy-btn:hover { background: rgba(255,255,255,.13); box-shadow: 0 2px 8px rgba(0,0,0,.2), inset 0 1px 0 rgba(255,255,255,.15); }
.copy-btn.copied { color:#4caf8a; border-color: rgba(76,175,138,.3); background: rgba(76,175,138,.08); }

.signout-btn {
  margin-top:16px; font-size:.65rem; color:var(--muted); background:none; border:none;
  cursor:pointer; font-family:'DM Sans',sans-serif; letter-spacing:1px;
  text-transform:uppercase; transition:color .2s;
}
.signout-btn:hover { color:rgba(255,255,255,.4); }

@keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
@media(max-width:480px){ .card{padding:32px 20px;} }
</style>
</head>
<body>
<div class="bg-layer"></div>
<div class="scan"></div>

<div class="stage">
  <div class="logo">
    <span class="logo-eyebrow">The Official</span>
    <div class="logo-main"><em>EFED</em> Streaming Hub</div>
  </div>
  <div class="rule"></div>

  <div class="card">

    <!-- LOGGED IN VIEW -->
    <div id="view-hub">
      <div class="hub-welcome" id="hub-name">Welcome Back</div>
      <div class="hub-sub">You're in. <a href="index.html" style="color:var(--gold);text-decoration:none;">Enter the Hub →</a></div>
      <div class="invites-wrap">
        <div class="invites-label">Your Invite Codes</div>
        <div id="invite-list"></div>
      </div>
      <button class="signout-btn" onclick="signOut()">Sign out</button>
    </div>

    <!-- AUTH VIEW -->
    <div id="view-auth">
      <div class="tabs">
        <button class="tab active" id="tab-login" onclick="switchTab('login')">Sign In</button>
        <button class="tab" id="tab-register" onclick="switchTab('register')">Join</button>
      </div>

      <!-- LOGIN PANEL -->
      <div class="panel active" id="panel-login">
        <div class="panel-title">Welcome Back</div>
        <p class="panel-sub">Sign in to access exclusive EFED content.</p>
        <div class="msg error" id="login-err"></div>
        <div class="field"><label>Username or Email</label><input type="text" id="login-user" placeholder="username or email" autocomplete="username"></div>
        <div class="field"><label>Password</label><input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password"></div>
        <button class="btn-primary" id="login-btn" onclick="doLogin()">Sign In</button>
        <p style="text-align:center;margin-top:14px;"><button onclick="switchTab('forgot')" style="background:none;border:none;color:var(--muted);font-size:.68rem;cursor:pointer;font-family:'DM Sans',sans-serif;letter-spacing:.5px;transition:color .2s;" onmouseover="this.style.color='rgba(255,255,255,.5)'" onmouseout="this.style.color='var(--muted)'">Forgot password?</button></p>
      </div>

      <!-- REGISTER PANEL -->
      <div class="panel" id="panel-register">
        <div class="panel-title">Join the Hub</div>
        <p class="panel-sub">You need an invite code to get in.</p>
        <div class="msg error" id="reg-err"></div>
        <div class="msg success" id="reg-ok"></div>
        <div class="field"><label>Invite Code</label><input type="text" id="reg-invite" placeholder="XXXX-XXXX" autocomplete="off" style="text-transform:uppercase;"></div>
        <div class="field"><label>Username</label><input type="text" id="reg-user" placeholder="choose a username" autocomplete="username"></div>
        <div class="field"><label>Email</label><input type="email" id="reg-email" placeholder="your@email.com" autocomplete="email"></div>
        <div class="field"><label>Password</label><input type="password" id="reg-pass" placeholder="••••••••" autocomplete="new-password"></div>
        <div class="field">
          <label>Security Question</label>
          <select id="reg-sq" style="width:100%;padding:11px 14px;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:8px;color:#fff;font-family:'DM Sans',sans-serif;font-size:.85rem;outline:none;appearance:none;cursor:pointer;">
            <option value="" disabled selected style="background:#111">Choose a question…</option>
            <option value="pet" style="background:#111">What was your first pet's name?</option>
            <option value="city" style="background:#111">What city were you born in?</option>
            <option value="school" style="background:#111">What was your elementary school?</option>
            <option value="mother" style="background:#111">What is your mother's maiden name?</option>
            <option value="street" style="background:#111">What street did you grow up on?</option>
          </select>
        </div>
        <div class="field"><label>Your Answer</label><input type="text" id="reg-sa" placeholder="answer (case-insensitive)" autocomplete="off"></div>
        <button class="btn-primary" id="reg-btn" onclick="doRegister()">Create Account</button>
      </div>

      <!-- FORGOT PASSWORD PANEL -->
      <div class="panel" id="panel-forgot">
        <div class="panel-title">Reset Password</div>
        <p class="panel-sub" id="forgot-sub">Enter your username to get started.</p>
        <div class="msg error" id="forgot-err"></div>
        <div class="msg success" id="forgot-ok"></div>

        <!-- Step 1: email lookup -->
        <div id="forgot-step1">
          <div class="field"><label>Email</label><input type="email" id="forgot-user" placeholder="your@email.com" autocomplete="email"></div>
          <button class="btn-primary" id="forgot-btn1" onclick="doForgotStep1()">Continue</button>
        </div>

        <!-- Step 2: answer security question -->
        <div id="forgot-step2" style="display:none;">
          <div class="field"><label id="forgot-q-label">Security Question</label><input type="text" id="forgot-answer" placeholder="your answer" autocomplete="off"></div>
          <button class="btn-primary" id="forgot-btn2" onclick="doForgotStep2()">Verify</button>
        </div>

        <!-- Step 3: new password -->
        <div id="forgot-step3" style="display:none;">
          <div class="field"><label>New Password</label><input type="password" id="forgot-newpass" placeholder="min 6 characters" autocomplete="new-password"></div>
          <button class="btn-primary" id="forgot-btn3" onclick="doForgotStep3()">Set New Password</button>
        </div>

        <p style="text-align:center;margin-top:14px;"><button onclick="switchTab('login')" style="background:none;border:none;color:var(--muted);font-size:.68rem;cursor:pointer;font-family:'DM Sans',sans-serif;letter-spacing:.5px;transition:color .2s;" onmouseover="this.style.color='rgba(255,255,255,.5)'" onmouseout="this.style.color='var(--muted)'">← Back to Sign In</button></p>
      </div>
    </div>

  </div>
</div>

<script>
// ── CONFIG ──
// Replace these with your JSONBin details after setup
const JSONBIN_BIN_ID = '69b1c65caa77b81da9d84234';
const JSONBIN_API_KEY = '$2a$10$t3Exa5qDTGK.3u7NiWeos.y4wFyko086XvkE//4hDy53cZu/uHYzW';
const BIN_URL = `https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`;

// ── SEED INVITE CODES (first 5, generated at build time) ──
const SEED_CODES = ['EFED-F7X2', 'EFED-K9M4', 'EFED-R3P8', 'EFED-W6T1', 'EFED-B5N7'];

// ── HELPERS ──
function genCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let c = 'EFED-';
  for (let i = 0; i < 4; i++) c += chars[Math.floor(Math.random() * chars.length)];
  return c;
}

function hash(str) {
  // Simple non-crypto hash — fine for a fan site
  let h = 0;
  for (let i = 0; i < str.length; i++) h = (Math.imul(31, h) + str.charCodeAt(i)) | 0;
  return h.toString(36);
}

async function getDB() {
  const r = await fetch(BIN_URL + '/latest?t=' + Date.now(), {
    headers: { 'X-Master-Key': JSONBIN_API_KEY },
    cache: 'no-store'
  });
  if (!r.ok) throw new Error('DB read failed ' + r.status);
  const j = await r.json();
  return j.record;
}

async function setDB(data) {
  const r = await fetch(BIN_URL, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json', 'X-Master-Key': JSONBIN_API_KEY },
    body: JSON.stringify(data),
    cache: 'no-store'
  });
  if (!r.ok) throw new Error('DB write failed ' + r.status);
}

// ── SESSION ──
function getSession() {
  try { return JSON.parse(localStorage.getItem('efed_session')); } catch { return null; }
}
function setSession(u) { localStorage.setItem('efed_session', JSON.stringify(u)); }
function clearSession() { localStorage.removeItem('efed_session'); }

// ── UI ──
function switchTab(tab) {
  const tabs = { login: 0, register: 1 };
  document.getElementById('tab-login').classList.toggle('active', tab === 'login');
  document.getElementById('tab-register').classList.toggle('active', tab === 'register');
  // Show/hide tabs bar on forgot
  document.querySelector('.tabs').style.display = tab === 'forgot' ? 'none' : 'flex';
  document.getElementById('panel-login').classList.toggle('active', tab === 'login');
  document.getElementById('panel-register').classList.toggle('active', tab === 'register');
  document.getElementById('panel-forgot').classList.toggle('active', tab === 'forgot');
  clearMsgs();
  // Reset forgot steps
  if (tab === 'forgot') {
    document.getElementById('forgot-step1').style.display = 'block';
    document.getElementById('forgot-step2').style.display = 'none';
    document.getElementById('forgot-step3').style.display = 'none';
    document.getElementById('forgot-sub').textContent = 'Enter your username to get started.';
    document.getElementById('forgot-user').value = '';
    document.getElementById('forgot-answer') && (document.getElementById('forgot-answer').value = '');
  }
}

function clearMsgs() {
  document.querySelectorAll('.msg').forEach(el => { el.classList.remove('visible'); el.textContent=''; });
}

function showErr(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg; el.classList.add('visible');
}

function showOk(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg; el.classList.add('visible');
}

function setLoading(btnId, loading) {
  document.getElementById(btnId).disabled = loading;
  document.getElementById(btnId).textContent = loading ? 'Please wait…' : (btnId === 'login-btn' ? 'Sign In' : 'Create Account');
}

// ── LOGIN ──
async function doLogin() {
  clearMsgs();
  const identifier = document.getElementById('login-user').value.trim().toLowerCase();
  const pass = document.getElementById('login-pass').value;
  if (!identifier || !pass) return showErr('login-err', 'Please fill in all fields.');
  setLoading('login-btn', true);
  try {
    const db = await getDB();
    // Find by username first, then by email
    let username = db.users?.[identifier] ? identifier : null;
    if (!username) {
      username = Object.keys(db.users || {}).find(u => db.users[u].email === identifier) || null;
    }
    if (!username) return showErr('login-err', 'No account found. Check your username or email.');
    const account = db.users[username];
    if (account.passwordHash !== hash(pass)) return showErr('login-err', 'Incorrect password.');
    // Store full session including displayName so it's consistent across devices
    setSession({
      username,
      displayName: account.displayName || username
    });
    window.location.replace('index.html');
  } catch(e) {
    showErr('login-err', 'Could not connect. Check your setup.');
    console.error(e);
  } finally {
    setLoading('login-btn', false);
  }
}

// ── REGISTER ──
async function doRegister() {
  clearMsgs();
  const invite = document.getElementById('reg-invite').value.trim().toUpperCase();
  const user = document.getElementById('reg-user').value.trim().toLowerCase();
  const email = document.getElementById('reg-email').value.trim().toLowerCase();
  const pass = document.getElementById('reg-pass').value;
  const sq = document.getElementById('reg-sq').value;
  const sa = document.getElementById('reg-sa').value.trim().toLowerCase();
  if (!invite || !user || !email || !pass || !sq || !sa) return showErr('reg-err', 'All fields are required.');
  if (!email.includes('@')) return showErr('reg-err', 'Please enter a valid email.');
  if (user.length < 3) return showErr('reg-err', 'Username must be at least 3 characters.');
  if (pass.length < 6) return showErr('reg-err', 'Password must be at least 6 characters.');
  if (!/^[a-z0-9_]+$/.test(user)) return showErr('reg-err', 'Username: letters, numbers, underscores only.');
  setLoading('reg-btn', true);
  try {
    const db = await getDB();
    const inviteData = db.invites?.[invite];
    if (!inviteData) return showErr('reg-err', 'Invalid invite code.');
    if (inviteData.used) return showErr('reg-err', 'This invite code has already been used.');
    if (db.users?.[user]) return showErr('reg-err', 'Username already taken. Try another.');

    const myCodes = {};
    for (let i = 0; i < 5; i++) {
      const c = genCode();
      myCodes[c] = { used: false, usedBy: null };
    }

    db.users[user] = {
      passwordHash: hash(pass),
      email: email,
      securityQuestion: sq,
      securityAnswerHash: hash(sa),
      invites: Object.keys(myCodes),
      joinedAt: Date.now()
    };
    db.invites[invite].used = true;
    db.invites[invite].usedBy = user;
    Object.assign(db.invites, myCodes);
    await setDB(db);

    setSession({ username: user, displayName: user });
    showOk('reg-ok', 'Account created! Welcome to the Hub.');
    setTimeout(() => window.location.replace('index.html'), 800);
  } catch(e) {
    showErr('reg-err', 'Could not connect. Check your setup.');
    console.error(e);
  } finally {
    setLoading('reg-btn', false);
  }
}

// ── FORGOT PASSWORD ──
const QUESTIONS = {
  pet: "What was your first pet's name?",
  city: "What city were you born in?",
  school: "What was your elementary school?",
  mother: "What is your mother's maiden name?",
  street: "What street did you grow up on?"
};

let _forgotUsername = null;

async function doForgotStep1() {
  clearMsgs();
  const email = document.getElementById('forgot-user').value.trim().toLowerCase();
  if (!email || !email.includes('@')) return showErr('forgot-err', 'Please enter a valid email.');
  document.getElementById('forgot-btn1').disabled = true;
  document.getElementById('forgot-btn1').textContent = 'Please wait…';
  try {
    const db = await getDB();
    // Find user by email
    const username = Object.keys(db.users || {}).find(u => db.users[u].email === email);
    if (!username) return showErr('forgot-err', 'No account found with that email.');
    const account = db.users[username];
    if (!account.securityQuestion) return showErr('forgot-err', 'No security question set. Contact an admin.');
    _forgotUsername = username;
    document.getElementById('forgot-q-label').textContent = QUESTIONS[account.securityQuestion] || 'Security Question';
    document.getElementById('forgot-step1').style.display = 'none';
    document.getElementById('forgot-step2').style.display = 'block';
    document.getElementById('forgot-sub').textContent = 'Answer your security question.';
  } catch(e) {
    showErr('forgot-err', 'Could not connect. Try again.');
  } finally {
    document.getElementById('forgot-btn1').disabled = false;
    document.getElementById('forgot-btn1').textContent = 'Continue';
  }
}

async function doForgotStep2() {
  clearMsgs();
  const answer = document.getElementById('forgot-answer').value.trim().toLowerCase();
  if (!answer) return showErr('forgot-err', 'Please enter your answer.');
  document.getElementById('forgot-btn2').disabled = true;
  document.getElementById('forgot-btn2').textContent = 'Please wait…';
  try {
    const db = await getDB();
    const account = db.users?.[_forgotUsername];
    if (account.securityAnswerHash !== hash(answer)) return showErr('forgot-err', 'Incorrect answer. Try again.');
    document.getElementById('forgot-step2').style.display = 'none';
    document.getElementById('forgot-step3').style.display = 'block';
    document.getElementById('forgot-sub').textContent = 'Choose a new password.';
  } catch(e) {
    showErr('forgot-err', 'Could not connect. Try again.');
  } finally {
    document.getElementById('forgot-btn2').disabled = false;
    document.getElementById('forgot-btn2').textContent = 'Verify';
  }
}

async function doForgotStep3() {
  clearMsgs();
  const newPass = document.getElementById('forgot-newpass').value;
  if (!newPass || newPass.length < 6) return showErr('forgot-err', 'Password must be at least 6 characters.');
  document.getElementById('forgot-btn3').disabled = true;
  document.getElementById('forgot-btn3').textContent = 'Please wait…';
  try {
    const db = await getDB();
    db.users[_forgotUsername].passwordHash = hash(newPass);
    await setDB(db);
    showOk('forgot-ok', 'Password reset! You can now sign in.');
    document.getElementById('forgot-step3').style.display = 'none';
    setTimeout(() => switchTab('login'), 1500);
  } catch(e) {
    showErr('forgot-err', 'Could not save. Try again.');
  } finally {
    document.getElementById('forgot-btn3').disabled = false;
    document.getElementById('forgot-btn3').textContent = 'Set New Password';
  }
}

// ── SHOW LOGGED IN VIEW ──
function showLoggedIn(username, db) {
  document.getElementById('view-auth').style.display = 'none';
  const hub = document.getElementById('view-hub');
  hub.classList.add('active');
  document.getElementById('hub-name').textContent = username.toUpperCase();

  const userCodes = db.users?.[username]?.invites || [];
  const list = document.getElementById('invite-list');
  list.innerHTML = '';

  if (userCodes.length === 0) {
    list.innerHTML = '<p style="font-size:.72rem;color:var(--muted)">No invite codes yet.</p>';
    return;
  }

  userCodes.forEach(code => {
    const info = db.invites?.[code];
    const used = info?.used;
    const row = document.createElement('div');
    row.className = 'invite-row';
    row.innerHTML = used
      ? `<span class="invite-used">${code}</span><span style="font-size:.6rem;color:var(--muted)">Used by ${info.usedBy || '?'}</span>`
      : `<span class="invite-code">${code}</span><button class="copy-btn" onclick="copyCode(this,'${code}')">Copy</button>`;
    list.appendChild(row);
  });
}

function copyCode(btn, code) {
  navigator.clipboard.writeText(code).then(() => {
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
  });
}

// ── SIGN OUT ──
function signOut() {
  clearSession();
  document.getElementById('view-hub').classList.remove('active');
  document.getElementById('view-auth').style.display = 'block';
}

// ── INIT ──
async function init() {
  const session = getSession();
  if (session?.username) {
    try {
      const db = await getDB();
      const user = db.users?.[session.username];
      if (user) {
        // Always sync displayName from DB — may have changed on another device
        if (user.displayName && user.displayName !== session.displayName) {
          session.displayName = user.displayName;
          setSession(session);
        }
        showLoggedIn(session.username, db);
        return;
      }
    } catch(e) {}
    clearSession();
  }
}

// Enter key support
document.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  if (document.getElementById('panel-login').classList.contains('active')) doLogin();
  else if (document.getElementById('panel-register').classList.contains('active')) doRegister();
  else if (document.getElementById('panel-forgot').classList.contains('active')) {
    if (document.getElementById('forgot-step1').style.display !== 'none') doForgotStep1();
    else if (document.getElementById('forgot-step2').style.display !== 'none') doForgotStep2();
    else if (document.getElementById('forgot-step3').style.display !== 'none') doForgotStep3();
  }
});

init();
</script>
