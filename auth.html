<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#c0000e">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="EFED Hub">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📺</text></svg>">
<link rel="apple-touch-icon" href="/efed-hub-icon.svg">
<title>EFED Streaming Hub — Access</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --red: #c0000e; --gold: #c8a84b; --bg: #07070a;
  --surface: #0f0f13; --muted: #5a5a6a; --text: #e8e8e8;
  --border: rgba(255,255,255,.07);
}
html, body { width:100%; min-height:100vh; background:var(--bg); font-family:'DM Sans',sans-serif; color:var(--text); overflow-x:hidden; }
@media(max-width:480px){
  html, body { overflow:hidden; position:fixed; width:100%; height:100%; touch-action:manipulation; overscroll-behavior:none; }
  .stage { overflow-y:auto; -webkit-overflow-scrolling:touch; height:100vh; }
}

.bg-layer {
  position:fixed; inset:0; z-index:0;
  overflow:hidden; background:#07070a;
}
/* Muted iframe stretches to cover full screen */
.bg-hero-iframe-wrap {
  position:absolute; inset:0; z-index:1; pointer-events:none; overflow:hidden;
}
.bg-hero-iframe-wrap iframe {
  position:absolute; top:50%; left:50%;
  width:177.78vh; height:100vh;
  min-width:100%; min-height:56.25vw;
  transform:translate(-50%,-50%) scale(1.08);
  opacity:.28; pointer-events:none; border:none;
  filter: blur(18px) saturate(60%);
}
/* Thumbnail shown while iframe loads */
.bg-hero-thumb {
  position:absolute; inset:0; z-index:2;
  background-size:cover; background-position:center;
  transition:opacity 1.4s ease;
}
.bg-hero-thumb.hidden { opacity:0; pointer-events:none; }
/* Black fade for transitions */
.bg-hero-fade {
  position:absolute; inset:0; z-index:3;
  background:#000; opacity:0; pointer-events:none;
  transition:opacity 1.2s ease;
}
.bg-hero-fade.active { opacity:1; }
/* Grain */
.bg-hero-grain {
  position:absolute; inset:0; z-index:4; opacity:.035; pointer-events:none;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
  background-size:200px; animation:grain 1s steps(2) infinite;
}
/* Vignette — hard black sides, ghostly centre glow */
.bg-hero-vignette {
  position:absolute; inset:0; z-index:5; pointer-events:none;
  background:
    radial-gradient(ellipse 40% 72% at 50% 50%, rgba(7,7,10,.08) 0%, rgba(7,7,10,.65) 55%, rgba(7,7,10,.97) 100%),
    linear-gradient(to right, rgba(7,7,10,1) 0%, rgba(7,7,10,1) 18%, rgba(7,7,10,.6) 32%, rgba(7,7,10,.6) 68%, rgba(7,7,10,1) 82%, rgba(7,7,10,1) 100%),
    linear-gradient(to top, rgba(7,7,10,1) 0%, rgba(7,7,10,.82) 28%, rgba(7,7,10,.35) 58%, transparent 82%),
    linear-gradient(to bottom, rgba(7,7,10,1) 0%, rgba(7,7,10,.82) 28%, rgba(7,7,10,.35) 58%, transparent 82%);
}
@keyframes grain {
  0%{background-position:0 0} 25%{background-position:20px -15px}
  50%{background-position:-10px 20px} 75%{background-position:15px 10px}
  100%{background-position:-20px -5px}
}
.scan {
  position:fixed; left:0; right:0; height:1px;
  background:linear-gradient(to right,transparent,rgba(192,0,14,.4),transparent);
  z-index:1; pointer-events:none;
  animation:scan 6s ease-in-out infinite; opacity:0;
}
@keyframes scan {
  0%{top:-2px;opacity:0} 10%{opacity:1} 90%{opacity:1} 100%{top:100vh;opacity:0}
}

/* TV Static / glitch effect for Discover the Community */
#auth-discover { position:relative; display:inline-block; width:100%; }
#auth-discover::before, #auth-discover::after {
  content: attr(data-text);
  position:absolute; left:0; right:0; text-align:center;
  font-size:inherit; letter-spacing:inherit; text-transform:inherit;
  font-weight:inherit; font-family:inherit; pointer-events:none;
}
#auth-discover::before {
  color:rgba(255,80,80,.8);
  animation:glitch-r 3.5s infinite steps(1);
  clip-path:polygon(0 15%,100% 15%,100% 45%,0 45%); top:0;
}
#auth-discover::after {
  color:rgba(80,200,255,.8);
  animation:glitch-b 3.5s infinite steps(1) .08s;
  clip-path:polygon(0 55%,100% 55%,100% 80%,0 80%); top:0;
}
@keyframes glitch-r {
  0%,89%   { transform:translate(0,0);     opacity:0; }
  90%      { transform:translate(-2px,1px); opacity:1; }
  91%      { transform:translate(2px,-1px); opacity:1; }
  92%      { transform:translate(-1px,2px); opacity:1; }
  93%,100% { transform:translate(0,0);     opacity:0; }
}
@keyframes glitch-b {
  0%,89%   { transform:translate(0,0);     opacity:0; }
  90%      { transform:translate(2px,-1px); opacity:1; }
  91%      { transform:translate(-2px,1px); opacity:1; }
  92%      { transform:translate(1px,-2px); opacity:1; }
  93%,100% { transform:translate(0,0);     opacity:0; }
}
@keyframes static-flicker {
  0%,100% { opacity:1;  text-shadow:0 0 8px rgba(200,168,75,.6); }
  90%     { opacity:1;  text-shadow:0 0 8px rgba(200,168,75,.6); }
  90.5%   { opacity:.55; text-shadow:2px 0 6px rgba(255,80,80,.9),-2px 0 6px rgba(80,200,255,.9); }
  91%     { opacity:1;  text-shadow:0 0 14px rgba(200,168,75,1); }
  91.5%   { opacity:.75; text-shadow:-1px 0 5px rgba(255,80,80,.7),1px 0 5px rgba(80,200,255,.7); }
  92%     { opacity:1;  text-shadow:0 0 8px rgba(200,168,75,.6); }
  96%     { opacity:1;  text-shadow:0 0 8px rgba(200,168,75,.6); }
  96.3%   { opacity:.65; text-shadow:1px 0 8px rgba(255,80,80,.8); }
  96.6%   { opacity:1;  text-shadow:0 0 8px rgba(200,168,75,.6); }
}
.discover-static { animation:static-flicker 4s infinite; display:inline-block; }

.stage {
  position:relative; z-index:2; min-height:100vh;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:28px 16px;
}

.logo { display:flex; flex-direction:column; align-items:center; margin-bottom:24px; align-self:center; }
.rule { width:clamp(50px,12vw,100px); height:1px; background:linear-gradient(to right,transparent,var(--gold),transparent); margin:0 auto 28px; align-self:center; }

/* ── Logo matching nav ── */
.auth-logo-eyebrow {
  font-size:.55rem; letter-spacing:4px; color:rgba(255,255,255,.55);
  text-transform:uppercase; font-weight:300; font-style:italic;
  margin-bottom:6px; text-align:center; width:100%;
  opacity:0; transform:translateY(6px);
  animation: authLogoUp .5s .05s cubic-bezier(.16,1,.3,1) forwards;
}
.auth-logo-main {
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(1.6rem,4.5vw,2.8rem);
  letter-spacing:5px; color:#fff; line-height:1;
  white-space:nowrap;
  filter:drop-shadow(0 0 28px rgba(200,168,75,.25));
  opacity:0; transform:translateY(10px);
  animation: authLogoUp .55s .1s cubic-bezier(.16,1,.3,1) forwards;
}
.auth-logo-main em { color:var(--gold); font-style:normal; }
.auth-logo-tv { font-style:normal; color:inherit; }
#auth-gold-line {
  width:0; height:1px;
  background:linear-gradient(to right,transparent,rgba(200,168,75,.55),transparent);
  margin-top:10px; border-radius:1px;
  animation: authGoldLine .6s .4s cubic-bezier(.16,1,.3,1) forwards;
}
@keyframes authLogoUp {
  to { opacity:1; transform:translateY(0); }
}
@keyframes authGoldLine {
  to { width: clamp(80px,18vw,200px); }
}

.card {
  width:100%; max-width:500px; margin-left:auto; margin-right:auto;
  background: linear-gradient(
    160deg,
    rgba(255,255,255,.06) 0%,
    rgba(10,10,14,.38) 40%,
    rgba(10,10,14,.45) 100%
  );
  border-radius:20px; padding:36px 32px;
  backdrop-filter: blur(28px) saturate(140%);
  -webkit-backdrop-filter: blur(28px) saturate(140%);
  border: 1px solid rgba(255,255,255,.1);
  box-shadow:
    0 0 0 1px rgba(255,255,255,.06),
    0 30px 60px rgba(0,0,0,.45),
    0 12px 24px rgba(0,0,0,.28),
    inset 0 1px 0 rgba(255,255,255,.15),
    inset 0 -1px 0 rgba(0,0,0,.2);
  animation:fadeUp .6s .15s ease both;
  position: relative;
  overflow: hidden;
}
/* Top-left light catch — like tinted glass in sunlight */
.card::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(
    125deg,
    rgba(255,255,255,.07) 0%,
    rgba(255,255,255,.02) 35%,
    transparent 60%
  );
  pointer-events: none;
  z-index: 0;
}
/* Sharp specular line on top edge */
.card::after {
  content: '';
  position: absolute;
  top: 0; left: 12%; right: 12%; height: 1px;
  background: linear-gradient(90deg,
    transparent,
    rgba(255,255,255,.5) 25%,
    rgba(255,255,255,.7) 50%,
    rgba(255,255,255,.5) 75%,
    transparent
  );
  pointer-events: none;
  z-index: 1;
}
.card > * { position: relative; z-index: 2; }

/* Tabs */
.tabs {
  display:flex; gap:0; margin-bottom:32px;
  border:1px solid rgba(255,255,255,.1); border-radius:12px; overflow:hidden;
  background: rgba(255,255,255,.04);
}
.tab {
  flex:1; padding:14px 10px; background:transparent; border:none;
  font-family:'Inter',sans-serif; font-size:.88rem; font-weight:500;
  letter-spacing:.3px; text-transform:none; color:rgba(255,255,255,.4);
  cursor:pointer; transition:all .2s;
}
.tab.active {
  background: rgba(255,255,255,.1);
  color:#fff;
  box-shadow: inset 0 1px 0 rgba(255,255,255,.15);
}

.panel { display:none; }
.panel.active { display:block; }

.panel-title { font-family:'Inter',sans-serif; font-size:1.35rem; font-weight:600; letter-spacing:-.3px; color:#fff; margin-bottom:8px; }
.panel-sub { font-size:.9rem; color:rgba(255,255,255,.45); line-height:1.6; margin-bottom:28px; font-family:'Inter',sans-serif; }

/* Form fields */
.field { margin-bottom:14px; }
.field label { display:block; font-size:.8rem; letter-spacing:.2px; text-transform:none; color:rgba(255,255,255,.6); font-weight:500; margin-bottom:8px; font-family:'Inter',sans-serif; }
.field input {
  width:100%; padding:10px 14px;
  background: rgba(255,255,255,.06);
  border: 1px solid rgba(255,255,255,.12);
  border-radius:9px; color:#fff; font-family:'Inter',sans-serif; font-size:1rem;
  outline:none; transition:border-color .2s, background .2s;
}
.field input:focus { border-color:rgba(255,255,255,.35); background:rgba(255,255,255,.09); }
.field input::placeholder { color:rgba(255,255,255,.25); }

/* Buttons */
.btn-primary {
  width:100%; padding:12px; margin-top:8px;
  background: #c0000e;
  border: none;
  border-radius:11px;
  color: #fff;
  font-family:'Inter',sans-serif;
  font-size:.95rem; font-weight:600; letter-spacing:.2px; text-transform:none;
  cursor:pointer;
  box-shadow: 0 2px 12px rgba(192,0,14,.35);
  transition: background .2s, box-shadow .2s, transform .15s;
}
.btn-primary:hover {
  background: #d4000f;
  box-shadow: 0 4px 20px rgba(192,0,14,.5);
  transform:translateY(-1px);
}
.btn-primary:active { transform:translateY(0); }
.btn-primary:disabled { opacity:.4; cursor:not-allowed; transform:none; }

/* Error / success */
.msg { display:none; margin-bottom:20px; padding:13px 16px; border-radius:10px; font-size:.88rem; line-height:1.5; text-align:center; }
.msg.error { background:rgba(192,0,14,.1); border:1px solid rgba(192,0,14,.3); color:#ff6b6b; }
.msg.success { background:rgba(200,168,75,.08); border:1px solid rgba(200,168,75,.3); color:var(--gold); }
.msg.visible { display:block; }

/* Logged-in view */
#view-hub { display:none; text-align:center; }
#view-hub.active { display:block; }
.hub-welcome { font-family:'Bebas Neue',sans-serif; font-size:2.2rem; letter-spacing:3px; color:#fff; margin-bottom:6px; }
.hub-sub { font-size:.88rem; color:var(--muted); margin-bottom:32px; }

/* Invite codes section */
.invites-wrap { margin-top:24px; border-top:1px solid var(--border); padding-top:24px; }
.invites-label { font-size:.7rem; letter-spacing:2px; text-transform:uppercase; color:var(--gold); font-weight:700; margin-bottom:14px; }
.invite-row {
  display:flex; align-items:center; justify-content:space-between;
  padding:11px 16px; background:rgba(255,255,255,.03); border:1px solid var(--border);
  border-radius:8px; margin-bottom:8px;
}
.invite-code { font-family:monospace; font-size:.9rem; color:#fff; letter-spacing:2px; }
.invite-used { font-family:monospace; font-size:.9rem; color:var(--muted); letter-spacing:2px; text-decoration:line-through; }
.copy-btn {
  font-size:.65rem; letter-spacing:1px; text-transform:uppercase; font-weight:700;
  color: rgba(255,255,255,.8);
  background: rgba(255,255,255,.07);
  border: 1px solid rgba(255,255,255,.15);
  border-radius: 20px; padding: 6px 14px;
  cursor:pointer; font-family:'DM Sans',sans-serif;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  box-shadow: inset 0 1px 0 rgba(255,255,255,.1);
  transition: background .2s, box-shadow .2s;
}
.copy-btn:hover { background: rgba(255,255,255,.13); box-shadow: 0 2px 8px rgba(0,0,0,.2), inset 0 1px 0 rgba(255,255,255,.15); }
.copy-btn.copied { color:#4caf8a; border-color: rgba(76,175,138,.3); background: rgba(76,175,138,.08); }

.signout-btn {
  margin-top:20px; font-size:.75rem; color:var(--muted); background:none; border:none;
  cursor:pointer; font-family:'DM Sans',sans-serif; letter-spacing:1px;
  text-transform:uppercase; transition:color .2s;
}
.signout-btn:hover { color:rgba(255,255,255,.4); }

@keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }

/* ── Desktop — proportionally wider card and stage ── */
@media(min-width:768px){
  .stage { padding:36px 16px; }
  .card { max-width:500px; padding:44px 36px; border-radius:20px; }
  .panel-title { font-size:1.5rem; }
  .panel-sub { font-size:.98rem; margin-bottom:22px; }
  .field { margin-bottom:16px; }
  .field label { font-size:.85rem; margin-bottom:6px; }
  .field input { font-size:1rem; padding:11px 16px; border-radius:10px; }
  .btn-primary { font-size:1rem; padding:13px; border-radius:11px; margin-top:10px; }
  .tab { font-size:.9rem; padding:15px; }
  .tabs { margin-bottom:36px; border-radius:13px; }
  .auth-logo-main { font-size: clamp(2rem, 5vw, 3.4rem) !important; }
  .auth-logo-eyebrow { font-size: .65rem !important; }
  #auth-discover { font-size: .72rem !important; }
  #auth-flavor { font-size: .85rem !important; }
}
@media(min-width:1100px){
  .card { max-width:520px; padding:48px 40px; border-radius:20px; }
  .panel-title { font-size:1.65rem; }
  .panel-sub { font-size:1rem; margin-bottom:24px; }
  .field { margin-bottom:18px; }
  .field label { font-size:.88rem; margin-bottom:7px; }
  .field input { font-size:1.05rem; padding:12px 18px; border-radius:10px; }
  .btn-primary { font-size:1.05rem; padding:14px; margin-top:10px; }
  .tab { font-size:.92rem; padding:16px; }
  .tabs { margin-bottom:40px; }
}

/* ── Mobile overrides ── */
@media(max-width:480px){
  .stage { padding:20px 16px; }
  .card { padding:28px 20px; border-radius:18px; max-width:100%; overflow:hidden; }
  .auth-logo-main { font-size:2rem !important; }
  .auth-logo-eyebrow { font-size:.65rem !important; }
  .panel-title { font-size:1.3rem !important; margin-bottom:8px !important; }
  .panel-sub { font-size:.92rem !important; margin-bottom:18px !important; }
  .field { margin-bottom:14px !important; }
  .field label { font-size:.82rem !important; margin-bottom:8px !important; }
  .field input { font-size:1rem !important; padding:10px 14px !important; border-radius:9px !important; }
  .btn-primary { font-size:.95rem !important; padding:12px !important; border-radius:10px !important; margin-top:8px !important; }
  .tab { font-size:.85rem !important; padding:14px !important; }
  .tabs { margin-bottom:30px !important; }
  .msg { font-size:.88rem !important; padding:13px 16px !important; }
  #auth-discover { font-size:.68rem !important; }
  #auth-flavor { font-size:.82rem !important; }
  .tv-logo-wrap { width: 52px !important; }
}

/* ── TV Logo ── */
.tv-logo-wrap {
  position: relative;
  display: inline-block;
  width: clamp(54px, 8vw, 80px);
  height: auto;
  flex-shrink: 0;
  margin-right: 10px;
}
.tv-logo-img {
  width: 100%;
  height: auto;
  display: block;
  filter: drop-shadow(0 0 12px rgba(192,0,14,.5));
}
</style>
</head>
<body>

<div class="bg-layer">
  <div class="bg-hero-iframe-wrap">
    <iframe id="auth-hero-iframe" src="" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
  </div>
  <div class="bg-hero-thumb" id="auth-hero-thumb"></div>
  <div class="bg-hero-fade" id="auth-hero-fade"></div>
  <div class="bg-hero-grain"></div>
  <div class="bg-hero-vignette"></div>
</div>
<div class="scan"></div>

<div class="stage">
  <div class="logo">
    <div style="display:flex;flex-direction:column;align-items:center;">
      <span class="auth-logo-eyebrow">The Official</span>
      <div class="auth-logo-main" style="display:flex;align-items:center;justify-content:center;gap:0;">
      <div class="tv-logo-wrap">
        <svg class="tv-logo-img" viewBox="0 0 120 100" xmlns="http://www.w3.org/2000/svg">
          <!-- TV body -->
          <rect x="5" y="18" width="110" height="72" rx="8" ry="8" fill="#1a1a1f" stroke="#333" stroke-width="1.5"/>
          <!-- Screen bezel -->
          <rect x="12" y="24" width="96" height="58" rx="5" ry="5" fill="#0a0a0e" stroke="#222" stroke-width="1"/>
          <!-- Screen area -->
          <rect x="15" y="27" width="90" height="52" rx="3" ry="3" fill="#080810"/>
          <!-- Antenna left -->
          <line x1="38" y1="18" x2="22" y2="3" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
          <!-- Antenna right -->
          <line x1="82" y1="18" x2="98" y2="3" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
          <!-- Bottom controls strip -->
          <rect x="5" y="84" width="110" height="6" rx="0" ry="0" fill="#141418"/>
          <!-- Red power dot -->
          <circle cx="100" cy="87" r="2.2" fill="#c0000e" opacity=".9"/>
          <!-- Legs -->
          <rect x="28" y="90" width="10" height="8" rx="2" fill="#111"/>
          <rect x="82" y="90" width="10" height="8" rx="2" fill="#111"/>
        </svg>
      </div>
      <span>EFED <em>STREAMING</em> HUB</span>
      </div>
      <div id="auth-gold-line"></div>
    </div>
  </div>

  <div class="rule"></div>

  <!-- Flavor / tagline row -->
  <div style="text-align:center;margin-bottom:22px;min-height:32px;align-self:center;width:100%;">
    <div style="font-size:.6rem;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.35);margin-bottom:6px;font-weight:300;">
      <span id="auth-discover" data-text="Discover the Community" style="opacity:0;transition:opacity .4s .8s;">
        <span class="discover-static">Discover the Community</span>
      </span>
    </div>
    <div style="font-size:.72rem;letter-spacing:1.5px;color:var(--gold);font-weight:500;text-transform:uppercase;opacity:0;transition:opacity .4s 1s;" id="auth-flavor"></div>
  </div>

  <div id="view-auth" style="width:100%;">
    <!-- Inline script injects tabs+panels only when NOT logged in -->
  </div>

  <div id="view-hub" style="width:100%;">
    <div class="card">
      <p class="hub-welcome">WELCOME BACK, <span id="hub-name"></span></p>
      <p class="hub-sub">You're signed in to EFED Streaming Hub.</p>
      <a href="index.html" class="btn-primary" style="display:block;text-align:center;text-decoration:none;padding:13px;">Enter the Hub →</a>
      <div class="invites-wrap">
        <div class="invites-label">Your Invite Codes</div>
        <div id="invite-list"></div>
      </div>
      <button class="signout-btn" onclick="signOut()">Sign Out</button>
    </div>
  </div>
</div>

<script>
// ── SESSION ──

      </div>

    <!-- FORGOT (hidden panel, no tab) -->
    <div id="panel-forgot" class="panel">

      <div id="forgot-ok" style="display:none;padding:12px;background:rgba(200,168,75,.08);border:1px solid rgba(200,168,75,.3);border-radius:8px;color:var(--gold);font-size:.82rem;line-height:1.6;"></div>
      <div style="text-align:center;margin-top:14px;">
        <button onclick="switchToLogin()" style="background:none;border:none;color:rgba(255,255,255,.35);font-size:.7rem;font-family:'Inter',sans-serif;cursor:pointer;letter-spacing:.2px;transition:color .2s;" onmouseover="this.style.color='rgba(255,255,255,.6)'" onmouseout="this.style.color='rgba(255,255,255,.35)'">← Back to Sign In</button>

  // Wire up eFed checkbox toggle

    efedCheck.addEventListener('change', () => {
      document.getElementById('reg-efed-fields').style.display = efedCheck.checked ? 'block' : 'none';
    });

})();

function switchTab(name, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('panel-' + name).classList.add('active');
}
function switchToForgot() {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('panel-forgot').classList.add('active');
}
function switchToLogin() {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  const loginTab = document.querySelector('.tab');
  if (loginTab) loginTab.classList.add('active');
  document.getElementById('panel-login').classList.add('active');
}

function showErr(id, msg) {
  const el = document.getElementById(id);
  if (!el) return;
  el.textContent = msg; el.classList.add('visible');
}
function hideErr(id) {
  const el = document.getElementById(id);
  if (el) { el.textContent = ''; el.classList.remove('visible'); }
}
function showOk(id, msg) {
  const el = document.getElementById(id);
  if (!el) return;
  el.textContent = msg; el.classList.add('visible');
}
function setLoading(id, on) {
  const el = document.getElementById(id);
  if (!el) return;
  el.disabled = on;
  el.textContent = on ? 'Please wait…' : el.getAttribute('data-label') || el.textContent;
}

// ── SUPABASE HELPERS ──
const SB_URL  = 'https://osbarvhklizidsffytye.supabase.co/rest/v1';
const SB_KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9zYmFydmhrbGl6aWRzZmZ5dHllIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyNjQ4MzksImV4cCI6MjA4ODg0MDgzOX0.c9EDHCFY50VzSTmz0EUTq1XrX0AvJdynFPxIWT5K7JM';
const SB_HEAD = { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=representation' };

async function sbGet(table, query='', signal) {
  const r = await fetch(`${SB_URL}/${table}?${query}`, { headers: SB_HEAD, signal });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}
async function sbInsert(table, data) {
  const r = await fetch(`${SB_URL}/${table}`, { method:'POST', headers:SB_HEAD, body:JSON.stringify(data) });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}
async function sbUpdate(table, data, query) {
  const r = await fetch(`${SB_URL}/${table}?${query}`, { method:'PATCH', headers:SB_HEAD, body:JSON.stringify(data) });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

// ── PASSWORD HASH ──
async function hash(pw) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pw));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

// ── INVITE CODE GEN ──
async function genUniqueCode(attempts=0) {
  if (attempts > 20) throw new Error('Could not generate unique code');
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  const code = Array.from(crypto.getRandomValues(new Uint8Array(8))).map(b => chars[b % chars.length]).join('');
  const formatted = code.slice(0,4) + '-' + code.slice(4);
  const existing = await sbGet('invites', `code=eq.${encodeURIComponent(formatted)}&select=code`);
  if (existing.length) return genUniqueCode(attempts + 1);
  return formatted;
}

// ── LOGIN ──
async function doLogin() {
  hideErr('login-err');
  const email = document.getElementById('login-user').value.trim().toLowerCase();
  const pass = document.getElementById('login-pass').value;
  if (!email || !pass) return showErr('login-err', 'Please fill in all fields.');
  setLoading('login-btn', true);
  try {
    const users = await sbGet('users', `email=eq.${encodeURIComponent(email)}`);
    if (!users.length) return showErr('login-err', 'Email not found.');
    const u = users[0];
    if (u.password_hash !== await hash(pass)) return showErr('login-err', 'Incorrect password.');
    setSession({ username: u.username, displayName: u.display_name });
    showOk('login-err', 'Signed in! Redirecting…');
    document.getElementById('login-err').classList.remove('error');
    document.getElementById('login-err').classList.add('success');
    document.getElementById('login-err').classList.add('visible');
    setTimeout(() => window.location.replace('index.html'), 700);
  } catch(e) {
    showErr('login-err', 'Could not connect. Try again.');
  } finally {
    setLoading('login-btn', false);
  }
}

// ── CHECK INVITE STEP ──
async function checkInviteStep() {
  hideErr('reg-err1');
  const invite = document.getElementById('reg-invite').value.trim().toUpperCase();
  if (!invite) return showErr('reg-err1', 'Enter your invite code.');
  const btn = document.getElementById('reg-btn1');
  btn.disabled = true; btn.textContent = 'Checking…';
  try {
    const invites = await sbGet('invites', `code=eq.${encodeURIComponent(invite)}`);
    if (!invites.length) return showErr('reg-err1', 'Invalid invite code.');
    if (invites[0].used) return showErr('reg-err1', 'That invite code has already been used.');
    document.getElementById('reg-step1').style.display = 'none';
    document.getElementById('reg-step2').style.display = 'block';
  } catch(e) {
    showErr('reg-err1', 'Could not verify code. Try again.');
  } finally {
    btn.disabled = false; btn.textContent = 'Continue';
  }
}

// ── REGISTER ──
async function doRegister() {
  hideErr('reg-err2');
  const invite      = document.getElementById('reg-invite').value.trim().toUpperCase();
  const user        = document.getElementById('reg-user').value.trim().toLowerCase();
  const pass        = document.getElementById('reg-pass').value;
  const email       = document.getElementById('reg-email').value.trim().toLowerCase();
  const cawName     = document.getElementById('reg-caw').value.trim();
  const xHandle     = (document.getElementById('reg-x').value.trim().replace(/^@/,'')).toLowerCase();
  const igHandle    = (document.getElementById('reg-ig').value.trim().replace(/^@/,'')).toLowerCase();
  const isEfedOwner = document.getElementById('reg-is-efed').checked;
  const promoName   = isEfedOwner ? document.getElementById('reg-promo').value.trim() : null;
  const ytChannel   = isEfedOwner ? document.getElementById('reg-yt').value.trim() : null;
  const twitchChannel = isEfedOwner ? document.getElementById('reg-twitch').value.trim() : null;

  if (!user || !pass || !email || !cawName) return showErr('reg-err2', 'Please fill in all required fields.');
  if (pass.length < 6) return showErr('reg-err2', 'Password must be at least 6 characters.');
  if (!email.includes('@')) return showErr('reg-err2', 'Please enter a valid email.');
  if (isEfedOwner && !promoName) return showErr('reg-err2', 'Please enter your promotion name.');
  if (!xHandle && !igHandle) return showErr('reg-err2', 'Please provide at least one social account — X (Twitter) or Instagram.');
  if (isEfedOwner && !ytChannel && !twitchChannel) return showErr('reg-err2', 'eFed owners must provide at least one channel link — YouTube or Twitch.');

  const btn = document.getElementById('reg-btn');
  btn.disabled = true; btn.textContent = 'Creating account…';

  try {
    // Re-verify invite
    const invites = await sbGet('invites', `code=eq.${encodeURIComponent(invite)}`);
    if (!invites.length || invites[0].used) return showErr('reg-err2', 'Invite code is no longer valid.');

    // Check username taken
    const existingUser = await sbGet('users', `username=eq.${encodeURIComponent(user)}`);
    if (existingUser.length) return showErr('reg-err2', 'That username is already taken.');

    // Check promo name taken
    if (promoName) {
      const existingPromo = await sbGet('users', `promo_name=eq.${encodeURIComponent(promoName)}`);
      if (existingPromo.length) return showErr('reg-err2', 'That promotion name is already registered.');
    }

    // ── SOCIAL BAN CHECK ──
    const socialBanChecks = [];
    if (xHandle) socialBanChecks.push(
      sbGet('banned_socials', `handle=eq.${encodeURIComponent(xHandle)}&platform=eq.x&select=id`).then(r => r.length ? 'x' : null).catch(() => null)
    );
    if (igHandle) socialBanChecks.push(
      sbGet('banned_socials', `handle=eq.${encodeURIComponent(igHandle)}&platform=eq.ig&select=id`).then(r => r.length ? 'ig' : null).catch(() => null)
    );
    if (socialBanChecks.length) {
      const banResults = await Promise.all(socialBanChecks);
      const banned = banResults.filter(Boolean);
      if (banned.length) {
        return showErr('reg-err2', 'We were unable to complete your registration. Please contact us if you believe this is a mistake.');
      }
    }

    await sbInsert('users', {
      username: user,
      password_hash: await hash(pass),
      email,
      display_name: cawName,
      joined_at: Date.now(),
      x_handle: xHandle || null,
      ig_handle: igHandle || null,
      is_efed_owner: isEfedOwner,
      promo_name: promoName || null,
      yt_channel: ytChannel || null,
      twitch_channel: (isEfedOwner && twitchChannel) ? twitchChannel : null,
      role: 'member'
    });

    await sbUpdate('invites', { used: true, used_by: user }, `code=eq.${encodeURIComponent(invite)}`);

    // Notify the invite code creator
    const inviteCreator = invites[0].created_by;
    if (inviteCreator) {
      await sbInsert('notifications', {
        username: inviteCreator,
        type: 'invite',
        message: `🎟️ Your invite code ${invite} was used by ${cawName} — welcome them to the Hub!`,
        video_url: null,
        read: false,
        created_at: Date.now()
      });
    }

    const newCodes = [];
    for (let i = 0; i < 5; i++) {
      try {
        const code = await genUniqueCode();
        newCodes.push({ code, used: false, used_by: null, created_by: user });
      } catch(e) { console.warn('Skipped a code generation:', e); }
    }
    if (newCodes.length > 0) await sbInsert('invites', newCodes);

    setSession({ username: user, displayName: cawName });
    showOk('reg-ok', 'Account created! Welcome to the Hub.');
    setTimeout(() => window.location.replace('index.html'), 800);
  } catch(e) {
    let errMsg = 'Could not connect. Try again.';
    try {
      const parsed = JSON.parse(e.message);
      if (parsed && parsed.message) errMsg = parsed.message;
      else if (parsed && parsed.error) errMsg = parsed.error;
    } catch(_) {
      if (e.message && e.message.length < 200) errMsg = e.message;
    }
    showErr('reg-err2', errMsg);
    console.error('Registration error:', e);
  } finally {
    setLoading('reg-btn', false);
  }
}

// ── FORGOT PASSWORD — Supabase native email reset ──
async function doForgotReset() {
  const email = document.getElementById('forgot-email').value.trim().toLowerCase();
  if (!email || !email.includes('@')) return alert('Please enter a valid email.');
  const btn = document.getElementById('forgot-btn1');
  btn.disabled = true;
  btn.textContent = 'Sending…';
  try {
    await fetch('https://formspree.io/f/xnjgyzrj', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
      body: JSON.stringify({ email, _subject: 'Password Reset Request — EFED Hub' })
    });
    document.getElementById('forgot-step1').style.display = 'none';
    const ok = document.getElementById('forgot-ok');
    ok.style.display = 'block';
    ok.textContent = 'Request sent! The admin will reset your password and contact you shortly.';
  } catch(e) {
    alert('Could not send. Please try again.');
    btn.disabled = false;
    btn.textContent = 'Submit Request';
  }
}


// ── SHOW LOGGED IN VIEW ──
async function showLoggedIn(username) {
  const hub = document.getElementById('view-hub');
  hub.style.display = 'block';
  hub.classList.add('active');
  document.getElementById('hub-name').textContent = username.toUpperCase();

  const list = document.getElementById('invite-list');
  list.innerHTML = '<p style="font-size:.72rem;color:var(--muted)">Loading codes…</p>';

  try {
    const codes = await sbGet('invites', `created_by=eq.${encodeURIComponent(username)}&order=code.asc`);
    list.innerHTML = '';
    if (!codes.length) {
      list.innerHTML = '<p style="font-size:.72rem;color:var(--muted)">No invite codes yet.</p>';
      return;
    }
    codes.forEach(invite => {
      const row = document.createElement('div');
      row.className = 'invite-row';
      row.innerHTML = invite.used
        ? `<span class="invite-used">${invite.code}</span><span style="font-size:.6rem;color:var(--muted)">Used by ${invite.used_by || '?'}</span>`
        : `<span class="invite-code">${invite.code}</span><button class="copy-btn" onclick="copyCode(this,'${invite.code}')">Copy</button>`;
      list.appendChild(row);
    });
  } catch(e) {
    list.innerHTML = '<p style="font-size:.72rem;color:#ff6b6b">Could not load codes.</p>';
  }
}

function copyCode(btn, code) {
  navigator.clipboard.writeText(code).then(() => {
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
  });
}

// ── SIGN OUT ──
function signOut() {
  clearSession();
  window.location.reload();
}

// ── INIT ──
async function init() {
  const session = getSession();
  if (session?.username) {
    try {
      const users = await sbGet('users', `username=eq.${encodeURIComponent(session.username)}`);
      if (users.length) {
        const user = users[0];
        if (user.display_name && user.display_name !== session.displayName) {
          session.displayName = user.display_name;
          setSession(session);
        }
        showLoggedIn(session.username);
        return;
      }
    } catch(e) {}
    clearSession();
  }
}

// Enter key support
document.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  const loginPanel = document.getElementById('panel-login');
  const regPanel = document.getElementById('panel-register');
  const forgotPanel = document.getElementById('panel-forgot');
  if (loginPanel && loginPanel.classList.contains('active')) doLogin();
  else if (regPanel && regPanel.classList.contains('active')) {
    const step2 = document.getElementById('reg-step2');
    if (step2 && step2.style.display !== 'none') doRegister();
    else checkInviteStep();
  }
  else if (forgotPanel && forgotPanel.classList.contains('active')) doForgotReset();
});

init();
</script>

// ── HERO BACKGROUND: 5s show → fade out → 8s black → fade in → repeat ──
(function() {
  const FALLBACK_IDS = [
    'P-q7UGmFeJc','hDOSqrSs5qc','tYCvQRDdap0','QnS_KW8Sqyo','4rOkRxtj-18',
    'CB1gizSwLpU','tpH5WJU1xhE','vOusl_rKiFQ','mXuGkA8w-mw','7VmYD7CH60E',
    'alXOdewaemU','26o2oK-LOOc','nLdYNTxPK4g','kgxCddYL2Yo','pd7280pJGUY',
    'YSQlFynBMrE','r3Db2WTYLnY','xmh9ZOVxTt0','9mmCAFwKAMw','P6S0zC7nA9U'
  ];

  const SKIP     = 20;    // seconds into video to start
  const SHOW_MS  = 12000; // hero visible for 12s
  const BLACK_MS = 5000;  // hold black for 5s
  const FADE_MS  = 1200;  // fade duration (matches CSS transition)

  const iframe = document.getElementById('auth-hero-iframe');
  const thumb  = document.getElementById('auth-hero-thumb');
  const fade   = document.getElementById('auth-hero-fade');

  fade.style.transition = 'opacity ' + (FADE_MS / 1000) + 's ease';

  let pool = [];
  let idx  = 0;
  let timer = null;

  function extractYtId(url) {
    if (!url) return null;
    const m = url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?(?:.*&)?v=|embed\/|shorts\/|live\/))([A-Za-z0-9_-]{11})/);
    return m ? m[1] : null;
  }

  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function heroSrc(id) {
    return 'https://www.youtube.com/embed/' + id
      + '?autoplay=1&mute=1&start=' + SKIP
      + '&loop=1&playlist=' + id

      + '&showinfo=0&rel=0&iv_load_policy=3&playsinline=1';
  }

  function thumbUrl(id) {
    return 'https://i.ytimg.com/vi/' + id + '/maxresdefault.jpg';
  }

  function showNextHero() {
    if (!pool.length) return;
    const id = pool[idx % pool.length];
    idx++;

    thumb.style.backgroundImage = 'url(' + thumbUrl(id) + ')';
    thumb.classList.remove('hidden');
    iframe.src = heroSrc(id);

    // Fade in (remove black overlay)
    setTimeout(() => {
      fade.classList.remove('active');

    }, 80);

    clearTimeout(timer);
    timer = setTimeout(fadeToBlack, SHOW_MS);
  }

  function fadeToBlack() {
    fade.classList.add('active');
    clearTimeout(timer);
    // Wait for fade to complete + hold black, then load next
    timer = setTimeout(() => {
      iframe.src = '';
      showNextHero();
    }, BLACK_MS + FADE_MS);
  }

  // ── Fetch all approved YouTube video IDs from Supabase ──
  async function initHeroPool() {
    try {
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 4000); // 4s timeout
      const rows = await sbGet('submissions', 'status=eq.approved&select=url', controller.signal);
      clearTimeout(timeout);
      const ids = rows.map(row => extractYtId(row.url)).filter(Boolean);
      if (ids.length >= 5) {
        pool = shuffle(ids);
      } else {
        pool = shuffle(FALLBACK_IDS);
      }
    } catch(e) {
      pool = shuffle(FALLBACK_IDS);
    }
    showNextHero();
  }

  // Start from black
  fade.classList.add('active');
  if (document.readyState === 'complete') {
    initHeroPool();
  } else {
    window.addEventListener('load', initHeroPool);
  }
})();
</script>
</body>
</html>
