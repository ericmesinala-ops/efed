<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="72" fill="#07070a"/>

  <!-- EFED: occupies top third -->
  <text x="256" y="175"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="148"
    fill="#c8a84b"
    text-anchor="middle"
    letter-spacing="2">EFED</text>

  <!-- Gold line top -->
  <rect x="64" y="196" width="384" height="2" fill="#c8a84b" opacity="0.55"/>

  <!-- STREAMING: dead center -->
  <text x="256" y="256"
    font-family="Arial, sans-serif"
    font-weight="700"
    font-size="40"
    fill="#ffffff"
    text-anchor="middle"
    letter-spacing="7">STREAMING</text>

  <!-- Gold line bottom -->
  <rect x="64" y="272" width="384" height="2" fill="#c8a84b" opacity="0.55"/>

  <!-- HUB: occupies bottom third -->
  <text x="256" y="410"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="148"
    fill="#ffffff"
    text-anchor="middle"
    letter-spacing="4">HUB</text>
</svg>
</svg>
