<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="#07070a"/>
  
  <!-- Gold divider line -->
  <rect x="80" y="220" width="352" height="2" fill="#c8a84b" opacity="0.6"/>
  <rect x="80" y="290" width="352" height="2" fill="#c8a84b" opacity="0.6"/>

  <!-- EFED -->
  <text x="256" y="210" 
    font-family="Arial Black, Arial, sans-serif" 
    font-weight="900"
    font-size="140" 
    fill="#ffffff" 
    text-anchor="middle"
    letter-spacing="-2">EFED</text>

  <!-- STREAMING -->
  <text x="256" y="268" 
    font-family="Arial, sans-serif" 
    font-weight="700"
    font-size="42" 
    fill="#c8a84b" 
    text-anchor="middle"
    letter-spacing="6">STREAMING</text>

  <!-- HUB -->
  <text x="256" y="360" 
    font-family="Arial Black, Arial, sans-serif" 
    font-weight="900"
    font-size="100" 
    fill="#c0000e" 
    text-anchor="middle"
    letter-spacing="8">HUB</text>
</svg>
