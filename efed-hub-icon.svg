<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="#07070a"/>

  <!-- TV body scaled and centered (original viewBox 0 0 120 100, scaled ~3x and centered) -->
  <g transform="translate(76, 120) scale(3.0)">
    <!-- TV outer casing -->
    <rect x="5" y="18" width="110" height="72" rx="8" ry="8" fill="#1a1a1f" stroke="#444" stroke-width="1.5"/>
    <!-- Screen bezel -->
    <rect x="12" y="24" width="96" height="58" rx="5" ry="5" fill="#0a0a0e" stroke="#333" stroke-width="1"/>
    <!-- Screen -->
    <rect x="15" y="27" width="90" height="52" fill="#0d0d12"/>

    <!-- Static noise lines on screen -->
    <line x1="15" y1="31" x2="105" y2="31" stroke="#1a1a22" stroke-width="1.2"/>
    <line x1="15" y1="35" x2="105" y2="35" stroke="#222" stroke-width="0.8"/>
    <line x1="15" y1="39" x2="105" y2="39" stroke="#1a1a22" stroke-width="1.2"/>
    <line x1="15" y1="43" x2="105" y2="43" stroke="#222" stroke-width="0.8"/>
    <line x1="15" y1="47" x2="105" y2="47" stroke="#1a1a22" stroke-width="1.2"/>
    <line x1="15" y1="51" x2="105" y2="51" stroke="#222" stroke-width="0.8"/>
    <line x1="15" y1="55" x2="105" y2="55" stroke="#1a1a22" stroke-width="1.2"/>
    <line x1="15" y1="59" x2="105" y2="59" stroke="#222" stroke-width="0.8"/>
    <line x1="15" y1="63" x2="105" y2="63" stroke="#1a1a22" stroke-width="1.2"/>
    <line x1="15" y1="67" x2="105" y2="67" stroke="#222" stroke-width="0.8"/>
    <line x1="15" y1="71" x2="105" y2="71" stroke="#1a1a22" stroke-width="1.2"/>
    <line x1="15" y1="75" x2="105" y2="75" stroke="#222" stroke-width="0.8"/>

    <!-- Static flicker blocks (gold/red tint) -->
    <rect x="20" y="30" width="18" height="6" fill="#c8a84b" opacity="0.08"/>
    <rect x="55" y="42" width="24" height="4" fill="#c0000e" opacity="0.07"/>
    <rect x="30" y="58" width="14" height="5" fill="#c8a84b" opacity="0.06"/>
    <rect x="72" y="33" width="20" height="7" fill="#c0000e" opacity="0.06"/>
    <rect x="40" y="68" width="30" height="4" fill="#c8a84b" opacity="0.05"/>

    <!-- Antennas -->
    <line x1="38" y1="18" x2="22" y2="3" stroke="#555" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="82" y1="18" x2="98" y2="3" stroke="#555" stroke-width="2.5" stroke-linecap="round"/>

    <!-- Bottom bar -->
    <rect x="5" y="84" width="110" height="6" fill="#141418"/>
    <!-- Red power dot -->
    <circle cx="100" cy="87" r="2.2" fill="#c0000e" opacity=".9"/>
    <!-- Legs -->
    <rect x="28" y="90" width="10" height="8" rx="2" fill="#111"/>
    <rect x="82" y="90" width="10" height="8" rx="2" fill="#111"/>
  </g>

  <!-- EFED text in gold -->
  <text x="256" y="430" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="72" fill="#c8a84b" text-anchor="middle" letter-spacing="12">EFED</text>

  <!-- Thin gold underline -->
  <rect x="156" y="444" width="200" height="3" rx="1.5" fill="#c8a84b" opacity="0.5"/>
</svg>
